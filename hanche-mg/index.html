<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hanche MG - version autonome images integrees</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-2: #edf4fb;
      --ink: #132033;
      --muted: #64748b;
      --line: #d8e2ef;
      --blue: #0b5f94;
      --blue-2: #0f7aa9;
      --red: #bd2535;
      --red-soft: #fff0f2;
      --orange: #b65f00;
      --orange-soft: #fff5e7;
      --green: #1f7a4d;
      --green-soft: #eaf8f1;
      --shadow: 0 14px 36px rgba(24, 43, 68, .08);
      --radius: 8px;
      --font: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --mono: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #101722;
      --surface: #162232;
      --surface-2: #1e2c40;
      --ink: #edf6ff;
      --muted: #a8b7cb;
      --line: #304258;
      --blue: #5db7e6;
      --blue-2: #81d0f4;
      --red: #ff7a86;
      --red-soft: #3b1b24;
      --orange: #ffc06f;
      --orange-soft: #392716;
      --green: #7bdba5;
      --green-soft: #173326;
      --shadow: 0 18px 42px rgba(0, 0, 0, .22);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.48;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: var(--blue);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--surface);
      padding: 18px;
    }

    .brand {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.15;
      color: var(--blue);
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .search {
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }

    .search input, .field input, .field select, .field textarea, .letter-context input, .letter-context textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      padding: 10px 11px;
      min-height: 42px;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav button, .pill, .tool-btn, .quick-btn, .chip {
      border-radius: var(--radius);
      min-height: 38px;
      background: var(--surface-2);
      color: var(--ink);
      border: 1px solid transparent;
      padding: 9px 11px;
      text-align: left;
    }

    .nav button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .nav button.active {
      background: var(--blue);
      color: #fff;
    }

    .side-panel {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-2);
    }

    .side-panel h2 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .main {
      min-width: 0;
      padding: 22px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0 18px;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(8px);
    }

    .topbar h2 {
      margin: 0;
      font-size: 25px;
      line-height: 1.2;
    }

    .topbar .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .mobile-menu {
      display: none;
    }

    .tool-btn {
      text-align: center;
      background: var(--surface);
      border-color: var(--line);
      color: var(--blue);
      font-weight: 650;
    }

    .tool-btn.primary {
      color: #fff;
      border-color: var(--blue);
      background: var(--blue);
    }

    .tool-btn.danger {
      color: var(--red);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .panel, .card, .notice, .result {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 16px;
      margin-bottom: 14px;
    }

    .panel h3, .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .panel h4, .card h4 {
      margin: 13px 0 6px;
      font-size: 15px;
    }

    .panel p, .card p, .notice p {
      margin: 7px 0;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 13px;
    }

    .card {
      padding: 14px;
      overflow: hidden;
    }

    .card.red {
      border-color: color-mix(in srgb, var(--red) 46%, var(--line));
      background: var(--red-soft);
      box-shadow: none;
    }

    .card.orange {
      border-color: color-mix(in srgb, var(--orange) 42%, var(--line));
      background: var(--orange-soft);
      box-shadow: none;
    }

    .card.green {
      border-color: color-mix(in srgb, var(--green) 42%, var(--line));
      background: var(--green-soft);
      box-shadow: none;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      gap: 8px;
    }

    .quick-btn {
      text-align: center;
      border-color: var(--line);
      background: var(--surface);
      color: var(--blue);
      font-weight: 650;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-weight: 650;
      font-size: 13px;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
    }

    .check {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 9px 10px;
      min-height: 44px;
    }

    .check input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--blue);
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 8px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      font-size: 12px;
      font-weight: 650;
      color: var(--muted);
    }

    .badge.red { color: var(--red); background: var(--red-soft); }
    .badge.orange { color: var(--orange); background: var(--orange-soft); }
    .badge.green { color: var(--green); background: var(--green-soft); }
    .badge.blue { color: var(--blue); }

    .result {
      padding: 14px;
      margin-top: 14px;
      box-shadow: none;
    }

    .result.urgent {
      border-color: var(--red);
      background: var(--red-soft);
    }

    .list {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .list li {
      margin: 5px 0;
    }

    .tabs-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 14px;
    }

    .pill {
      text-align: center;
      border-color: var(--line);
      font-weight: 650;
    }

    .pill.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .atlas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .atlas-card img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-2);
    }

    .atlas-card .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: var(--surface-2);
      color: var(--blue);
      font-size: 13px;
    }

    details {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 11px 12px;
    }

    details + details {
      margin-top: 9px;
    }

    summary {
      cursor: pointer;
      font-weight: 750;
      color: var(--blue);
    }

    .report-box {
      min-height: 110px;
      max-height: 230px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      background: rgba(6, 12, 20, .68);
      padding: 18px;
    }

    .modal.open {
      display: grid;
    }

    .modal-card {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow: auto;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 14px;
    }

    .modal-card img {
      width: 100%;
      max-height: 68vh;
      object-fit: contain;
      background: var(--surface-2);
      border-radius: var(--radius);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .letter-context {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .print-sheet {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }

    .source-list {
      display: grid;
      gap: 8px;
      padding-left: 18px;
    }

    .kbd {
      font-family: var(--mono);
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 5px;
      background: var(--surface-2);
      padding: 1px 5px;
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1020px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 40;
        width: min(330px, 88vw);
        transform: translateX(-102%);
        transition: transform .2s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .mobile-menu { display: inline-flex; }
      .main { padding: 14px; }
      .topbar { padding-top: 6px; }
      .topbar h2 { font-size: 21px; }
      .grid.two, .grid.three, .grid.four { grid-template-columns: 1fr; }
    }

    @media print {
      .sidebar, .topbar, .no-print { display: none !important; }
      .app { display: block; }
      .main { padding: 0; }
      body { background: #fff; color: #000; }
      .panel, .card, .print-sheet { box-shadow: none; break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>Hanche MG</h1>
        <p>Examen clinique, diagnostic differentiel et decision therapeutique.</p>
      </div>
      <div class="search">
        <input id="searchInput" type="search" placeholder="Recherche rapide : FADIR, PRP, fracture...">
        <div id="searchResults" class="small muted"></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-panel">
        <h2>Compte rendu</h2>
        <div id="reportBox" class="report-box">Aucun element ajoute.</div>
        <div class="badge-row">
          <button class="tool-btn" id="copyReportBtn" type="button">Copier</button>
          <button class="tool-btn" id="clearReportBtn" type="button">Vider</button>
        </div>
      </div>
      <div class="side-panel">
        <h2>Favoris</h2>
        <div id="favoritesBox" class="small muted">Aucun favori.</div>
      </div>
    </aside>
    <main class="main">
      <div class="topbar no-print">
        <div>
          <button class="tool-btn mobile-menu" id="menuBtn" type="button">Menu</button>
          <h2 id="viewTitle">Accueil</h2>
        </div>
        <div class="actions">
          <button class="tool-btn" id="themeBtn" type="button">Mode sombre</button>
          <button class="tool-btn" id="printBtn" type="button">Imprimer</button>
          <button class="tool-btn primary" id="exportBtn" type="button">Exporter compte rendu</button>
        </div>
      </div>
      <section id="content"></section>
    </main>
  </div>

  <div class="modal" id="imageModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle" style="margin:0"></h3>
          <p id="modalCaption" class="muted small" style="margin:4px 0 0"></p>
        </div>
        <button class="tool-btn danger" id="closeModalBtn" type="button">Fermer</button>
      </div>
      <img id="modalImg" alt="">
    </div>
  </div>

  <script>
    const KB = JSON.parse(document.getElementById('knowledge-base').textContent);

    const state = {
      view: 'accueil',
      reportItems: [],
      favorites: new Set(JSON.parse(localStorage.getItem('hanchemg:favorites') || '[]')),
      lastDecision: null,
      activeTopo: 'inguinale',
      selectedLetter: 'orthopedie',
      selectedSheet: 'urgence'
    };

    const titles = Object.fromEntries(KB.nav);
    const content = document.getElementById('content');
    const viewTitle = document.getElementById('viewTitle');
    const nav = document.getElementById('nav');
    const sidebar = document.getElementById('sidebar');
    const reportBox = document.getElementById('reportBox');
    const favoritesBox = document.getElementById('favoritesBox');

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    }

    function list(items) {
      return `<ul class="list">${items.map(item => `<li>${esc(item)}</li>`).join('')}</ul>`;
    }

    function badge(text, cls = 'blue') {
      return `<span class="badge ${cls}">${esc(text)}</span>`;
    }

    function saveFavorites() {
      localStorage.setItem('hanchemg:favorites', JSON.stringify([...state.favorites]));
      renderFavorites();
    }

    function toggleFavorite(id, label) {
      const key = `${id}|${label}`;
      if (state.favorites.has(key)) state.favorites.delete(key);
      else state.favorites.add(key);
      saveFavorites();
      render();
    }

    function renderNav() {
      nav.innerHTML = KB.nav.map(([id, label]) => `
        <button type="button" class="${state.view === id ? 'active' : ''}" data-view="${id}">
          <span>${esc(label)}</span><span aria-hidden="true">›</span>
        </button>
      `).join('');
      nav.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          state.view = btn.dataset.view;
          sidebar.classList.remove('open');
          render();
          window.scrollTo({top: 0, behavior: 'smooth'});
        });
      });
    }

    function renderFavorites() {
      const favs = [...state.favorites].map(item => {
        const [id, label] = item.split('|');
        return `<button class="pill" type="button" data-fav="${esc(id)}">${esc(label)}</button>`;
      });
      favoritesBox.innerHTML = favs.length ? `<div class="badge-row">${favs.join('')}</div>` : 'Aucun favori.';
    }

    function addReport(label, text) {
      const line = `${label} : ${text}`;
      if (!state.reportItems.includes(line)) state.reportItems.push(line);
      renderReport();
    }

    function renderReport() {
      reportBox.textContent = state.reportItems.length ? state.reportItems.join('\n') : 'Aucun element ajoute.';
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text);
      const area = document.createElement('textarea');
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
      return Promise.resolve();
    }

    function openImage(test) {
      document.getElementById('modalTitle').textContent = test.name;
      document.getElementById('modalCaption').textContent = test.caption;
      const img = document.getElementById('modalImg');
      img.src = test.image;
      img.alt = test.alt;
      document.getElementById('imageModal').classList.add('open');
    }

    function decisionFromFeatures(f) {
      const age = Number(f.age || 0);
      const urgent = [];
      const hypotheses = [];
      const exams = [];
      const conduct = [];
      const orientation = [];

      if (f.trauma && (age >= 65 || f.noSupport || f.externalRotation)) {
        urgent.push('Fracture du col femoral ou du bassin jusqu\'a preuve du contraire.');
        exams.push('Radiographie bassin + hanche en urgence ; IRM ou scanner si radio normale mais appui impossible ou douleur persistante.');
        conduct.push('Antalgie, decharge, orientation urgences/orthopedie. Ne pas infiltrer.');
        orientation.push('Urgences / orthopedie');
      }
      if (f.fever || f.aeg || f.passiveSevere) {
        urgent.push('Arthrite septique ou infection osteo-articulaire a exclure rapidement.');
        exams.push('NFS, CRP, hemocultures selon contexte, imagerie et ponction specialisee en urgence.');
        conduct.push('Orientation hospitaliere. Ne pas infiltrer, ne pas retarder la prise en charge.');
        orientation.push('Urgences / rhumatologie / orthopedie');
      }
      if (f.cancer || f.weightLoss || f.nightProgressive) {
        urgent.push('Douleur tumorale, fracture pathologique ou pathologie generale a evoquer.');
        exams.push('Imagerie adaptee rapide, biologie selon contexte, avis specialise.');
        conduct.push('Ne pas banaliser une douleur osseuse progressive non mecanique.');
        orientation.push('Specialiste / urgences selon etat general');
      }
      if (age < 18 && (f.limp || f.noSupport || f.painSite === 'genou' || f.fever)) {
        urgent.push('Chez l\'enfant/adolescent : penser hanche devant boiterie ou douleur de genou.');
        exams.push('Radiographie bassin/hanche selon contexte ; urgence si fievre, refus d\'appui ou suspicion epiphysiolyse.');
        conduct.push('Eviter mobilisation forcee ; decharge si EFS suspectee.');
        orientation.push('Pediatrie / orthopedie');
      }

      if (f.painSite === 'inguinale' && f.mechanical && age >= 50 && f.limitedIR) {
        hypotheses.push('Coxarthrose probable, a confirmer par examen comparatif et radiographie.');
        exams.push('Radiographie bassin face + hanche face/profil ; calculer retentissement fonctionnel.');
        conduct.push('Education, activite adaptee, kine, antalgiques/AINS si non contre-indiques ; discuter infiltration corticoide guidee seulement en poussee douloureuse.');
        orientation.push('Orthopedie si Lequesne >= 10-12, marche limitee et echec traitement bien conduit.');
      }
      if (f.painSite === 'inguinale' && f.fadir && (age < 55 || f.click)) {
        hypotheses.push('Conflit femoro-acetabulaire ou lesion labrale possible.');
        exams.push('Radiographies bassin + profil ; IRM/arthro-IRM plutot apres avis specialise si persistance.');
        conduct.push('Adapter sport, kine specialisee, eviter mouvements de conflit repetes.');
        orientation.push('Medecine du sport / orthopedie si douleur persistante.');
      }
      if (f.painSite === 'laterale' && (f.trochanter || f.monoSupportPain)) {
        hypotheses.push('Syndrome douloureux du grand trochanter / tendinopathie abducteurs probable.');
        exams.push('Diagnostic souvent clinique ; echographie si doute, faiblesse, rupture suspectee ou echec.');
        conduct.push('Kine abducteurs progressive, correction de charge, eviter decubitus lateral douloureux. Corticoide peri-trochanterien possible si crise/bursite refractaire.');
        orientation.push('Rhumatologie, medecine sport ou radiologie interventionnelle si refractaire.');
      }
      if (f.painSite === 'fessiere' && (f.neuro || f.radiation || f.backPain)) {
        hypotheses.push('Origine rachidienne/radiculaire probable, a confronter a l\'examen neurologique.');
        exams.push('Examen neuro minimal ; imagerie rachis si deficit, red flags ou echec prolonge.');
        conduct.push('Traitement lomboradiculaire selon contexte ; urgence si deficit moteur evolutif ou queue de cheval.');
        orientation.push('Rhumatologie, neurologie, urgences si deficit.');
      }
      if (f.painSite === 'pubienne' || f.adductor) {
        hypotheses.push('Pubalgie, tendinopathie adducteurs ou hernie/pathologie pelvienne selon examen.');
        exams.push('Squeeze test, examen herniaire, echo/IRM si persistance ou suspicion fracture de fatigue.');
        conduct.push('Repos relatif sportif, kine progressive, rechercher causes non musculo-squelettiques.');
        orientation.push('Medecine sport, chirurgie digestive, gyneco/urologie selon signes.');
      }
      if (f.painSite === 'genou' && !f.kneeClear) {
        hypotheses.push('Douleur projetee de hanche possible : examiner systematiquement la hanche.');
        exams.push('Mobilites de hanche, rotation interne, radio hanche/bassin si suspicion.');
        conduct.push('Penser coxarthrose chez adulte et EFS/Perthes chez enfant-adolescent.');
        orientation.push('Selon age et signes : orthopedie, pediatrie ou imagerie.');
      }

      if (!urgent.length && !hypotheses.length) {
        hypotheses.push('Orientation non specifique : reprendre topographie, examen comparatif hanche-rachis-genou et rechercher red flags.');
        exams.push('Radiographie si douleur persistante, traumatisme, limitation articulaire ou retentissement ; biologie si profil inflammatoire.');
        conduct.push('Traitement symptomatique prudent, re-evaluation programmee, consignes de reconsultation.');
        orientation.push('MG avec re-evaluation ; specialiste si echec ou atypie.');
      }

      return {
        urgent,
        hypotheses: [...new Set(hypotheses)],
        exams: [...new Set(exams)],
        conduct: [...new Set(conduct)],
        orientation: [...new Set(orientation)]
      };
    }

    function renderDecision(decision) {
      const isUrgent = decision.urgent.length > 0;
      return `
        <div class="result ${isUrgent ? 'urgent' : ''}">
          <div class="badge-row">
            ${isUrgent ? badge('Urgence ou avis rapide', 'red') : badge('Pas de red flag saisi', 'green')}
            ${badge('Orientation diagnostique, a confirmer', 'blue')}
          </div>
          ${decision.urgent.length ? `<h4>Alertes</h4>${list(decision.urgent)}` : ''}
          <h4>Hypotheses principales</h4>${list(decision.hypotheses)}
          <h4>Examens a faire maintenant / ensuite</h4>${list(decision.exams)}
          <h4>Conduite MG</h4>${list(decision.conduct)}
          <h4>Orientation</h4>${list(decision.orientation)}
          <p class="small muted">Rappel : outil d'aide a la decision. Il ne remplace pas le jugement clinique ni les protocoles locaux.</p>
        </div>
      `;
    }

    function getQuickFormValues(form) {
      const data = new FormData(form);
      const f = Object.fromEntries(data.entries());
      form.querySelectorAll('input[type="checkbox"]').forEach(input => f[input.name] = input.checked);
      return f;
    }

    function renderAccueil() {
      const decision = state.lastDecision ? renderDecision(state.lastDecision) : '';
      return `
        <div class="panel">
          <div class="badge-row">
            ${badge('Consultation 2-5 minutes', 'blue')}
            ${badge('Examen bilaterale et comparatif', 'green')}
            ${badge('Ne pas infiltrer sans diagnostic', 'orange')}
          </div>
          <h3>Hanche MG - identifier l'origine de la douleur en consultation</h3>

    function bindAccueil() {
      const form = document.getElementById('quickForm');
      if (!form) return;
      form.addEventListener('submit', event => {
        event.preventDefault();
        const f = getQuickFormValues(form);
        if (f.pattern === 'mechanical') f.mechanical = true;
        if (f.pattern === 'inflammatory') f.inflammatory = true;
        if (f.pattern === 'neuropathic') f.neuro = true;
        state.lastDecision = decisionFromFeatures(f);
        document.getElementById('decisionBox').innerHTML = renderDecision(state.lastDecision);
      });
      document.getElementById('resetQuick').addEventListener('click', () => {
        form.reset();
        state.lastDecision = null;
        document.getElementById('decisionBox').innerHTML = '';
      });
      document.getElementById('addDecisionReport').addEventListener('click', () => {
        if (!state.lastDecision) return;
        addReport('Orientation 90 secondes', [...state.lastDecision.urgent, ...state.lastDecision.hypotheses].join(' | '));
      });
      document.querySelectorAll('[data-quick]').forEach(btn => {
        btn.addEventListener('click', () => {
          const label = btn.dataset.quick;
          const site = document.getElementById('painSite');
          if (label.includes('inguinale') || label.includes('arthrose')) site.value = 'inguinale';
          if (label.includes('laterale') || label.includes('tendinopathie')) site.value = 'laterale';
          if (label.includes('fessiere') || label.includes('rachidienne')) site.value = 'fessiere';
          if (label.includes('pubienne')) site.value = 'pubienne';
          if (label.includes('genou')) site.value = 'genou';
          if (label.includes('Traumatisme')) form.elements.trauma.checked = true;
          if (label.includes('urgence')) form.elements.noSupport.checked = true;
          form.dispatchEvent(new Event('submit'));
        });
      });
      document.querySelectorAll('[data-demo]').forEach(btn => {
        btn.addEventListener('click', () => {
          const demo = KB.demoCases[Number(btn.dataset.demo)];
          form.reset();
          Object.entries(demo.features).forEach(([key, value]) => {
            const el = form.elements[key];
            if (!el) return;
            if (el.type === 'checkbox') el.checked = Boolean(value);
            else el.value = value;
          });
          state.lastDecision = decisionFromFeatures(demo.features);
          document.getElementById('decisionBox').innerHTML = renderDecision(state.lastDecision) + `<div class="notice card green"><strong>Attendu :</strong> ${esc(demo.expected)}</div>`;
        });
      });
    }

    function bindInterrogatoire() {
      const histForm = document.getElementById('historyForm');
      const form = document.getElementById('lequesneForm');
      const checkedValues = name => [...histForm.querySelectorAll(`input[name="${name}"]:checked`)].map(input => input.value);
      const buildHistorySummary = () => {
        const data = Object.fromEntries(new FormData(histForm).entries());
        const antecedents = checkedValues('antecedents');
        const painTypes = checkedValues('painType');
        const impacts = checkedValues('functionImpact');
        const lines = [
          `Interrogatoire hanche : age ${data.age || 'non precise'} ans ; profession ${data.job || 'non precise'} ; activite/sport ${data.sport || 'non precise'}.`,
          `Debut ${data.start || 'non precise'} ; traumatisme recent : ${data.trauma || 'non precise'} ; siege principal : ${data.site || 'non precise'} ; irradiation : ${data.radiation || 'non precise'}.`,
          `Terrain/antecedents : ${antecedents.length ? antecedents.join(', ') : 'non signale dans le formulaire'}.`,
          `Profil douloureux : ${painTypes.length ? painTypes.join(', ') : 'non precise'} ; retentissement : ${impacts.length ? impacts.join(', ') : 'non precise'} ; perimetre de marche : ${data.walk || 'non precise'}.`,
          `Traitements essayes : ${data.treatments || 'non precise'} ; reponse : ${data.response || 'non precise'} ; attente du patient : ${data.expectation || 'non precise'}.`,
          'A confronter a un examen bilaterale et comparatif hanche-rachis-genou, avec recherche systematique de red flags.'
        ];
        const summary = lines.join('\n');
        document.getElementById('historySummary').textContent = summary;
        return summary;
      };
      document.getElementById('makeHistorySummary').addEventListener('click', buildHistorySummary);
      document.getElementById('copyHistorySummary').addEventListener('click', () => copyText(buildHistorySummary()));
      document.getElementById('addHistorySummary').addEventListener('click', () => addReport('Interrogatoire guide', buildHistorySummary()));
      if (!form) return;
      const calc = () => {
        const total = [...new FormData(form).values()].reduce((sum, v) => sum + Number(v), 0);
        let severity = 'leger';
        let cls = 'green';
        if (total >= 6 && total < 10) { severity = 'modere'; cls = 'orange'; }
        if (total >= 10) { severity = 'important/severe'; cls = 'red'; }
        document.getElementById('lequesneResult').innerHTML = `
          <div class="badge-row">${badge(`Score ${total}`, cls)}${badge(`Retentissement ${severity}`, cls)}</div>
          <p>${total >= 10 ? 'Retentissement important : discussion orthopedique possible si coxarthrose radiologique et echec du traitement medical bien conduit.' : 'A interpreter avec douleur, marche, imagerie et attentes du patient.'}</p>
        `;
        return total;
      };
      form.addEventListener('change', calc);
      document.getElementById('calcLeq').addEventListener('click', calc);
      document.getElementById('addLeq').addEventListener('click', () => addReport('Lequesne simplifie', `score ${calc()}`));
      calc();
    }

          addReport('Diagnostic evoque', `${d.name} : ${d.signs}. Examens : ${d.exams}`);
        });
      });
    }

    function renderAlgorithme() {
      const steps = [
        ['1. Red flags ?', 'Si oui : urgence, imagerie/biologie/avis specialise selon contexte. Pas d infiltration.'],
        ['2. Traumatisme ?', 'Radio bassin + hanche. Si radio normale mais douleur importante ou appui impossible : IRM ou scanner.'],
        ['3. Douleur mecanique chronique sans red flag ?', 'Examiner hanche + rachis + genou. Radio bassin/hanche. Kine, activite adaptee, poids, antalgiques/AINS si possibles.'],
        ['4. Douleur inflammatoire ?', 'NFS, CRP, VS selon contexte ; imagerie ; rhumatologue si suspicion rhumatisme inflammatoire.'],
        ['5. Douleur laterale trochanterienne ?', 'Kine abducteurs, correction charge, echo si doute/echec, corticoide peri-trochanterien si crise refractaire. PRP seulement specialise et informe.'],
        ['6. Coxarthrose probable ?', 'Radio, Lequesne, traitement medical. Corticoide guide possible pour poussee ; acide hyaluronique/PRP non standards. Orthopedie si invalidant.'],
        ['7. Conflit/labrum jeune sportif ?', 'FADIR, douleur inguinale, clic. Radio ; IRM/arthro-IRM selon specialiste ; kine specialisee ; avis si persistance.']
      ];
      return `
        <div class="panel">
          <h3>Algorithme decisionnel non opaque</h3>
          ${steps.map(([title, text]) => `<details open><summary>${esc(title)}</summary><p>${esc(text)}</p></details>`).join('')}
        </div>
        <div class="grid three">
          <div class="card red"><h3>Urgence</h3><p>Traumatisme avec appui impossible, fievre + douleur passive majeure, deficit neuro severe, suspicion vasculaire, adolescent avec EFS possible.</p></div>
          <div class="card orange"><h3>Avis rapide</h3><p>Osteonecrose suspectee, douleur osseuse nocturne progressive, rupture abducteurs, douleur persistante avec radio normale.</p></div>
          <div class="card green"><h3>MG programme</h3><p>Douleur mecanique stable sans alerte : examen complet, radiographie si persistance, traitement initial et re-evaluation.</p></div>
        </div>
      `;
    }

    function renderImagerie() {
      const rows = [
        ['Radiographie premiere intention', 'Bassin face, hanche face, profil/faux profil selon contexte.', 'Pincement, osteophytes, geodes, condensation, dysplasie, conflit, fracture, necrose avancee.'],
        ['Echographie', 'Syndrome trochanterien, tendons, bursite, psoas, guidage infiltration, epanchement.', 'Ne remplace pas la prise en charge urgente si arthrite septique suspectee.'],
        ['IRM', 'Radio normale mais douleur persistante, fracture occulte, osteonecrose, fracture de fatigue, labrum/conflit, infection, tumeur.', 'Examen sensible pour moelle osseuse et tissus mous.'],
        ['Scanner', 'Fracture, bilan osseux, pre-operatoire selon orthopedie.', 'Utile si IRM indisponible/contre-indiquee ou detail osseux.'],
        ['Biologie', 'NFS, CRP, VS si douleur inflammatoire, fievre, infection ou rhumatisme inflammatoire suspect.', 'Bilan specifique rhumato/infectieux/metabolique selon contexte.']
      ];
      return `
        <div class="panel">
          <h3>Quels examens demander ?</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Examen</th><th>Quand ?</th><th>Ce que l'on cherche</th></tr></thead>
              <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody>
            </table>
          </div>
        </div>
        <div class="notice card orange">
          <strong>Point cle :</strong> une radiographie normale n'elimine pas une fracture occulte si la douleur et l'impossibilite d'appui persistent.
        </div>
      `;
    }

    function renderInfiltration() {
      const rows = [
        ['Corticoide intra-articulaire', 'Articulation coxo-femorale', 'Quelques jours', 'Semaines a quelques mois', 'Coxarthrose douloureuse en poussee, soulagement court terme, aide diagnostique specialisee', 'Ne modifie pas l evolution ; prudence diabete, immunodepression, chirurgie proche', 'Option reconnue court terme, guidee', 'Utile pour passer un cap douloureux, pas traitement de fond'],
        ['Corticoide peri-trochanterien', 'Bourse/tissus peri-trochanteriens', 'Jours', 'Variable', 'Bursite ou crise douloureuse refractaire du syndrome trochanterien', 'Ne repare pas tendon ; eviter repetitions frequentes', 'Possible au cas par cas', 'Soulagement possible, reeducation centrale'],
        ['Acide hyaluronique', 'Intra-articulaire', 'Lent', 'Variable/incertain', 'Cas selectionnes specialises si options classiques insuffisantes', 'Benefice incertain, remboursement variable, recommandations prudentes/defavorables', 'Non standard hanche', 'A discuter au cas par cas, pas en premiere intention'],
        ['PRP', 'Tendon ou articulation selon indication', 'Semaines', 'Variable', 'Tendinopathie chronique selectionnee ou arthrose debutante en contexte specialise', 'Non standard coxarthrose, cout, donnees heterogenes', 'Prudent/defavorable pour OA hanche dans plusieurs guidelines', 'Option specialisee, information loyale obligatoire'],
        ['Anesthesique diagnostique', 'Intra-articulaire guide', 'Immediat', 'Heures', 'Aide a localiser douleur intra-articulaire', 'Ne traite pas la cause', 'Specialise', 'Peut aider a confirmer l origine de la douleur']
      ];
      return `
        <div class="panel">
          <h3>Infiltrer ou ne pas infiltrer ?</h3>
          <div class="card red">
            <strong>Principe general :</strong> une infiltration ne remplace pas le diagnostic. Ne jamais infiltrer en cas de suspicion infection, fracture, tumeur, arthrite septique, douleur severe inexpliquee ou red flag. La hanche est profonde : privilegier un guidage echographique, radioscopique ou scanner selon disponibilite.
          </div>
        </div>
        <div class="grid two">
          <div class="card green"><h3>Corticoide intra-articulaire</h3><p>Option de soulagement court terme dans coxarthrose douloureuse, surtout poussee inflammatoire ou besoin de passer un cap pour reeducation. Ne modifie pas l'evolution structurelle.</p></div>
          <div class="card green"><h3>Corticoide peri-trochanterien</h3><p>Peut aider si bursite/crise trochanterienne refractaire, mais la reeducation progressive des abducteurs reste centrale en tendinopathie chronique.</p></div>
          <div class="card orange"><h3>Viscosupplementation / acide hyaluronique</h3><p>Ne pas presenter comme standard de coxarthrose. A discuter seulement au cas par cas, patient informe, benefice incertain et recommandations internationales prudentes ou defavorables.</p></div>
          <div class="card orange"><h3>PRP</h3><p>Produit autologue, non standard pour coxarthrose. Option specialisee possible chez patients selectionnes ; ne doit pas retarder abusivement une chirurgie necessaire.</p></div>
        </div>
        <div class="panel">
          <h3>Tableau comparatif</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Technique</th><th>Cible</th><th>Delai</th><th>Duree</th><th>Indications</th><th>Limites</th><th>Niveau</th><th>Message patient</th></tr></thead>
              <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderChirurgie() {
      return `
        <div class="grid two">
          <div class="panel">
            <h3>Adresser rapidement / urgence</h3>
            ${list(['Fracture ou fracture occulte suspectee', 'Arthrite septique', 'Osteonecrose avancee ou suspicion forte', 'Epiphysiolyse adolescent', 'Tumeur', 'Deficit neurologique severe', 'Prothese douloureuse'])}
          </div>
          <div class="panel">
            <h3>Avis orthopedique programme</h3>
            ${list(['Coxarthrose radiographique symptomatique', 'Douleur persistante malgre traitement bien conduit', 'Gene importante activites quotidiennes', 'Perimetre de marche reduit', 'Douleur nocturne/repos malgre traitement', 'Raideur importante', 'Lequesne >= 10-12', 'Patient demandeur apres information'])}
          </div>
        </div>
        <div class="panel">
          <h3>Ne pas attendre</h3>
          ${list(['Perte d autonomie progressive', 'Recours permanent aux cannes', 'Impossibilite chaussures/chaussettes', 'Douleurs invalidantes quotidiennes', 'Retentissement professionnel majeur'])}
          <button class="tool-btn primary no-print" type="button" data-letter-shortcut="orthopedie">Generer courrier orthopediste</button>
        </div>
      `;
    }

    function bindChirurgie() {
      const btn = document.querySelector('[data-letter-shortcut]');
      if (btn) btn.addEventListener('click', () => {
        state.selectedLetter = 'orthopedie';
        state.view = 'courriers';
        render();
      });
    }

    function renderFiches() {
      const sheet = KB.patientSheets.find(s => s.id === state.selectedSheet) || KB.patientSheets[0];
      return `
        <div class="panel no-print">
          <h3>Fiches patient imprimables</h3>
          <div class="tabs-inline">
            ${KB.patientSheets.map(s => `<button class="pill ${s.id === state.selectedSheet ? 'active' : ''}" type="button" data-sheet="${esc(s.id)}">${esc(s.title)}</button>`).join('')}
          </div>
        </div>
        <div class="print-sheet" id="patientSheet">
          <h3>${esc(sheet.title)}</h3>
          ${list(sheet.body)}
          <p class="small muted">Fiche d'information generale. Reconsulter en cas d'aggravation, fievre, perte d'appui, deficit neurologique ou douleur inhabituelle.</p>
        </div>
        <div class="badge-row no-print">
          <button class="tool-btn primary" type="button" id="printSheet">Imprimer cette fiche</button>
          <button class="tool-btn" type="button" id="copySheet">Copier</button>
        </div>
      `;
    }

    function bindFiches() {
      document.querySelectorAll('[data-sheet]').forEach(btn => btn.addEventListener('click', () => {
        state.selectedSheet = btn.dataset.sheet;
        render();
      }));
      document.getElementById('printSheet')?.addEventListener('click', () => window.print());
      document.getElementById('copySheet')?.addEventListener('click', () => copyText(document.getElementById('patientSheet').innerText));
    }

    function fillTemplate(text, values) {
      return text.replace(/\$\{(\w+)\}/g, (_, key) => values[key] || '...');
    }

    function renderCourriers() {
      const letter = KB.letters.find(l => l.id === state.selectedLetter) || KB.letters[0];
      const values = {
        patient: document.getElementById('ctxPatient')?.value || 'le/la patient(e)',
        side: document.getElementById('ctxSide')?.value || 'droite/gauche',
        duration: document.getElementById('ctxDuration')?.value || '...',
        walk: document.getElementById('ctxWalk')?.value || '...',
        limp: document.getElementById('ctxLimp')?.value || '...',
        mobility: document.getElementById('ctxMobility')?.value || '...',
        imaging: document.getElementById('ctxImaging')?.value || '...',
        treatments: document.getElementById('ctxTreatments')?.value || '...',
        lequesne: document.getElementById('ctxLequesne')?.value || '...',
        context: document.getElementById('ctxContext')?.value || '...'
      };
      const text = fillTemplate(letter.text, values);
      return `
        <div class="panel no-print">
          <h3>Courriers types</h3>
          <div class="tabs-inline">${KB.letters.map(l => `<button class="pill ${l.id === state.selectedLetter ? 'active' : ''}" type="button" data-letter="${esc(l.id)}">${esc(l.title)}</button>`).join('')}</div>
          <div class="letter-context">
            <input id="ctxPatient" placeholder="Patient(e)" value="${esc(values.patient === 'le/la patient(e)' ? '' : values.patient)}">
            <input id="ctxSide" placeholder="Cote : droit/gauche" value="${esc(values.side === 'droite/gauche' ? '' : values.side)}">
            <input id="ctxDuration" placeholder="Anciennete" value="${esc(values.duration === '...' ? '' : values.duration)}">
            <input id="ctxWalk" placeholder="Perimetre de marche" value="${esc(values.walk === '...' ? '' : values.walk)}">
            <input id="ctxLimp" placeholder="Boiterie" value="${esc(values.limp === '...' ? '' : values.limp)}">
            <input id="ctxMobility" placeholder="Mobilites" value="${esc(values.mobility === '...' ? '' : values.mobility)}">
            <input id="ctxImaging" placeholder="Imagerie / biologie" value="${esc(values.imaging === '...' ? '' : values.imaging)}">
            <input id="ctxTreatments" placeholder="Traitements essayes" value="${esc(values.treatments === '...' ? '' : values.treatments)}">
            <input id="ctxLequesne" placeholder="Score Lequesne" value="${esc(values.lequesne === '...' ? '' : values.lequesne)}">
            <textarea id="ctxContext" placeholder="Contexte clinique">${esc(values.context === '...' ? '' : values.context)}</textarea>
          </div>
          <button class="tool-btn primary" type="button" id="refreshLetter">Actualiser</button>
        </div>
        <div class="print-sheet" id="letterText">
          <h3>${esc(letter.title)}</h3>
          <p>Madame, Monsieur,</p>
          <p>${esc(text)}</p>
          <p>Avec mes remerciements,</p>
        </div>
        <div class="badge-row no-print">
          <button class="tool-btn" type="button" id="copyLetter">Copier le courrier</button>
          <button class="tool-btn" type="button" id="printLetter">Imprimer</button>
          <button class="tool-btn" type="button" id="addLetterReport">Ajouter au compte rendu</button>
        </div>
      `;
    }

    function bindCourriers() {
      document.querySelectorAll('[data-letter]').forEach(btn => btn.addEventListener('click', () => {
        state.selectedLetter = btn.dataset.letter;
        render();
      }));
      document.getElementById('refreshLetter')?.addEventListener('click', render);
      document.getElementById('copyLetter')?.addEventListener('click', () => copyText(document.getElementById('letterText').innerText));
      document.getElementById('printLetter')?.addEventListener('click', () => window.print());
      document.getElementById('addLetterReport')?.addEventListener('click', () => addReport('Courrier genere', KB.letters.find(l => l.id === state.selectedLetter).title));
    }

    function renderExpert() {
      const prompt = `Planche 4x4 photorealiste, cabinet medical sobre, medecin et patient adulte en tenue decente, pas de visage reconnaissable, pas de texte, panels : marche, Trendelenburg, log roll, FADIR, FABER, Scour, Stinchfield, palpation trochanter, abduction resistee, Ober, Thomas, psoas resiste, squeeze adducteurs, FABER sacro-iliaque, examen neuro cruralgie, examen genou douleur projetee.`;
      return `
        <div class="panel">
          <h3>Mode expert / references</h3>
          <p>Les recommandations sont volontairement nuancees : l'application propose une orientation, pas une certitude diagnostique. Les donnees doivent etre adaptees aux protocoles locaux et au terrain patient.</p>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Source</th><th>Usage dans l'application</th></tr></thead>
              <tbody>${KB.references.map(r => `<tr><td><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a></td><td>${esc(r.use)}</td></tr>`).join('')}</tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <h3>Niveaux de prudence integres</h3>
          ${list(['Corticoide intra-articulaire : option court terme, guidee, apres diagnostic raisonnable.', 'Acide hyaluronique : pas standard dans la coxarthrose ; cas par cas specialise, benefice incertain.', 'PRP : non standard pour arthrose de hanche ; option specialisee, information loyale.', 'Fracture occulte : radio normale insuffisante si appui impossible ou douleur persistante.', 'Douleur de genou : penser hanche, surtout enfant/adolescent et sujet age.'])}
        </div>
        <div class="panel">
          <h3>Prompt image source</h3>
          <p class="small muted">Les 16 fichiers `.webp` de l'atlas proviennent d'une planche originale generee puis decoupee localement.</p>
          <pre style="white-space:pre-wrap;border:1px solid var(--line);border-radius:var(--radius);padding:12px;background:var(--surface-2);font-family:var(--mono);font-size:12px">${esc(prompt)}</pre>
        </div>
      `;
    }

    const renderers = {
      accueil: [renderAccueil, bindAccueil],
      redflags: [renderRedflags, bindRedflags],
      interrogatoire: [renderInterrogatoire, bindInterrogatoire],
      examen: [renderExamen, bindTestButtons],
      atlas: [renderAtlas, bindTestButtons],
      diagnostic: [renderDiagnostic, bindDiagnostic],
      algorithme: [renderAlgorithme, () => {}],
      imagerie: [renderImagerie, () => {}],
      infiltration: [renderInfiltration, () => {}],
      chirurgie: [renderChirurgie, bindChirurgie],
      fiches: [renderFiches, bindFiches],
      courriers: [renderCourriers, bindCourriers],
      expert: [renderExpert, () => {}]
    };

    function render() {
      viewTitle.textContent = titles[state.view] || 'Hanche MG';
      renderNav();
      const [html, bind] = renderers[state.view] || renderers.accueil;
      content.innerHTML = html();
      bind();
      renderReport();
      renderFavorites();
    }

    function runSearch(term) {
      const q = term.trim().toLowerCase();
      if (!q) {
        document.getElementById('searchResults').textContent = '';
        return;
      }
      const found = [];
      KB.tests.forEach(t => {
        const blob = `${t.name} ${t.description} ${t.meaning} ${t.indication}`.toLowerCase();
        if (blob.includes(q)) found.push({label: `Test : ${t.name}`, view: 'examen'});
      });
      KB.diagnostics.forEach(d => {
        const blob = Object.values(d).join(' ').toLowerCase();
        if (blob.includes(q)) found.push({label: `Diagnostic : ${d.name}`, view: 'diagnostic'});
      });
      KB.patientSheets.forEach(s => {
        const blob = `${s.title} ${s.body.join(' ')}`.toLowerCase();
        if (blob.includes(q)) found.push({label: `Fiche : ${s.title}`, view: 'fiches'});
      });
      KB.letters.forEach(l => {
        const blob = `${l.title} ${l.text}`.toLowerCase();
        if (blob.includes(q)) found.push({label: `Courrier : ${l.title}`, view: 'courriers'});
      });
      document.getElementById('searchResults').innerHTML = found.slice(0, 8).map(item => `<button class="pill" type="button" data-search-view="${item.view}">${esc(item.label)}</button>`).join('') || 'Aucun resultat.';
      document.querySelectorAll('[data-search-view]').forEach(btn => btn.addEventListener('click', () => {
        state.view = btn.dataset.searchView;
        sidebar.classList.remove('open');
        render();
      }));
    }

    document.getElementById('searchInput').addEventListener('input', e => runSearch(e.target.value));
    document.getElementById('menuBtn').addEventListener('click', () => sidebar.classList.toggle('open'));
    document.getElementById('themeBtn').addEventListener('click', () => {
      const dark = document.body.dataset.theme === 'dark';
      document.body.dataset.theme = dark ? '' : 'dark';
      document.getElementById('themeBtn').textContent = dark ? 'Mode sombre' : 'Mode clair';
    });
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('exportBtn').addEventListener('click', () => {
      const text = state.reportItems.length ? state.reportItems.join('\n') : 'Compte rendu vide.';
      copyText(text);
      alert('Compte rendu copie dans le presse-papiers.');
    });
    document.getElementById('copyReportBtn').addEventListener('click', () => copyText(state.reportItems.join('\n')));
    document.getElementById('clearReportBtn').addEventListener('click', () => {
      state.reportItems = [];
      renderReport();
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('imageModal').classList.remove('open'));
    document.getElementById('imageModal').addEventListener('click', event => {
      if (event.target.id === 'imageModal') event.currentTarget.classList.remove('open');
    });
    window.addEventListener('keydown', event => {
      if (event.key === 'Escape') document.getElementById('imageModal').classList.remove('open');
    });

    render();
  </script>
</body>
</html>
