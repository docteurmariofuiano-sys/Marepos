<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContraAide — Contraception (femme en âge de procréer)</title>
<style>
:root{--bg:#0f1419;--panel:#1a2129;--panel2:#222b35;--line:#2e3a47;--txt:#e6edf3;--muted:#9aa7b4;--accent:#3b82f6;--accent2:#2563eb;--green:#16a34a;--yellow:#eab308;--orange:#f97316;--red:#dc2626;--greenbg:#0e2a1a;--yellowbg:#2a2509;--orangebg:#2a1a09;--redbg:#2a0e0e;--radius:10px}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45}
header{background:linear-gradient(90deg,#0d2818,#14532d);padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
header h1{font-size:16px;margin:0;font-weight:700}header .sub{color:#bbf7d0;font-size:12px}
.layout{display:flex;min-height:calc(100vh - 52px)}
nav{width:230px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;max-height:calc(100vh - 52px);position:sticky;top:52px;flex-shrink:0}
nav .grp{padding:8px 12px 4px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
nav button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--txt);padding:7px 14px;cursor:pointer;font-size:13px;border-left:3px solid transparent}
nav button:hover{background:var(--panel2)}nav button.active{background:var(--panel2);border-left-color:var(--green);color:#fff;font-weight:600}
main{flex:1;padding:18px 24px;overflow-y:auto;max-width:1000px}
section{display:none}section.active{display:block}
h2{font-size:18px;margin:0 0 4px;border-bottom:2px solid var(--green);padding-bottom:6px;display:inline-block}
.hint{color:var(--muted);font-size:12px;margin:6px 0 14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin:12px 0}
.card h3{margin:0 0 10px;font-size:14px;color:#cdd9e5}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
label.f{display:flex;flex-direction:column;gap:3px;font-size:12px;color:var(--muted)}
label.f input,label.f select,label.f textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:7px 8px;font-size:13px;font-family:inherit}
textarea{resize:vertical;min-height:54px;width:100%}
.chk{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:13px;cursor:pointer}
.chk input{margin-top:3px;width:15px;height:15px;flex-shrink:0;accent-color:var(--green)}
.chk.danger{color:#fca5a5}
.chkgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px 20px}
.btn{background:var(--accent2);color:#fff;border:none;border-radius:7px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600}.btn:hover{background:var(--accent)}
.btn.sec{background:var(--panel2);border:1px solid var(--line)}.btn.sec:hover{background:#2c3744}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.feu{padding:14px 16px;border-radius:10px;border:2px solid;font-weight:600;margin:12px 0;font-size:15px}
.feu.vert{background:var(--greenbg);border-color:var(--green);color:#86efac}.feu.jaune{background:var(--yellowbg);border-color:var(--yellow);color:#fde047}
.feu.orange{background:var(--orangebg);border-color:var(--orange);color:#fdba74}.feu.rouge{background:var(--redbg);border-color:var(--red);color:#fca5a5}
.alert{background:var(--redbg);border:1px solid var(--red);border-left:5px solid var(--red);color:#fecaca;padding:10px 14px;border-radius:8px;margin:8px 0;font-size:13px}
.warn{background:var(--orangebg);border-left:5px solid var(--orange);color:#fed7aa;padding:9px 13px;border-radius:8px;margin:8px 0;font-size:13px}
.ok{background:var(--greenbg);border-left:5px solid var(--green);color:#bbf7d0;padding:9px 13px;border-radius:8px;margin:8px 0;font-size:13px}
ul.tight{margin:6px 0;padding-left:20px}ul.tight li{margin:3px 0}
.kpi{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;margin:3px 4px 3px 0;font-size:12px}.kpi b{color:#fff}
.small{font-size:11.5px;color:var(--muted)}
.disclaimer{background:#111;border:1px dashed var(--line);color:var(--muted);font-size:11.5px;padding:8px 12px;border-radius:8px;margin-top:16px;font-style:italic}
.agebadge{grid-column:1/-1;background:var(--greenbg);border:1px solid var(--green);border-radius:8px;padding:8px 12px;font-size:14px;color:#bbf7d0}
.agebadge b{font-size:18px;color:#fff}
.cardci{border-left:4px solid var(--red)}
.sorties{border:1px solid #355; background:#13202b}
.sorties h3{color:#9fd4ff}
.ctxout{width:100%;min-height:150px;background:#0b0f14;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:12px;font-family:ui-monospace,Consolas,monospace;font-size:12.5px;line-height:1.5;resize:vertical;white-space:pre-wrap;margin-top:8px}
a{color:var(--accent)}
@media(max-width:820px){nav{width:54px}nav button{font-size:0;padding:10px 0}nav button::first-letter{font-size:14px}nav .grp{display:none}.grid2{grid-template-columns:1fr}.chkgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>🤰 ContraAide</h1><span class="sub">Contraception · femme en âge de procréer</span>
  <span style="flex:1"></span>
  <a href="index-accueil.html" class="btn sec" style="text-decoration:none">↔ Ménopause</a>
  <button class="btn sec" onclick="saveLS()">💾 Sauver</button>
  <button class="btn sec" onclick="resetAll()">🗑 Effacer</button>
</header>
<div class="layout"><nav id="nav"></nav><main id="main"></main></div>
<script>
const FINAL="Décision finale sous responsabilité du médecin après interrogatoire, examen clinique et vérification des recommandations actualisées.";
const S={};function g(id){return S[id]}function setv(id,v){S[id]=v}
/* maps antécédents (servent aussi à composer la trace / le courrier) */
const ATCD_PERSO={ci_tvp:'ATCD TVP/EP',ci_avc:'ATCD AVC',ci_idm:'ATCD infarctus/coronaropathie',ci_thrombophilie:'thrombophilie',ci_sapl:'lupus/SAPL',ta_nonctrl:'HTA non contrôlée',ta_limite:'HTA traitée/limite',ci_dyslip:'dyslipidémie',ci_immob:'immobilisation/chirurgie programmée',ci_migraine_aura:'migraine AVEC aura',ci_migraine_sans:'migraine sans aura',ci_diab_compl:'diabète compliqué/ancien',ci_diab_simple:'diabète non compliqué',ci_hepato:'hépatopathie sévère/tumeur hépatique'};
const ATCD_GYN={ci_cancersein:'cancer du sein',ci_saign:'saignement génital inexpliqué',atcd_endometriose:'endométriose',atcd_sopk:'SOPK',atcd_fibrome:'fibrome',atcd_menorr:'ménorragies',atcd_dysmen:'dysménorrhée'};
const ATCD_OBST={ob_fc:'fausse couche',ob_ivg:'IVG',ob_geu:'GEU',ob_cesar:'césarienne',ob_premat:'prématurité',ob_preeclampsie:'pré-éclampsie',ob_diabgest:'diabète gestationnel',ob_rciu:'RCIU',ob_hpp:'HPP'};
const ATCD_FAM={fam_thrombo:'thrombose/thrombophilie familiale',fam_cv:'CV précoces',fam_ksein:'cancer sein/ovaire familial'};
function pick(map){return Object.keys(map).filter(k=>g(k)).map(k=>map[k])}
const TABS=[
 ["Dossier",[["id","1 · Identification"],["triage","2 · Triage / Red flags"]]],
 ["Prescrire",[["choix","3 · Choix de pilule"],["progest","4 · Pilule progestative"],["relais","5 · Changement / relais"],["situ","6 · Situations particulières"]]],
 ["Urgences pilule",[["oubli","7 · Oubli de pilule"],["urgence","8 · Contraception d'urgence"],["saign","9 · Saignements"]]],
 ["Grossesse",[["medgr","10 · Médicaments grossesse"],["nutri","11 · Nutrition grossesse"],["ivg","12 · IVG / GND"],["viol","13 · Violences"]]],
 ["Synthèse",[["rapide","14 · Mode rapide 5 min"]]],
];
let current="id";
function buildNav(){let h="";TABS.forEach(([grp,items])=>{h+=`<div class="grp">${grp}</div>`;items.forEach(([id,label])=>{h+=`<button data-tab="${id}" onclick="show('${id}')">${label}</button>`})});document.getElementById('nav').innerHTML=h}
function show(id){current=id;document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));const sec=document.getElementById('sec-'+id);if(sec)sec.innerHTML=SEC[id]();document.querySelectorAll('section').forEach(s=>s.classList.toggle('active',s.id==='sec-'+id));if(RENDER[id])RENDER[id]();refreshAge();window.scrollTo(0,0)}

/* ---- moteur ---- */
function age(){const d=g('ddn');if(!d)return null;const dn=new Date(d);if(isNaN(dn))return null;const ref=new Date();let a=ref.getFullYear()-dn.getFullYear();const m=ref.getMonth()-dn.getMonth();if(m<0||(m===0&&ref.getDate()<dn.getDate()))a--;return a>=0&&a<120?a:null}
function imc(){const p=parseFloat(g('poids')),h=parseFloat(g('taille'));if(!p||!h)return null;const m=h>3?h/100:h;return +(p/(m*m)).toFixed(1)}
function tabacActif(){return g('tabac')==='oui'}function cigJour(){return parseInt(g('cig'))||0}
function inducteurs(){const l=[],m={ind_antiep:"Antiépileptiques inducteurs",ind_rif:"Rifampicine/rifabutine",ind_mille:"Millepertuis",ind_arv:"Antirétroviraux inducteurs"};for(const k in m)if(g(k))l.push(m[k]);return l}
function ciEstroprogestatif(){const ci=[],rel=[];const a=age(),b=imc();
 if(g('ci_migraine_aura'))ci.push("Migraine AVEC aura (CI absolue – risque AVC)");
 if(g('ci_tvp'))ci.push("ATCD TVP / embolie pulmonaire");
 if(g('ci_avc'))ci.push("ATCD AVC");
 if(g('ci_idm'))ci.push("ATCD infarctus / coronaropathie");
 if(g('ci_thrombophilie'))ci.push("Thrombophilie connue");
 if(g('ci_sapl'))ci.push("Lupus avec SAPL");
 if(g('ci_cancersein'))ci.push("Cancer du sein actuel/récent");
 if(g('ci_hepato'))ci.push("Hépatopathie sévère / tumeur hépatique");
 if(g('ci_saign'))ci.push("Saignement génital inexpliqué non exploré");
 if(g('ta_nonctrl'))ci.push("HTA non contrôlée");
 if(a!==null&&a>=35&&tabacActif()&&cigJour()>=15)ci.push("Tabac ≥15 cig/j après 35 ans (CI absolue)");
 if(g('ci_diab_compl'))ci.push("Diabète compliqué / ancien");
 if(g('ci_immob'))ci.push("Immobilisation / chirurgie majeure programmée");
 if(g('pp')==='oui'&&parseInt(g('pp_delai'))<21)ci.push("Post-partum < 21 jours");
 if(a!==null&&a>=35&&tabacActif()&&cigJour()<15)rel.push("Tabac <15 cig/j après 35 ans (CI relative forte)");
 if(a!==null&&a<35&&tabacActif())rel.push("Tabac avant 35 ans : évaluer autres FDR");
 if(g('ci_migraine_sans'))rel.push("Migraine sans aura : prudence (âge, tabac, HTA)");
 if(b!==null&&b>=30)rel.push("Obésité (IMC "+b+") : risque thrombotique, discuter méthode longue durée");
 if(g('ci_diab_simple'))rel.push("Diabète non compliqué : décision individualisée");
 if(g('ci_dyslip'))rel.push("Dyslipidémie : évaluer le risque global");
 if(g('ta_limite'))rel.push("HTA traitée / TA limite à recontrôler avant prescription");
 if(g('fam_thrombo'))rel.push("ATCD familial de thrombose : évaluer (bilan thrombophilie ?)");
 if(g('allait')==='oui'&&parseInt(g('pp_delai'))<42)rel.push("Allaitement < 6 sem : éviter œstrogènes (préférer progestatif)");
 return{ci,rel,possible:ci.length===0}}
function redFlags(){const rf=[],m={rf_thorax:"Douleur thoracique",rf_dyspnee:"Essoufflement brutal",rf_mollet:"Douleur/gonflement mollet",rf_neuro:"Déficit neurologique brutal",rf_parole:"Trouble de la parole",rf_visu:"Trouble visuel brutal",rf_ceph:"Céphalée inhabituelle brutale",rf_ictere:"Ictère",rf_abdo:"Douleur abdominale intense",rf_geu:"Douleur pelvienne + retard règles + métrorragies (GEU ?)",rf_hemo:"Métrorragies abondantes + malaise/hypoTA/tachycardie",rf_fievre:"Fièvre + douleur pelvienne (IGH ?)",rf_torsion:"Douleur pelvienne unilatérale brutale (torsion ?)",rf_postcoit:"Saignement post-coïtal répété",rf_masse:"Masse mammaire dure/fixe",rf_retract:"Rétraction cutanée/mamelonnaire",rf_ecoul:"Écoulement sanglant unipore",rf_adp:"Adénopathie axillaire suspecte"};for(const k in m)if(g(k))rf.push(m[k]);return rf}
function feuC(){const rf=redFlags(),e=ciEstroprogestatif();if(rf.length)return["rouge","🔴 ROUGE — Red flag : urgence/avis spécialisé immédiat, ne pas gérer comme une consultation simple."];if(!e.possible)return["orange","🟠 ORANGE — Œstroprogestatif contre-indiqué : proposer une alternative (progestatif, DIU, implant) ou avis."];if(e.rel.length)return["jaune","🟡 JAUNE — Prescription possible avec prudence : FDR modéré(s), surveillance renforcée."];return["vert","🟢 VERT — Prescription possible en médecine générale (pas de red flag ni CI majeure)."]}

/* ---- helpers UI ---- */
function field(id,label,type='text',opts){const v=g(id)||'';if(type==='select'){let o=opts.map(x=>`<option value="${x[0]}" ${v===x[0]?'selected':''}>${x[1]}</option>`).join('');return`<label class="f">${label}<select onchange="setv('${id}',this.value);live()">${o}</select></label>`}if(type==='textarea')return`<label class="f">${label}<textarea oninput="setv('${id}',this.value)">${v}</textarea></label>`;return`<label class="f">${label}<input type="${type}" value="${v}" oninput="setv('${id}',this.value);live()"></label>`}
function chk(id,label,danger){return`<label class="chk ${danger?'danger':''}"><input type="checkbox" ${g(id)?'checked':''} onchange="setv('${id}',this.checked);live()"><span>${label}</span></label>`}
function refreshAge(){document.querySelectorAll('.ageNow').forEach(e=>e.textContent=age()!=null?age()+' ans':'—')}
function live(){const k=document.getElementById('kpibar');if(k)k.innerHTML=kpiHTML();refreshAge();if(RENDER[current])RENDER[current]()}
function kpiHTML(){const e=ciEstroprogestatif();return`<span class="kpi">Âge : <b>${age()??'—'}</b></span><span class="kpi">IMC : <b>${imc()??'—'}</b></span><span class="kpi">TA : <b>${g('ta')||'—'}</b></span><span class="kpi">Tabac : <b>${g('tabac')==='oui'?cigJour()+' cig/j':'non'}</b></span><span class="kpi">Grossesse possible : <b>${g('gross_poss')||'—'}</b></span><span class="kpi">CI œstroprog. : <b style="color:${e.possible?'#86efac':'#fca5a5'}">${e.possible?'aucune':e.ci.length}</b></span><span class="kpi">Red flags : <b style="color:${redFlags().length?'#fca5a5':'#86efac'}">${redFlags().length}</b></span>`}
const RENDER={};const SECTIONS=[],SEC={};function def(id,fn){SECTIONS.push(id);SEC[id]=fn}
const DISC=`<div class="disclaimer">⚠ ${FINAL}</div>`;
const KPIBAR=`<div id="kpibar" class="card" style="padding:8px 12px"></div>`;
function buildMain(){document.getElementById('main').innerHTML=SECTIONS.map(s=>`<section id="sec-${s}"></section>`).join('');for(const s in SEC)document.getElementById('sec-'+s).innerHTML=SEC[s]()}

/* ---- bloc Sorties contextuel ---- */
function sorties(ctx){return`<div class="card sorties"><h3>📤 Sorties pour cet item</h3>
<div class="btnrow">
<button class="btn" onclick="ctxGen('fiche','${ctx}')">📄 Fiche patiente</button>
<button class="btn" onclick="ctxGen('trace','${ctx}')">📝 Trace dossier</button>
<button class="btn" onclick="ctxGen('courrier','${ctx}')">✉️ Courrier</button>
</div>
<textarea id="ctxout-${ctx}" class="ctxout" placeholder="Cliquez sur un bouton ci-dessus — le texte généré s'affiche ici et reste modifiable avant copie/impression."></textarea>
<div class="btnrow"><button class="btn sec" onclick="copyTA('ctxout-${ctx}')">📋 Copier</button><button class="btn sec" onclick="printTA('ctxout-${ctx}')">🖨 Imprimer</button></div></div>`}
function ctxGen(kind,ctx){const t=kind==='fiche'?ficheFor(ctx):kind==='trace'?traceFor(ctx):courrierFor(ctx);document.getElementById('ctxout-'+ctx).value=t}
function pat(){return `${g('nom')||''} ${g('prenom')||''}`.trim()||'Patiente'}

/* 1 IDENTIFICATION — antécédents en cases à cocher, reliés au moteur de CI */
def('id',()=>`<h2>1 · Identification patiente</h2><p class="hint">Cochez les antécédents : les contre-indications à la pilule s'allument automatiquement ci-dessous et dans l'onglet « Choix de pilule ».</p>
<div id="kpibar" class="card" style="padding:8px 12px">${kpiHTML()}</div>
<div class="card"><h3>État civil & morphologie</h3><div class="grid">${field('nom','Nom')}${field('prenom','Prénom')}${field('ddn','Date de naissance','date')}<div class="agebadge">🎂 Âge calculé : <b class="ageNow">—</b></div>${field('poids','Poids (kg)','number')}${field('taille','Taille (cm)','number')}${field('ta','Tension artérielle')}</div></div>
<div class="card"><h3>Mode de vie</h3><div class="grid">${field('tabac','Tabac','select',[['','—'],['non','Non'],['oui','Oui']])}${field('cig','Cigarettes/jour','number')}${field('alcool','Alcool (verres/sem.)')}</div></div>
<div class="card cardci"><h3>Antécédents personnels — vasculaire / thrombose / métabolique</h3><div class="chkgrid">${chk('ci_tvp','ATCD thrombose veineuse / embolie pulmonaire',1)}${chk('ci_avc','ATCD AVC',1)}${chk('ci_idm','ATCD infarctus / coronaropathie',1)}${chk('ci_thrombophilie','Thrombophilie connue',1)}${chk('ci_sapl','Lupus / SAPL',1)}${chk('ci_immob','Immobilisation prolongée / chirurgie majeure programmée',1)}${chk('ci_migraine_aura','Migraine AVEC aura',1)}${chk('ci_migraine_sans','Migraine sans aura')}${chk('ta_nonctrl','HTA non contrôlée',1)}${chk('ta_limite','HTA traitée / TA limite')}${chk('ci_diab_compl','Diabète compliqué / ancien',1)}${chk('ci_diab_simple','Diabète non compliqué')}${chk('ci_dyslip','Dyslipidémie')}${chk('ci_hepato','Hépatopathie sévère / tumeur hépatique',1)}</div></div>
<div class="card cardci"><h3>Antécédents gynéco-mammaires</h3><div class="chkgrid">${chk('ci_cancersein','Cancer du sein actuel ou ancien',1)}${chk('ci_saign','Saignement génital inexpliqué',1)}${chk('atcd_endometriose','Endométriose')}${chk('atcd_sopk','SOPK')}${chk('atcd_fibrome','Fibrome utérin')}${chk('atcd_menorr','Ménorragies')}${chk('atcd_dysmen','Dysménorrhée')}</div></div>
<div class="card"><h3>Antécédents obstétricaux</h3><div class="grid" style="margin-bottom:6px">${field('g_geste','Gestité (G)','number')}${field('p_parite','Parité (P)','number')}</div><div class="chkgrid">${chk('ob_fc','Fausse couche')}${chk('ob_ivg','IVG')}${chk('ob_geu','GEU')}${chk('ob_cesar','Césarienne')}${chk('ob_premat','Prématurité')}${chk('ob_preeclampsie','Pré-éclampsie')}${chk('ob_diabgest','Diabète gestationnel')}${chk('ob_rciu','RCIU')}${chk('ob_hpp','Hémorragie du post-partum')}</div></div>
<div class="card"><h3>Antécédents familiaux</h3><div class="chkgrid">${chk('fam_thrombo','Thrombose / thrombophilie familiale')}${chk('fam_cv','ATCD CV précoces')}${chk('fam_ksein','Cancer sein / ovaire familial')}</div></div>
<div class="card"><h3>Inducteurs enzymatiques</h3><div class="chkgrid">${chk('ind_antiep','Antiépileptiques inducteurs')}${chk('ind_rif','Rifampicine / rifabutine')}${chk('ind_mille','Millepertuis')}${chk('ind_arv','Antirétroviraux inducteurs')}</div></div>
<div class="card"><h3>Allergies · traitements · précisions (texte libre)</h3><div class="grid2">${field('allergies','Allergies','textarea')}${field('ttt','Traitements en cours','textarea')}${field('atcd_autres','Autres antécédents / précisions','textarea')}</div></div>
<div class="card"><h3>Statut gynéco-obstétrical</h3><div class="grid">${field('ddr','Dernières règles','date')}${field('cycles','Cycles','select',[['','—'],['reg','Réguliers'],['irreg','Irréguliers']])}${field('gross_poss','Grossesse possible','select',[['','—'],['non','Non'],['oui','Oui'],['incertain','Incertain']])}${field('test_gross','Test grossesse','select',[['','—'],['non','Non réalisé'],['neg','Négatif'],['pos','Positif']])}${field('allait','Allaitement','select',[['','—'],['non','Non'],['oui','Oui']])}${field('pp','Post-partum','select',[['','—'],['non','Non'],['oui','Oui']])}${field('pp_delai','Délai accouchement (jours)','number')}${field('frottis','Dernier frottis / HPV (date + résultat)')}</div></div>
<div id="ci-live"></div>${DISC}`);
RENDER['id']=()=>{const el=document.getElementById('ci-live');if(!el)return;const e=ciEstroprogestatif(),[f,ftxt]=feuC();let h=`<div class="feu ${f}">${ftxt}</div>`;if(e.ci.length)h+=`<div class="alert"><b>🚫 Contre-indications aux œstroprogestatifs détectées (d'après les antécédents cochés) :</b><ul class="tight">${e.ci.map(x=>`<li>${x}</li>`).join('')}</ul>→ Orienter vers progestatif / DIU / implant. Détail dans l'onglet 3.</div>`;else h+=`<div class="ok">Aucune contre-indication absolue aux œstroprogestatifs détectée à partir des antécédents cochés.</div>`;if(e.rel.length)h+=`<div class="warn"><b>Prudence :</b> ${e.rel.join(' · ')}</div>`;el.innerHTML=h};

/* 2 TRIAGE */
def('triage',()=>`<h2>2 · Triage / Red flags</h2><p class="hint">À rechercher AVANT toute analyse. Une seule case déclenche l'alerte.</p><div id="rf-banner"></div>
<div class="card"><h3>Red flags vasculaires / pilule</h3><div class="chkgrid">${chk('rf_thorax','Douleur thoracique',1)}${chk('rf_dyspnee','Essoufflement brutal',1)}${chk('rf_mollet','Douleur/gonflement mollet',1)}${chk('rf_neuro','Déficit neurologique brutal',1)}${chk('rf_parole','Trouble de la parole',1)}${chk('rf_visu','Trouble visuel brutal',1)}${chk('rf_ceph','Céphalée inhabituelle brutale',1)}${chk('rf_ictere','Ictère',1)}${chk('rf_abdo','Douleur abdominale intense',1)}</div></div>
<div class="card"><h3>Red flags gynécologiques</h3><div class="chkgrid">${chk('rf_geu','Douleur pelvienne + retard règles + métrorragies (GEU ?)',1)}${chk('rf_hemo','Métrorragies abondantes + malaise/hypoTA',1)}${chk('rf_fievre','Fièvre + douleur pelvienne (IGH ?)',1)}${chk('rf_torsion','Douleur unilatérale brutale (torsion ?)',1)}${chk('rf_postcoit','Saignement post-coïtal répété',1)}${chk('rf_masse','Masse mammaire dure/fixe',1)}${chk('rf_retract','Rétraction cutanée/mamelonnaire',1)}${chk('rf_ecoul','Écoulement sanglant unipore',1)}${chk('rf_adp','Adénopathie axillaire suspecte',1)}</div></div>
<div class="card"><h3>Orientation si red flag</h3><div class="small">Urgences gynécologiques · Maternité · SAU · SAMU 15 si instabilité.</div></div>${DISC}`);
RENDER['triage']=()=>{const el=document.getElementById('rf-banner');if(!el)return;const rf=redFlags();el.innerHTML=rf.length?`<div class="alert"><b>🔴 URGENCE OU AVIS SPÉCIALISÉ IMMÉDIAT — ne pas gérer comme une consultation simple.</b><ul class="tight">${rf.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="ok">Aucun red flag coché.</div>`};

/* 3 CHOIX — antécédents/CI gérés dans l'onglet 1 ; ici objectifs + résultat */
def('choix',()=>`<h2>3 · Choix de pilule contraceptive</h2><p class="hint">Les contre-indications proviennent des antécédents cochés à l'onglet 1 (modifiez-les là-bas si besoin).</p>${KPIBAR}
<div class="card"><h3>Objectif(s) / contexte</h3><div class="chkgrid">${chk('obj_simple','Contraception simple')}${chk('obj_acne','Amélioration acné')}${chk('obj_dysmen','↓ Dysménorrhée')}${chk('obj_menorr','↓ Ménorragies')}${chk('obj_cycle','Régularisation cycles')}${chk('obj_endo','Endométriose connue/suspectée')}${chk('obj_sopk','SOPK')}${chk('obj_oral','Préférence orale / refus DIU-implant')}${chk('risque_ist','Risque IST / nouveau partenaire')}</div></div>
<div id="choix-out"></div>${sorties('pilule')}${DISC}`);
RENDER['choix']=()=>{const el=document.getElementById('choix-out');if(!el)return;const e=ciEstroprogestatif(),[f,ftxt]=feuC(),ind=inducteurs();let h=`<div class="feu ${f}">${ftxt}</div>`;
 if(redFlags().length){el.innerHTML=h+`<div class="alert">Red flags actifs (onglet 2) — traiter en priorité.</div>`;return}
 if(e.ci.length)h+=`<div class="alert"><b>Œstroprogestatif contre-indiqué/déconseillé</b> (antécédents onglet 1) :<ul class="tight">${e.ci.map(x=>`<li>${x}</li>`).join('')}</ul>Alternative : <b>pilule progestative</b>, <b>DIU cuivre</b>, <b>DIU-LNG</b>, <b>implant</b>, préservatif, ou avis.</div>`;
 else h+=`<div class="ok"><b>Œstroprogestatif possible.</b> Privilégier une pilule <b>2ᵉ génération</b> (lévonorgestrel) en 1ʳᵉ intention (moindre risque thrombotique). Vérifier la TA avant prescription.</div>`;
 if(e.rel.length)h+=`<div class="warn"><b>Prudence :</b><ul class="tight">${e.rel.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
 if(ind.length)h+=`<div class="warn"><b>Inducteurs enzymatiques</b> → efficacité réduite : ${ind.join(' ; ')}. Préférer une méthode non dépendante (DIU) ou avis.</div>`;
 const tips=[];if(g('obj_acne'))tips.push("Acné : un OP peut aider ; éviter cyprotérone hors indication stricte ; avis dermato si sévère.");if(g('obj_endo')||g('obj_dysmen')||g('atcd_endometriose')||g('atcd_dysmen'))tips.push("Endométriose/dysménorrhée : pilule en continu possible, ou DIU-LNG ; avis gynéco si sévère.");if(g('obj_menorr')||g('atcd_menorr'))tips.push("Ménorragies : DIU-LNG souvent pertinent ; éviter DIU cuivre ; NFS/ferritine.");if(g('risque_ist'))tips.push("Risque IST : la pilule ne protège pas → préservatif + dépistage.");
 if(tips.length)h+=`<div class="card"><h3>Selon l'objectif / les antécédents</h3><ul class="tight">${tips.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
 h+=rxBlock(e.possible?'op':'prog');
 el.innerHTML=h};

/* 4 PROGESTATIVE */
def('progest',()=>`<h2>4 · Pilule progestative (microprogestative)</h2><p class="hint">Option privilégiée quand les œstrogènes sont contre-indiqués (antécédents onglet 1).</p>${KPIBAR}
<div class="card"><h3>Indications préférentielles (auto-détectées)</h3><div id="prog-ind" class="small"></div></div>
<div class="card"><h3>À vérifier avec la patiente</h3><div class="chkgrid">${chk('prog_obs','Observance stricte possible (désogestrel ≤12 h ; lévonorgestrel ≤3 h)')}${chk('prog_spot','Spotting/aménorrhée acceptés')}</div></div>
<div id="prog-out"></div>${sorties('progest')}${DISC}`);
RENDER['progest']=()=>{const el=document.getElementById('prog-out'),ie=document.getElementById('prog-ind');if(!el)return;const ind=[];if(g('ci_migraine_aura'))ind.push("Migraine avec aura");if(age()>=35&&tabacActif())ind.push("Tabac après 35 ans");if(g('allait')==='oui')ind.push("Allaitement");if(g('pp')==='oui')ind.push("Post-partum");if(g('ci_tvp')||g('ci_thrombophilie'))ind.push("Risque thromboembolique");if(g('ta_nonctrl')||g('ta_limite'))ind.push("HTA");if(ie)ie.innerHTML=ind.length?'✔ '+ind.join(' · '):'Aucune indication spécifique — reste possible sur préférence.';
 let h=(g('ci_cancersein')||g('ci_hepato'))?`<div class="alert">Cancer du sein ou hépatopathie sévère (onglet 1) → progestatif aussi déconseillé. Avis spécialisé.</div>`:`<div class="ok"><b>Pilule progestative possible.</b></div>`;
 h+=`<div class="card"><h3>Information patiente</h3><ul class="tight"><li>Spotting / aménorrhée fréquents, surtout les premiers mois.</li><li>Fenêtre d'oubli stricte : <b>désogestrel 12 h</b>, <b>lévonorgestrel 3 h</b>.</li><li>Contrôle à 3 mois si mauvaise tolérance.</li><li>Pas de protection IST.</li>${inducteurs().length?'<li class="danger">Inducteurs enzymatiques → efficacité réduite (sauf DMPA/DIU).</li>':''}</ul></div>`;h+=rxBlock('prog');el.innerHTML=h};

/* 5 RELAIS */
def('relais',()=>`<h2>5 · Changement / relais contraceptif</h2>${KPIBAR}
<div class="card"><h3>Type</h3>${field('rel_type','Situation','select',[['','—'],['op_op','Pilule → pilule'],['op_diuc','Pilule → DIU cuivre'],['op_diulng','Pilule → DIU-LNG'],['op_impl','Pilule → implant'],['op_anneau','Pilule → anneau/patch'],['impl_op','Implant → pilule'],['diu_op','DIU → pilule'],['inj_op','Injectable → pilule'],['arret','Arrêt pour désir de grossesse'],['post_ivg','Post-IVG'],['post_fc','Post-fausse couche'],['post_partum','Post-partum']])}</div>
<div id="rel-out"></div>${sorties('relais')}${DISC}`);
RENDER['relais']=()=>{const el=document.getElementById('rel-out');if(!el)return;const t=g('rel_type');if(!t){el.innerHTML='';return}const D={op_op:["Enchaîner directement la nouvelle pilule (pas d'intervalle libre).","Non si immédiat.","Non si bonne observance.","Aucune."],op_diuc:["Poser le DIU sous pilule active ; effet immédiat.","Non.","Non.","Aucune."],op_diulng:["Poser sous pilule active ; effet du DIU-LNG en 7 j → préservatif 7 j si pilule arrêtée avant.","7 j si arrêt pilule.","Non.","Faible si chevauchement."],op_impl:["Poser sous pilule active ; sinon préservatif 7 j.","7 j sinon.","Non.","Faible."],op_anneau:["Débuter à l'arrêt de la pilule sans intervalle.","Non.","Non.","Aucune."],impl_op:["Pilule le jour du retrait de l'implant.","Non.","Non.","Aucune si chevauchement."],diu_op:["Pilule ≥7 j avant retrait du DIU, ou préservatif 7 j.","7 j sinon.","Non.","Possible si retrait sans chevauchement."],inj_op:["Pilule à la date prévue de l'injection suivante.","Non.","Non.","Faible."],arret:["Arrêt simple ; fertilité rapide (sauf injectable). Acide folique 0,4 mg/j dès le désir.","Non.","Non.","— cf nutrition."],post_ivg:["Contraception immédiate : pilule le jour même ; DIU/implant possibles.","Non si immédiat.","Selon contexte.","Faible."],post_fc:["Idem post-IVG : contraception immédiate.","Non si immédiat.","Selon contexte.","Faible."],post_partum:["OP CI <21 j (≤42 j si FDR/allaitement). Microprogestatif/DIU précoces ; DIU idéalement ≥4 sem.","Selon méthode/délai.","Si aménorrhée/allaitement incomplet.","Selon délai."]};const[d,p,te,fe]=D[t];el.innerHTML=`<div class="card"><h3>Conduite</h3><div class="small">• <b>Grossesse exclue ?</b> ${g('gross_poss')==='non'?'oui (dossier)':'<span class="danger">à confirmer (DDR, test si doute)</span>'}<br>• <b>Début :</b> ${d}<br>• <b>Préservatif temporaire :</b> ${p}<br>• <b>Test grossesse :</b> ${te}<br>• <b>Risque de fenêtre :</b> ${fe}<br>• <b>Contrôle :</b> 3 mois (tolérance, TA si OP).</div></div>`};

/* 6 SITUATIONS */
def('situ',()=>`<h2>6 · Situations particulières</h2>${KPIBAR}<div class="grid2">
<div class="card"><h3>Migraine</h3><div class="small">Avec aura → <b>OP contre-indiqué</b> (microprogestatif/DIU OK). Sans aura → évaluer âge, tabac, HTA, FDR.</div></div>
<div class="card"><h3>Tabac</h3><div class="small"><35 ans → évaluer FDR. ≥35 ans → éviter OP (CI absolue si ≥15 cig/j).</div></div>
<div class="card"><h3>HTA</h3><div class="small">Mesurer la TA. Non contrôlée → éviter OP. Progestatif/DIU possibles.</div></div>
<div class="card"><h3>Obésité</h3><div class="small">Calculer IMC, évaluer FDR. Discuter DIU/implant. OP : risque thrombotique majoré.</div></div>
<div class="card"><h3>Diabète</h3><div class="small">Simple → individualisé. Compliqué/ancien avec atteinte vasculaire → éviter OP.</div></div>
<div class="card"><h3>Acné</h3><div class="small">Évaluer sévérité ; éviter cyprotérone hors indication stricte (méningiome) ; avis dermato si sévère.</div></div>
<div class="card"><h3>Endométriose / dysménorrhée</h3><div class="small">Pilule continue ; DIU-LNG. Avis gynéco si douleurs sévères/infertilité/échec.</div></div>
<div class="card"><h3>Ménorragies</h3><div class="small">Rechercher cause organique ; NFS/ferritine. DIU-LNG pertinent ; éviter DIU cuivre.</div></div></div>${DISC}`);

/* 7 OUBLI */
def('oubli',()=>`<h2>7 · Oubli de pilule</h2><p class="hint">CAT d'après MémoPilules / g-oubliemapilule.</p>
<div class="card"><h3>Situation</h3><div class="grid">${field('o_type','Type de pilule','select',[['','—'],['op','Œstroprogestative (combinée)'],['prog_deso','Microprog. désogestrel (75 µg)'],['prog_levo','Microprog. lévonorgestrel'],['inconnu','Inconnue']])}${field('o_retard','Retard (heures)','number')}${field('o_nb','Nb comprimés oubliés','number')}${field('o_sem','Semaine de plaquette (OP)','select',[['','—'],['1','Semaine 1'],['2','Semaine 2'],['3','Semaine 3']])}</div><div class="chkgrid" style="margin-top:8px">${chk('o_rapport','Rapport non protégé < 5 jours')}${chk('o_vomi','Vomissements/diarrhée < 4 h')}${chk('o_ind','Inducteur enzymatique')}</div></div>
<div id="oubli-out"></div><div class="warn">En cas de doute sur le type exact de pilule ou le délai : vérifier <b>MémoPilules</b> / <b>g-oubliemapilule</b> ou contacter un professionnel.</div>${sorties('oubli')}${DISC}`);
function computeOubli(){const t=g('o_type'),r=parseInt(g('o_retard'))||0,sem=g('o_sem'),rapport=g('o_rapport'),vomi=g('o_vomi');let h='',cu=false,preserv=false,test=false,msg='';if(!t)return{h:`<div class="warn">Renseignez le type de pilule.</div>`,msg:'',cu,preserv,test};
 if(t==='op'){if(r<=12){h=`<div class="ok"><b>Retard ≤ 12 h (OP) :</b> prendre le comprimé oublié immédiatement, continuer à l'heure habituelle. Pas de protection complémentaire. Pas de CU.</div>`;msg="Prends le comprimé oublié tout de suite, continue normalement.";}else{preserv=true;test=true;h=`<div class="warn"><b>Retard > 12 h (OP) :</b> prendre le dernier comprimé oublié immédiatement (quitte à 2 le même jour), continuer. <b>Préservatifs 7 jours.</b></div>`;if(sem==='1'&&rapport){cu=true;h+=`<div class="alert">Oubli semaine 1 + rapport < 5 j → <b>contraception d'urgence</b> (onglet 8).</div>`}if(sem==='3')h+=`<div class="warn">Semaine 3 : enchaîner la plaquette suivante <b>sans intervalle libre</b> (supprimer pause/placebos).</div>`;if(sem==='2')h+=`<div class="small">Semaine 2 : si 7 comprimés précédents bien pris, risque faible ; préservatif 7 j par sécurité.</div>`;msg="Prends vite le dernier comprimé oublié, continue, préservatifs 7 jours."+(sem==='3'?" Enchaîne la plaquette suivante sans pause.":"")+(cu?" Consulte pour une contraception d'urgence.":"");}}
 else if(t==='prog_deso'){if(r<=12){h=`<div class="ok"><b>Désogestrel ≤ 12 h :</b> prendre immédiatement, continuer.</div>`;msg="Prends le comprimé oublié tout de suite.";}else{preserv=true;cu=rapport;test=true;h=`<div class="warn"><b>Désogestrel > 12 h :</b> prendre immédiatement, <b>préservatifs 7 j</b>.</div>${rapport?'<div class="alert">Rapport < 5 j → CU à envisager.</div>':''}`;msg="Prends le comprimé, préservatifs 7 jours."+(rapport?" Consulte pour CU.":"");}}
 else if(t==='prog_levo'){if(r<=3){h=`<div class="ok"><b>Lévonorgestrel microdosé ≤ 3 h :</b> prendre immédiatement, continuer.</div>`;msg="Prends le comprimé oublié tout de suite.";}else{preserv=true;cu=rapport;test=true;h=`<div class="warn"><b>Lévonorgestrel microdosé > 3 h :</b> prendre immédiatement, <b>préservatifs 7 j</b>.</div>${rapport?'<div class="alert">Rapport < 5 j → CU à envisager.</div>':''}`;msg="Prends le comprimé, préservatifs 7 jours."+(rapport?" Consulte pour CU.":"");}}
 else{h=`<div class="warn">Type inconnu : règle la plus stricte (préservatifs 7 j, CU si rapport récent) et identifier la pilule.</div>`;preserv=true;cu=rapport;test=true;msg="Par prudence : préservatifs 7 jours, consulte pour identifier ta pilule et évaluer une CU.";}
 if(vomi)h+=`<div class="warn">Vomissements/diarrhée < 4 h : comprimé non absorbé → en reprendre un (même règle).</div>`;
 if(g('o_ind'))h+=`<div class="warn">Inducteur enzymatique : efficacité réduite ; préservatif prolongé + avis méthode alternative.</div>`;
 return{h,msg,cu,preserv,test}}
RENDER['oubli']=()=>{const el=document.getElementById('oubli-out');if(!el)return;const o=computeOubli();let h=o.h;if(g('o_type'))h+=`<div class="card"><h3>Synthèse</h3><div class="small">CU : <b>${o.cu?'OUI → onglet 8':'non'}</b> · Préservatif : <b>${o.preserv?'7 jours':'non'}</b> · Test grossesse : <b>${o.test?'à 3 semaines si retard/doute':'non'}</b></div><div class="card" style="margin-top:8px;background:var(--panel2)"><b>Message patiente :</b><br>${o.msg}</div></div>`;el.innerHTML=h};

/* 8 CU */
def('urgence',()=>`<h2>8 · Contraception d'urgence</h2>${KPIBAR}
<div class="card"><h3>Évaluation</h3><div class="grid">${field('cu_delai','Délai depuis le rapport (heures)','number')}</div><div class="chkgrid" style="margin-top:8px">${chk('cu_ind','Inducteur enzymatique')}${chk('cu_allait','Allaitement')}${chk('cu_diu_ci','CI au DIU cuivre (IGH, malformation)')}${chk('cu_ist','Risque IST')}${chk('cu_violence','Contexte de violence/contrainte')}${chk('cu_gross_av','Grossesse possible AVANT ce rapport')}</div></div>
<div id="cu-out"></div>${sorties('urgence')}${DISC}`);
RENDER['urgence']=()=>{const el=document.getElementById('cu-out');if(!el)return;const d=parseInt(g('cu_delai'))||0,b=imc()||0;let h='';
 if(g('cu_gross_av'))h+=`<div class="alert">Grossesse déjà possible avant ce rapport → faire un test ; la CU n'est pas abortive.</div>`;
 if(!g('cu_diu_ci')&&d<=120)h+=`<div class="ok"><b>DIU cuivre = méthode la plus efficace</b> (jusqu'à 120 h ; efficace quel que soit le poids ; contraception durable d'emblée). 1ʳᵉ intention si accepté/accessible.</div>`;
 let hr='';if(d<=72){if(g('cu_ind')||b>=26)hr+=`<div class="warn">Lévonorgestrel (≤72 h) : efficacité moindre si IMC élevé ou inducteur → préférer ulipristal/DIU.</div>`;else hr+=`<div class="ok">Lévonorgestrel 1,5 mg possible (≤72 h), au plus tôt.</div>`}
 if(d<=120){hr+=`<div class="ok"><b>Ulipristal acétate (ellaOne) 30 mg</b> : jusqu'à 120 h, plus efficace, notamment si IMC élevé.</div>`;if(g('cu_ind'))hr+=`<div class="warn">Inducteur → efficacité des CU hormonales réduite : privilégier <b>DIU cuivre</b>.</div>`;if(g('cu_allait'))hr+=`<div class="warn">Allaitement : après ulipristal, suspendre l'allaitement 1 semaine ; lévonorgestrel compatible.</div>`;hr+=`<div class="small">Ne pas associer ulipristal + lévonorgestrel. Après ulipristal : attendre 5 j avant de (re)démarrer une contraception hormonale (préservatif d'ici là).</div>`}else hr+=`<div class="alert">Délai > 120 h : hors fenêtre CU/DIU. Test de grossesse, avis, contraception ultérieure.</div>`;
 h+=hr+`<div class="card"><h3>Suites</h3><ul class="tight"><li>Préservatifs jusqu'au relais d'une contraception efficace.</li><li>Test de grossesse à 3 semaines (ou retard > 5–7 j).</li>${g('cu_ist')?'<li>Dépistage IST proposé.</li>':''}${g('cu_violence')?'<li class="danger">Violence → onglet 13, entretien seule, orientation.</li>':''}<li>Mettre en place une contraception régulière.</li></ul></div>`;h+=rxCU();el.innerHTML=h};

/* 9 SAIGNEMENTS */
def('saign',()=>`<h2>9 · Saignements sous contraception</h2>${KPIBAR}
<div class="card"><h3>Caractérisation</h3><div class="grid">${field('sg_methode','Méthode','select',[['','—'],['pilule','Pilule'],['implant','Implant'],['diuc','DIU cuivre'],['diulng','DIU-LNG'],['inj','Injectable'],['patch','Patch/Anneau']])}${field('sg_profil','Profil','select',[['','—'],['spotting','Spotting'],['abondant','Abondant'],['prolonge','Prolongé'],['postcoit','Post-coïtal'],['douloureux','Douloureux']])}</div><div class="chkgrid" style="margin-top:8px">${chk('sg_obs','Mauvaise observance')}${chk('sg_gross','Grossesse possible')}${chk('sg_douleur','Douleurs pelviennes')}${chk('sg_fievre','Fièvre')}${chk('sg_pertes','Pertes vaginales anormales')}${chk('sg_ist','Risque IST')}${chk('sg_fdr_endo','FDR cancer endomètre (âge, obésité, SOPK, diabète, tamoxifène)')}</div></div>
<div id="sg-out"></div>${sorties('saign')}${DISC}`);
RENDER['saign']=()=>{const el=document.getElementById('sg-out');if(!el)return;const danger=g('sg_gross')||g('sg_fievre')||g('sg_douleur')||g('sg_profil')==='postcoit'||g('sg_fdr_endo');let h=`<div class="card"><h3>Toujours exclure</h3><div class="small">Grossesse · GEU · IGH · IST · pathologie cervicale/endométriale · mauvais positionnement DIU (douleur/fils) · cancer selon âge.</div></div>`;
 if(danger)h+=`<div class="warn"><b>Éléments justifiant exploration/avis :</b><ul class="tight">${g('sg_gross')?'<li>Grossesse à éliminer (test, écho si doute GEU).</li>':''}${g('sg_fievre')||g('sg_douleur')||g('sg_pertes')?'<li>Fièvre/douleur/pertes → IGH ? examen, prélèvements.</li>':''}${g('sg_ist')?'<li>Dépistage IST ; frottis/HPV si non à jour.</li>':''}${g('sg_profil')==='postcoit'?'<li>Post-coïtal → spéculum, col, frottis.</li>':''}${g('sg_fdr_endo')?'<li>FDR endomètre → écho pelvienne ± avis gynéco.</li>':''}</ul></div>`;
 else h+=`<div class="ok"><b>Contexte plutôt rassurant.</b> Spottings fréquents en début de méthode (3–6 mois). Rassurer, calendrier des saignements, traitement symptomatique si gênant et pas de CI, réévaluation. Changement si persistance/gêne majeure.</div>`;el.innerHTML=h};

/* 10 MEDICAMENTS GROSSESSE */
def('medgr',()=>`<h2>10 · Médicaments, grossesse & allaitement</h2><p class="hint">Aide : <b>toujours vérifier dans le CRAT</b> (lecrat.fr) avant prescription.</p>
<div class="card"><h3>Médicament à évaluer</h3><div class="grid">${field('mg_nom','Molécule')}${field('mg_comm','Nom commercial')}${field('mg_dose','Dose')}${field('mg_indic','Indication')}${field('mg_terme','Terme / allaitement','select',[['','—'],['preconc','Préconception'],['t1','1er trimestre'],['t2','2e trimestre'],['t3','3e trimestre'],['allait','Allaitement']])}</div></div>
<div class="warn"><b>Vérifier dans le CRAT avant prescription.</b> Ne jamais arrêter brutalement un traitement indispensable sans avis. Documenter : compatible / à éviter / contre-indiqué / données insuffisantes + niveau de prudence + alternative.</div>
<div class="card"><h3>Repères généraux (non exhaustifs — confirmer CRAT)</h3><div class="small">• Antalgique de choix : <b>paracétamol</b>. <b>AINS contre-indiqués dès 24 SA</b> (canal artériel, rein).<br>• Antibio souvent compatibles : amoxicilline. Éviter cyclines (T2-T3), fluoroquinolones sauf nécessité.<br>• IEC/ARA2 CI (T2-T3) ; valproate et antiépileptiques tératogènes.<br>• Allaitement : pénicillines/paracétamol généralement compatibles ; vérifier au cas par cas.</div></div>${sorties('medic')}${DISC}`);

/* 11 NUTRITION */

<div class="card"><h3>Situations à risque</h3><div class="chkgrid">${chk('nu_jeune','Âge jeune')}${chk('nu_prec','Précarité')}${chk('nu_rappro','Grossesses rapprochées')}${chk('nu_mult','Grossesse multiple')}${chk('nu_tabac','Alcool / tabac')}${chk('nu_vegeta','Végétarien/végétalien')}${chk('nu_malabs','Malabsorption / chir. bariatrique')}${chk('nu_antiep','Antiépileptiques')}${chk('nu_atcdtube','ATCD anomalie tube neural')}</div></div>

def('rapide',()=>`<h2>14 · Mode rapide (5 min)</h2><div class="card"><div class="grid">${field('ddn','Date de naissance','date')}<div class="agebadge">🎂 Âge : <b class="ageNow">—</b></div>${field('ddr','DDR','date')}${field('gross_poss','Grossesse possible','select',[['','—'],['non','Non'],['oui','Oui'],['incertain','Incertain']])}${field('r_motif','Motif','select',[['','—'],['choix','Choix pilule'],['oubli','Oubli'],['cu','Contraception urgence'],['saign','Saignements']])}${field('ta','TA')}${field('tabac','Tabac','select',[['','—'],['non','Non'],['oui','Oui']])}${field('cig','Cig/j','number')}</div><div class="chkgrid" style="margin-top:8px">${chk('ci_migraine_aura','Migraine avec aura',1)}${chk('ci_tvp','ATCD thrombose/AVC/infarctus',1)}${chk('ci_cancersein','Cancer du sein',1)}${chk('ci_saign','Saignement inexpliqué',1)}</div>${field('r_demande','Demande de la patiente','textarea')}</div><div class="btnrow"><button class="btn" onclick="RENDER['rapide']()">Analyser</button></div><div id="rap-out"></div>${sorties('pilule')}${DISC}`);

function atcdTxt(){const p=pick(ATCD_PERSO),gy=pick(ATCD_GYN),ob=pick(ATCD_OBST),fa=pick(ATCD_FAM);return `Antécédents : ${p.concat(gy).join(', ')||'aucun notable'}${(g('g_geste')||g('p_parite'))?` ; G${g('g_geste')||'?'}P${g('p_parite')||'?'}`:''}${ob.length?' ; obstétricaux : '+ob.join(', '):''}${fa.length?' ; familiaux : '+fa.join(', '):''}.${g('atcd_autres')?' Précisions : '+g('atcd_autres')+'.':''}`}
function fichePilule(){return `FICHE PATIENTE — MA PILULE
Pilule : ${g('o_type')==='op'?'œstroprogestative':g('o_type')&&g('o_type').startsWith('prog')?'progestative':'(à compléter)'}
• Prenez-la chaque jour à heure fixe.${g('o_type')&&g('o_type').startsWith('prog')?' (microprogestative : horaire strict)':''}
• OUBLI : prenez le comprimé oublié dès que possible. Si le retard dépasse la limite (12 h pour la plupart des pilules combinées et le désogestrel ; 3 h pour le lévonorgestrel microdosé), préservatifs 7 jours et demandez si une contraception d'urgence est nécessaire (g-oubliemapilule.com).
• Effets fréquents au début : petits saignements, tension des seins, nausées — souvent transitoires.
• La pilule ne protège PAS des IST → préservatif avec un nouveau partenaire.

SIGNES D'ALERTE — consultez en urgence :
- douleur thoracique, essoufflement brutal
- douleur/gonflement d'un mollet
- trouble de la parole, faiblesse, trouble visuel brutal
- mal de tête inhabituel intense
- douleur abdominale intense, jaunisse
- saignements importants, suspicion de grossesse

Reconsultez : à 3 mois puis 1×/an, ou avant si problème.
${FINAL}`}
function ficheFor(ctx){
 if(ctx==='pilule'||ctx==='progest')return fichePilule()+'\n'+rxTxt(ctx==='progest'?'prog':(ciEstroprogestatif().possible?'op':'prog'));
 if(ctx==='oubli')return `MESSAGE PATIENTE — OUBLI DE PILULE\n${computeOubli().msg||'(compléter les informations de l\'onglet)'}\n\nEn cas de doute : g-oubliemapilule.com.\n${FINAL}`;
 if(ctx==='urgence')return `FICHE PATIENTE — CONTRACEPTION D'URGENCE
• Agissez le plus tôt possible : plus c'est précoce, plus c'est efficace.
• Méthodes : DIU au cuivre (jusqu'à 5 j, la plus efficace), ulipristal/ellaOne (jusqu'à 5 j), lévonorgestrel (jusqu'à 3 j).
• Utilisez des préservatifs jusqu'au début d'une contraception régulière.
• Faites un test de grossesse 3 semaines après le rapport (ou si règles en retard de plus de 5–7 jours).
• La contraception d'urgence n'est pas efficace à 100 % et ne protège pas des IST.
${rxTxt('cu')}
SIGNES D'ALERTE : douleur pelvienne intense, malaise, saignement abondant → consultez.
${FINAL}`;
 if(ctx==='relais')return `FICHE PATIENTE — CHANGEMENT DE CONTRACEPTION
• Respectez la date de début indiquée pour éviter toute période sans protection.
• Préservatifs 7 jours si votre médecin l'a indiqué.
• Effets indésirables possibles les premiers mois (saignements, tension des seins), souvent transitoires.
• Reconsultez à 3 mois, ou avant si problème.
${FINAL}`;
 if(ctx==='saign')return `FICHE PATIENTE — SAIGNEMENTS SOUS CONTRACEPTION
• Les petits saignements (spotting) sont fréquents les 3 à 6 premiers mois.
• Prenez la contraception très régulièrement (les oublis favorisent les saignements).
• Notez les saignements sur un calendrier.
• CONSULTEZ si : saignements abondants, douleurs, fièvre, pertes anormales, saignement après les rapports, ou suspicion de grossesse.
${FINAL}`;
 if(ctx==='nutri'||ctx==='medic')return `FICHE PATIENTE — NUTRITION ET GROSSESSE
• Acide folique 0,4 mg/jour dès le désir de grossesse et jusqu'à 12 SA (5 mg si votre médecin l'indique).
• Pas d'alcool pendant la grossesse.
• Listériose : évitez lait cru, fromages non pasteurisés/à croûte, charcuteries artisanales, poissons/viandes crus ou fumés.
• Toxoplasmose (si non immunisée) : viande bien cuite, lavez fruits/légumes, évitez la litière du chat.
• Fer/iode/vitamine D uniquement selon prescription. Tout médicament : vérifier sa compatibilité (CRAT) avant prise.
${FINAL}`;
 if(ctx==='ivg')return `FICHE PATIENTE — INFORMATION IVG
• L'IVG est un droit ; vous pouvez être accompagnée sans jugement.
• Selon le terme : méthode médicamenteuse ou instrumentale.
• Coordonnées et rendez-vous : annuaire ivglesadresses.org, planning familial, ou votre médecin.
• Une contraception pourra être mise en place juste après.
• CONSULTEZ en urgence : douleur intense, saignement abondant, malaise ou fièvre.
${FINAL}`;
 return fichePilule()}
function traceFor(ctx){const e=ciEstroprogestatif();const base=`${pat()}, ${age()||'?'} ans${imc()?', IMC '+imc():''}. ${atcdTxt()} `;
 switch(ctx){
  case 'pilule':return `Consultation contraception. ${base}Grossesse ${g('gross_poss')==='non'||g('test_gross')==='neg'?'recherchée/exclue':'à vérifier'}. FDR : TA ${g('ta')||'?'}, tabac ${g('tabac')==='oui'?cigJour()+' cig/j':'non'}, inducteurs ${inducteurs().length?inducteurs().join(', '):'aucun'}. CI œstroprogestatifs : ${e.ci.length?e.ci.join(', '):'aucune'}. Information : efficacité, effets indésirables, risque thromboembolique, CAT oubli, absence de protection IST. Choix réalisé avec la patiente (${e.possible?'œstroprogestatif possible':'OP contre-indiqué — alternative proposée'}). ${rxTxt(e.possible?'op':'prog')} Signes d'alerte expliqués. Réévaluation prévue. ${FINAL}`;
  case 'progest':return `Consultation contraception progestative. ${base}Œstrogènes ${e.possible?'non contre-indiqués mais progestatif retenu':'contre-indiqués'}. Information : prise à heure fixe (fenêtre d'oubli 12 h désogestrel / 3 h lévonorgestrel), spotting fréquent, absence de protection IST. ${rxTxt('prog')} Contrôle à 3 mois. ${FINAL}`;
  case 'oubli':{const o=computeOubli();return `Consultation pour oubli de pilule. ${base}Type ${g('o_type')||'?'}, ${g('o_nb')||1} comprimé(s), retard ${g('o_retard')||'?'} h, semaine ${g('o_sem')||'?'}. Rapport non protégé récent ${g('o_rapport')?'oui':'non'}, vomissements/diarrhée ${g('o_vomi')?'oui':'non'}, inducteurs ${g('o_ind')?'oui':'non'}. Conduite : reprise du comprimé ; protection complémentaire ${o.preserv?'7 j':'non nécessaire'} ; contraception d'urgence ${o.cu?'recommandée':'non indiquée'} ; test de grossesse ${o.test?'à 3 semaines si doute':'non'} ; signes d'alerte. ${FINAL}`}
  case 'urgence':return `Consultation contraception d'urgence. ${base}Délai depuis rapport ${g('cu_delai')||'?'} h. Méthode discutée (DIU cuivre / ulipristal / lévonorgestrel) selon délai, IMC et inducteurs. Préservatifs jusqu'au relais, test de grossesse à 3 semaines, dépistage IST si risque, contraception régulière proposée. ${rxTxt('cu')} ${FINAL}`;
  case 'relais':return `Consultation relais contraceptif (${g('rel_type')||'?'}). ${base}Grossesse ${g('gross_poss')==='non'?'exclue':'à vérifier'}. Modalités de début et préservatif temporaire expliqués, contrôle à 3 mois. ${FINAL}`;
  case 'saign':return `Consultation saignements sous contraception (${g('sg_methode')||'?'}, profil ${g('sg_profil')||'?'}). ${base}Grossesse/GEU, IGH, IST, pathologie cervicale/endométriale et positionnement DIU envisagés. ${(g('sg_gross')||g('sg_fievre')||g('sg_douleur')||g('sg_profil')==='postcoit'||g('sg_fdr_endo'))?'Exploration/avis indiqués.':'Contexte rassurant, spotting de début expliqué, réévaluation.'} ${FINAL}`;
  case 'medic':return `Évaluation médicament et grossesse/allaitement. ${base}Molécule : ${g('mg_nom')||'?'} (${g('mg_comm')||''}) ${g('mg_dose')||''}, indication ${g('mg_indic')||'?'}, terme ${g('mg_terme')||'?'}. Compatibilité vérifiée dans le CRAT (lecrat.fr). Pas d'arrêt brutal d'un traitement indispensable sans avis. ${FINAL}`;
  case 'nutri':return `Consultation nutrition et grossesse. ${base}Conseils : acide folique 0,4 mg/j (5 mg si situation à risque) jusqu'à 12 SA, pas d'alcool, prévention listériose et toxoplasmose, supplémentation fer/iode/vitamine D selon besoin. ${FINAL}`;
  case 'ivg':return `Consultation grossesse non désirée. ${base}DDR ${g('iv_ddr')||'?'}, test ${g('iv_test')||'?'}, terme estimé ${g('iv_terme')||'?'} SA. Information non orientée sur les options et méthodes, orientation proposée (annuaire IVG / planning familial), prévention de l'allo-immunisation si Rh négatif, contraception post-IVG abordée. ${g('iv_contrainte')?'Contexte de vulnérabilité pris en compte.':''} ${FINAL}`;
  default:return base+FINAL}}
function courrierFor(ctx){const M={pilule:['Gynécologue','éligibilité / contre-indications contraceptives'],progest:['Gynécologue','contraception progestative'],oubli:['Gynécologue','gestion après oubli de pilule'],urgence:['Gynécologue','contraception d\'urgence et relais'],relais:['Gynécologue','relais contraceptif'],saign:['Gynécologue','saignements sous contraception à explorer'],medic:['Spécialiste concerné','médicament et grossesse/allaitement'],nutri:['Sage-femme / gynécologue','suivi de grossesse'],ivg:["Centre d'orthogénie / IVG",'demande d\'IVG — orientation']};const[dest,motif]=M[ctx]||['Confrère','avis gynécologique'];const rf=redFlags(),e=ciEstroprogestatif();const rxL=ctx==='urgence'?rxTxt('cu'):ctx==='progest'?rxTxt('prog'):ctx==='pilule'?rxTxt(e.possible?'op':'prog'):'';
 return `Cher confrère, chère consœur (${dest}),

Je vous adresse ${pat()}, ${age()||'?'} ans${imc()?', IMC '+imc():''}${g('ta')?', TA '+g('ta'):''}.

Motif : ${motif}.${rf.length?'\nRed flags : '+rf.join(', ')+'.':''}

${atcdTxt()}
Traitements : ${g('ttt')||'-'}. Allergies : ${g('allergies')||'-'}. Tabac : ${g('tabac')==='oui'?cigJour()+' cig/j':'non'}.
Contre-indications œstroprogestatifs : ${e.ci.join(', ')||'aucune'}.${rxL?'\n'+rxL:''}

(Précisez ici la question posée et l'examen clinique.)

Je vous remercie de votre avis.
Confraternellement, Dr (signature)

— ${FINAL}`}

function rxNote(){return `<div class="small" style="margin-top:6px">⚠ Exemples à titre indicatif (noms commerciaux France ® + DCI). Vérifier AMM/Vidal, contre-indications et interactions ; dose minimale efficace ; adapter à la patiente.</div>`}
function rxBlock(kind){
 if(kind==='op')return `<div class="card"><h3>💊 Suggestion de prescription — œstroprogestatif</h3><ul class="tight">
 <li><b>1ʳᵉ intention, 2ᵉ génération</b> (lévonorgestrel + éthinylestradiol/EE) : <b>Minidril®</b>, <b>Leeloo Gé®</b>, <b>Optilova®</b>, <b>Lovavulo Gé®</b> (lévonorgestrel 100–150 µg + EE 20–30 µg).<br><i>Posologie :</i> 1 comprimé/jour à heure fixe ; plaquette 21 cp puis 7 jours d'arrêt (ou 28 cp avec placebos, sans interruption). Début idéal à J1 des règles (efficace d'emblée) ; sinon « quick start » + préservatif 7 jours.</li>
 <li><b>Phasiques 2ᵉ gén.</b> : <b>Adépal®</b>, <b>Trinordiol®</b> selon profil.</li>
 </ul><div class="small">Alternative sans œstrogène : voir onglet 4 (microprogestative) ou DIU/implant.</div>${rxNote()}</div>`;
 return `<div class="card"><h3>💊 Suggestion de prescription — sans œstrogène</h3><ul class="tight">
 <li><b>Microprogestative désogestrel 75 µg</b> : <b>Optimizette®</b>, <b>Désogestrel Biogaran®/Arrow®</b>, <b>Cerazette®</b>.<br><i>Posologie :</i> 1 cp/jour <b>en continu</b> (sans interruption), à heure fixe ; fenêtre d'oubli <b>12 h</b>.</li>
 <li><b>Microprogestative lévonorgestrel 30 µg</b> : <b>Microval®</b> — 1 cp/jour en continu ; fenêtre d'oubli <b>3 h</b>.</li>
 <li><b>Longue durée</b> : DIU cuivre ; DIU-LNG <b>Mirena®/Kyleena®</b> ; implant étonogestrel <b>Nexplanon®</b> (pose par praticien formé).</li>
 </ul>${rxNote()}</div>`}
function rxCU(){return `<div class="card"><h3>💊 Contraception d'urgence — produits</h3><ul class="tight">
 <li><b>Lévonorgestrel 1,5 mg</b> : <b>Norlevo®</b>, Lévonorgestrel Biogaran® — 1 comprimé unique le plus tôt possible, jusqu'à <b>72 h</b> (sans ordonnance).</li>
 <li><b>Ulipristal acétate 30 mg</b> : <b>ellaOne®</b> — 1 comprimé unique jusqu'à <b>120 h</b> (plus efficace, notamment si IMC élevé).</li>
 <li><b>DIU au cuivre</b> : pose jusqu'à 120 h — méthode la plus efficace, contraception durable.</li>
 </ul>${rxNote()}</div>`}
function rxTxt(kind){if(kind==='op')return `Traitement proposé (à titre indicatif) : œstroprogestatif de 2e génération — ex. Minidril®, Leeloo Gé®, Optilova® (lévonorgestrel + éthinylestradiol). Posologie : 1 cp/jour à heure fixe, 21 jours puis 7 jours d'arrêt (ou 28 cp avec placebos).`;if(kind==='prog')return `Traitement proposé (à titre indicatif) : microprogestative — désogestrel 75 µg (Optimizette®/Cerazette®, 1 cp/j en continu, oubli 12 h) ou lévonorgestrel 30 µg (Microval®, oubli 3 h) ; alternatives longue durée : DIU-LNG (Mirena®/Kyleena®), implant (Nexplanon®).`;if(kind==='cu')return `Traitement proposé (à titre indicatif) : lévonorgestrel 1,5 mg (Norlevo®, ≤72 h) ou ulipristal 30 mg (ellaOne®, ≤120 h), prise unique au plus tôt ; ou DIU au cuivre (≤120 h).`;return ''}

function printTA(id){const w=window.open('','_blank');w.document.write('<pre style="font-family:Georgia,serif;white-space:pre-wrap;padding:24px;font-size:14px">'+document.getElementById(id).value.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</pre>');w.document.close();w.print()}
function saveLS(){localStorage.setItem('contraaide',JSON.stringify(S));flash('Sauvegardé localement.')}
function loadLS(){try{Object.assign(S,JSON.parse(localStorage.getItem('contraaide')||'{}'))}catch(e){}}
function resetAll(){if(confirm('Effacer toutes les données ?')){for(const k in S)delete S[k];localStorage.removeItem('contraaide');buildMain();show(current)}}
function flash(m){const d=document.createElement('div');d.textContent=m;d.style.cssText='position:fixed;bottom:18px;right:18px;background:#16a34a;color:#fff;padding:10px 16px;border-radius:8px;z-index:99;font-size:13px';document.body.appendChild(d);setTimeout(()=>d.remove(),1600)}
loadLS();buildNav();buildMain();show('id');
</script>
