name: Déploiement GitHub Pages

# Déploie l'application de consultation (site statique à la racine du dépôt).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution de déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          # Active automatiquement GitHub Pages (corrige « Get Pages site failed »).
          enablement: true

      - name: Empêcher le traitement Jekyll
        run: touch .nojekyll

      - name: Téléverser l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
