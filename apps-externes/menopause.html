<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MénoAide — Péri/ménopause & THM</title>
<style>
:root{--bg:#0f1419;--panel:#1a2129;--panel2:#222b35;--line:#2e3a47;--txt:#e6edf3;--muted:#9aa7b4;--accent:#a855f7;--accent2:#9333ea;--green:#16a34a;--yellow:#eab308;--orange:#f97316;--red:#dc2626;--greenbg:#0e2a1a;--yellowbg:#2a2509;--orangebg:#2a1a09;--redbg:#2a0e0e;--radius:10px}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45}
header{background:linear-gradient(90deg,#2a1245,#581c87);padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
header h1{font-size:16px;margin:0;font-weight:700}header .sub{color:#e9d5ff;font-size:12px}
.layout{display:flex;min-height:calc(100vh - 52px)}
nav{width:230px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;max-height:calc(100vh - 52px);position:sticky;top:52px;flex-shrink:0}
nav .grp{padding:8px 12px 4px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700}
nav button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--txt);padding:7px 14px;cursor:pointer;font-size:13px;border-left:3px solid transparent}
nav button:hover{background:var(--panel2)}nav button.active{background:var(--panel2);border-left-color:var(--accent);color:#fff;font-weight:600}
main{flex:1;padding:18px 24px;overflow-y:auto;max-width:1000px}
section{display:none}section.active{display:block}
h2{font-size:18px;margin:0 0 4px;border-bottom:2px solid var(--accent);padding-bottom:6px;display:inline-block}
.hint{color:var(--muted);font-size:12px;margin:6px 0 14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin:12px 0}
.card h3{margin:0 0 10px;font-size:14px;color:#cdd9e5}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
label.f{display:flex;flex-direction:column;gap:3px;font-size:12px;color:var(--muted)}
label.f input,label.f select,label.f textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:7px 8px;font-size:13px;font-family:inherit}
textarea{resize:vertical;min-height:54px;width:100%}
.chk{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:13px;cursor:pointer}
.chk input{margin-top:3px;width:15px;height:15px;flex-shrink:0;accent-color:var(--accent)}
.chk.danger{color:#fca5a5}
.chkgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px 20px}
.btn{background:var(--accent2);color:#fff;border:none;border-radius:7px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600}.btn:hover{background:var(--accent)}
.btn.sec{background:var(--panel2);border:1px solid var(--line)}.btn.sec:hover{background:#2c3744}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.feu{padding:14px 16px;border-radius:10px;border:2px solid;font-weight:600;margin:12px 0;font-size:15px}
.feu.vert{background:var(--greenbg);border-color:var(--green);color:#86efac}.feu.jaune{background:var(--yellowbg);border-color:var(--yellow);color:#fde047}
.feu.orange{background:var(--orangebg);border-color:var(--orange);color:#fdba74}.feu.rouge{background:var(--redbg);border-color:var(--red);color:#fca5a5}
.alert{background:var(--redbg);border:1px solid var(--red);border-left:5px solid var(--red);color:#fecaca;padding:10px 14px;border-radius:8px;margin:8px 0;font-size:13px}
.warn{background:var(--orangebg);border-left:5px solid var(--orange);color:#fed7aa;padding:9px 13px;border-radius:8px;margin:8px 0;font-size:13px}
.ok{background:var(--greenbg);border-left:5px solid var(--green);color:#bbf7d0;padding:9px 13px;border-radius:8px;margin:8px 0;font-size:13px}
ul.tight{margin:6px 0;padding-left:20px}ul.tight li{margin:3px 0}
.kpi{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;margin:3px 4px 3px 0;font-size:12px}.kpi b{color:#fff}
.small{font-size:11.5px;color:var(--muted)}
.disclaimer{background:#111;border:1px dashed var(--line);color:var(--muted);font-size:11.5px;padding:8px 12px;border-radius:8px;margin-top:16px;font-style:italic}
.big{font-size:24px;font-weight:800;text-align:center;padding:16px}
.agebadge{grid-column:1/-1;background:#2a1245;border:1px solid var(--accent);border-radius:8px;padding:8px 12px;font-size:14px;color:#e9d5ff}
.agebadge b{font-size:18px;color:#fff}
.cardci{border-left:4px solid var(--red)}
.sorties{border:1px solid #4a3a6b;background:#1c1430}
.sorties h3{color:#d8b4fe}
.ctxout{width:100%;min-height:150px;background:#0b0f14;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:12px;font-family:ui-monospace,Consolas,monospace;font-size:12.5px;line-height:1.5;resize:vertical;white-space:pre-wrap;margin-top:8px}
a{color:var(--accent)}
@media(max-width:820px){nav{width:54px}nav button{font-size:0;padding:10px 0}nav button::first-letter{font-size:14px}nav .grp{display:none}.grid2{grid-template-columns:1fr}.chkgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>🌸 MénoAide</h1><span class="sub">Péri/ménopause · THM · syndrome génito-urinaire</span>
  <span style="flex:1"></span>
  <a href="index-accueil.html" class="btn sec" style="text-decoration:none">↔ Contraception</a>
  <button class="btn sec" onclick="saveLS()">💾 Sauver</button>
  <button class="btn sec" onclick="resetAll()">🗑 Effacer</button>
</header>
<div class="layout"><nav id="nav"></nav><main id="main"></main></div>
<script>
const FINAL="Décision finale sous responsabilité du médecin après interrogatoire, examen clinique et vérification des recommandations actualisées.";
const S={};function g(id){return S[id]}function setv(id,v){S[id]=v}
/* maps antécédents (servent aussi à composer trace / courrier) */
const ATCD_PERSO={t_tvp:'ATCD TVP/EP',t_avc:'ATCD AVC',t_idm:'ATCD infarctus/coronaropathie',t_sapl:'lupus/SAPL',ta_nonctrl:'HTA non contrôlée',t_htg:'hypertriglycéridémie',t_cv:'risque cardiovasculaire élevé',t_diab_compl:'diabète compliqué',t_hepato:'hépatopathie sévère/tumeur',t_migraine:'migraine sévère'};
const ATCD_CANCER={t_cancersein:'cancer du sein',t_cancerendo:'cancer de l\'endomètre',t_saign:'saignement génital inexpliqué',t_masto:'mastopathie à risque',t_brca:'mutation BRCA'};
const ATCD_GYN={t_endo:'endométriose sévère',t_fibrome:'fibromes symptomatiques'};
const ATCD_FAM={t_atcdfam:'cancer du sein familial',fam_cv:'CV précoces'};
function pick(map){return Object.keys(map).filter(k=>g(k)).map(k=>map[k])}
const TABS=[
 ["Dossier",[["id","1 · Identification"],["triage","2 · Triage / Red flags"]]],
 ["Diagnostic",[["peri","3 · Périménopause"],["meno","4 · Ménopause confirmée"],["score","5 · Score symptômes"]]],
 ["Décision THM",[["bouton","6 · THM ou pas THM ?"],["thm","7 · Choix du THM"],["alt","8 · Alternatives non hormonales"],["sgum","9 · Sd génito-urinaire"]]],
 ["Sécurité",[["sein","10 · Sein / mammo / ACR"],["saignpm","11 · Saignements post-méno"],["os","12 · Risque osseux"],["cv","13 · Risque cardio-métabolique"]]],
 ["Synthèse",[["rapide","14 · Mode rapide 5 min"]]],
];
let current="id";
function buildNav(){let h="";TABS.forEach(([grp,items])=>{h+=`<div class="grp">${grp}</div>`;items.forEach(([id,label])=>{h+=`<button data-tab="${id}" onclick="show('${id}')">${label}</button>`})});document.getElementById('nav').innerHTML=h}
function show(id){current=id;document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));const sec=document.getElementById('sec-'+id);if(sec)sec.innerHTML=SEC[id]();document.querySelectorAll('section').forEach(s=>s.classList.toggle('active',s.id==='sec-'+id));if(RENDER[id])RENDER[id]();refreshAge();window.scrollTo(0,0)}

/* ---- moteur ---- */
function age(){const d=g('ddn');if(!d)return null;const dn=new Date(d);if(isNaN(dn))return null;const ref=new Date();let a=ref.getFullYear()-dn.getFullYear();const m=ref.getMonth()-dn.getMonth();if(m<0||(m===0&&ref.getDate()<dn.getDate()))a--;return a>=0&&a<120?a:null}
function imc(){const p=parseFloat(g('poids')),h=parseFloat(g('taille'));if(!p||!h)return null;const m=h>3?h/100:h;return +(p/(m*m)).toFixed(1)}
function redFlags(){const rf=[],m={rf_pm:"Saignement post-ménopausique",rf_postcoit:"Saignement post-coïtal répété",rf_hemo:"Métrorragies abondantes + malaise/hypoTA",rf_douleur:"Douleurs pelviennes importantes",rf_masse:"Masse mammaire dure/fixe",rf_retract:"Rétraction cutanée/mamelonnaire",rf_ecoul:"Écoulement sanglant unipore",rf_adp:"Adénopathie axillaire suspecte",rf_thorax:"Douleur thoracique",rf_dyspnee:"Essoufflement brutal",rf_mollet:"Douleur/gonflement mollet",rf_neuro:"Déficit neurologique brutal"};for(const k in m)if(g(k))rf.push(m[k]);return rf}
function ciTHM(){const ci=[],rel=[];const a=age();
 if(g('t_cancersein'))ci.push("Cancer du sein actuel ou ATCD personnel (CI absolue)");
 if(g('t_cancerendo'))ci.push("Cancer de l'endomètre actuel/suspecté");
 if(g('t_saign')||g('rf_pm'))ci.push("Saignement génital inexpliqué non exploré");
 if(g('t_tvp'))ci.push("ATCD thrombose veineuse / EP à haut risque");
 if(g('t_avc'))ci.push("ATCD AVC");
 if(g('t_idm'))ci.push("ATCD infarctus / coronaropathie évolutive");
 if(g('t_hepato'))ci.push("Hépatopathie sévère / tumeur hépatique");
 if(g('t_sapl'))ci.push("Lupus avec SAPL / risque thrombotique élevé");
 if(g('gross_poss')==='oui')ci.push("Grossesse possible non exclue");
 if(['4','5','6'].includes(g('acr')))ci.push("Mammographie ACR "+g('acr')+" : avis sénologique avant tout THM");
 if(g('t_atcdfam'))rel.push("ATCD familial fort de cancer du sein");
 if(g('t_brca'))rel.push("Mutation BRCA — avis oncogénétique");
 if(g('t_masto'))rel.push("Mastopathie à risque");
 if(g('t_endo'))rel.push("Endométriose sévère");
 if(g('t_fibrome'))rel.push("Fibromes symptomatiques");
 if(g('t_migraine'))rel.push("Migraine sévère");
 if(g('ta_nonctrl'))rel.push("HTA non contrôlée");
 if(g('t_diab_compl'))rel.push("Diabète compliqué");
 if(g('t_htg'))rel.push("Hypertriglycéridémie — éviter voie orale");
 if(g('t_cv'))rel.push("Risque cardiovasculaire élevé");
 if(a!==null&&a>=60)rel.push("Initiation après 60 ans — bénéfice/risque défavorable");
 if(g('t_tardif'))rel.push("Initiation >10 ans après la ménopause — prudence");
 if(g('acr')==='3')rel.push("Mammographie ACR 3 — respecter la surveillance avant d'initier");
 let niveau=ci.length?"contre-indique":rel.length?"prudence":"possible";return{ci,rel,niveau}}
function feuTHM(){const rf=redFlags(),t=ciTHM();if(g('t_saign')||g('rf_pm'))return["rouge","🔴 ROUGE — Saignement inexpliqué/post-ménopausique : explorer avant tout THM."];if(rf.length)return["rouge","🔴 ROUGE — Red flag présent : avis/urgence avant toute prescription."];if(t.niveau==="contre-indique")return["rouge","🔴 ROUGE — THM contre-indiqué."];if(t.niveau==="prudence")return["orange","🟠 ORANGE — THM possible avec prudence / avis spécialisé selon contexte."];return["vert","🟢 VERT — THM envisageable en médecine générale si bilan rassurant, après décision partagée."]}

/* ---- helpers UI ---- */
function field(id,label,type='text',opts){const v=g(id)||'';if(type==='select'){let o=opts.map(x=>`<option value="${x[0]}" ${v===x[0]?'selected':''}>${x[1]}</option>`).join('');return`<label class="f">${label}<select onchange="setv('${id}',this.value);live()">${o}</select></label>`}if(type==='textarea')return`<label class="f">${label}<textarea oninput="setv('${id}',this.value)">${v}</textarea></label>`;return`<label class="f">${label}<input type="${type}" value="${v}" oninput="setv('${id}',this.value);live()"></label>`}
function chk(id,label,danger){return`<label class="chk ${danger?'danger':''}"><input type="checkbox" ${g(id)?'checked':''} onchange="setv('${id}',this.checked);live()"><span>${label}</span></label>`}
function sc(id,label){return field(id,label,'select',[['0','0 absent'],['1','1 léger'],['2','2 modéré'],['3','3 sévère']])}
function refreshAge(){document.querySelectorAll('.ageNow').forEach(e=>e.textContent=age()!=null?age()+' ans':'—')}
function live(){const k=document.getElementById('kpibar');if(k)k.innerHTML=kpiHTML();refreshAge();if(RENDER[current])RENDER[current]()}
function kpiHTML(){const t=ciTHM();return`<span class="kpi">Âge : <b>${age()??'—'}</b></span><span class="kpi">IMC : <b>${imc()??'—'}</b></span><span class="kpi">TA : <b>${g('ta')||'—'}</b></span><span class="kpi">Utérus : <b>${g('t_uterus')||'—'}</b></span><span class="kpi">CI THM : <b style="color:${t.niveau==='possible'?'#86efac':t.niveau==='prudence'?'#fdba74':'#fca5a5'}">${t.niveau}</b></span><span class="kpi">Red flags : <b style="color:${redFlags().length?'#fca5a5':'#86efac'}">${redFlags().length}</b></span>`}
const RENDER={};const SECTIONS=[],SEC={};function def(id,fn){SECTIONS.push(id);SEC[id]=fn}
const DISC=`<div class="disclaimer">⚠ ${FINAL}</div>`;
const KPIBAR=`<div id="kpibar" class="card" style="padding:8px 12px"></div>`;
function buildMain(){document.getElementById('main').innerHTML=SECTIONS.map(s=>`<section id="sec-${s}"></section>`).join('');for(const s in SEC)document.getElementById('sec-'+s).innerHTML=SEC[s]()}

/* ---- bloc Sorties contextuel ---- */
function sorties(ctx){return`<div class="card sorties"><h3>📤 Sorties pour cet item</h3>
<div class="btnrow">
<button class="btn" onclick="ctxGen('fiche','${ctx}')">📄 Fiche patiente</button>
<button class="btn" onclick="ctxGen('trace','${ctx}')">📝 Trace dossier</button>
<button class="btn" onclick="ctxGen('courrier','${ctx}')">✉️ Courrier</button>
</div>
<textarea id="ctxout-${ctx}" class="ctxout" placeholder="Cliquez sur un bouton ci-dessus — le texte généré s'affiche ici et reste modifiable avant copie/impression."></textarea>
<div class="btnrow"><button class="btn sec" onclick="copyTA('ctxout-${ctx}')">📋 Copier</button><button class="btn sec" onclick="printTA('ctxout-${ctx}')">🖨 Imprimer</button></div></div>`}
function ctxGen(kind,ctx){const t=kind==='fiche'?ficheFor(ctx):kind==='trace'?traceFor(ctx):courrierFor(ctx);document.getElementById('ctxout-'+ctx).value=t}
function pat(){return `${g('nom')||''} ${g('prenom')||''}`.trim()||'Patiente'}

/* 1 IDENTIFICATION — antécédents en cases à cocher, reliés au moteur de CI THM */
def('id',()=>`<h2>1 · Identification patiente</h2><p class="hint">Cochez les antécédents : les contre-indications au THM s'allument automatiquement ci-dessous et dans l'onglet « THM ou pas THM ? ».</p>
<div id="kpibar" class="card" style="padding:8px 12px">${kpiHTML()}</div>
<div class="card"><h3>État civil & morphologie</h3><div class="grid">${field('nom','Nom')}${field('prenom','Prénom')}${field('ddn','Date de naissance','date')}<div class="agebadge">🎂 Âge calculé : <b class="ageNow">—</b></div>${field('poids','Poids (kg)','number')}${field('taille','Taille (cm)','number')}${field('ta','Tension artérielle')}</div></div>
<div class="card"><h3>Mode de vie</h3><div class="grid">${field('tabac','Tabac','select',[['','—'],['non','Non'],['oui','Oui']])}${field('cig','Cigarettes/jour','number')}${field('alcool','Alcool (verres/sem.)')}</div></div>
<div class="card cardci"><h3>Antécédents cancéro / mammaires (CI majeures au THM)</h3><div class="chkgrid">${chk('t_cancersein','Cancer du sein actuel ou ancien',1)}${chk('t_cancerendo','Cancer de l\'endomètre',1)}${chk('t_saign','Saignement génital inexpliqué',1)}${chk('t_masto','Mastopathie à risque')}${chk('t_brca','Mutation BRCA')}${chk('t_atcdfam','ATCD familial fort de cancer du sein')}</div></div>
<div class="card cardci"><h3>Antécédents vasculaires / thrombose / métabolique</h3><div class="chkgrid">${chk('t_tvp','ATCD thrombose veineuse / EP',1)}${chk('t_avc','ATCD AVC',1)}${chk('t_idm','ATCD infarctus / coronaropathie',1)}${chk('t_sapl','Lupus / SAPL',1)}${chk('t_hepato','Hépatopathie sévère / tumeur hépatique',1)}${chk('ta_nonctrl','HTA non contrôlée')}${chk('t_diab_compl','Diabète compliqué')}${chk('t_htg','Hypertriglycéridémie')}${chk('t_cv','Risque cardiovasculaire élevé')}${chk('t_migraine','Migraine sévère')}${chk('fam_cv','ATCD familiaux CV précoces')}</div></div>
<div class="card"><h3>Antécédents gynécologiques</h3><div class="chkgrid">${chk('t_endo','Endométriose sévère')}${chk('t_fibrome','Fibromes symptomatiques')}${chk('t_tardif','Ménopause datant de >10 ans')}</div></div>
<div class="card"><h3>Allergies · traitements · précisions (texte libre)</h3><div class="grid2">${field('allergies','Allergies','textarea')}${field('ttt','Traitements en cours','textarea')}${field('atcd_autres','Autres antécédents / précisions','textarea')}</div></div>
<div class="card"><h3>Statut gynécologique</h3><div class="grid">${field('mn_ddr','Dernières règles spontanées','date')}${field('t_uterus','Utérus','select',[['','—'],['oui','Présent'],['non','Hystérectomie']])}${field('gross_poss','Grossesse possible','select',[['','—'],['non','Non'],['oui','Oui'],['incertain','Incertain']])}${field('mammo_date','Dernière mammographie','date')}${field('acr','Résultat ACR (BI-RADS)','select',[['','—'],['1','ACR 1'],['2','ACR 2'],['3','ACR 3'],['4','ACR 4'],['5','ACR 5'],['6','ACR 6']])}${field('frottis','Dernier frottis / HPV')}</div></div>
<div id="ci-live"></div>${DISC}`);
RENDER['id']=()=>{const el=document.getElementById('ci-live');if(!el)return;const t=ciTHM(),[f,ftxt]=feuTHM();let h=`<div class="feu ${f}">${ftxt}</div>`;if(t.ci.length)h+=`<div class="alert"><b>🚫 Contre-indications au THM détectées (d'après les antécédents cochés) :</b><ul class="tight">${t.ci.map(x=>`<li>${x}</li>`).join('')}</ul>→ Alternatives non hormonales (onglet 8) / traitement local si SGUM (onglet 9).</div>`;else h+=`<div class="ok">Aucune contre-indication absolue au THM détectée à partir des antécédents cochés.</div>`;if(t.rel.length)h+=`<div class="warn"><b>Prudence / avis :</b> ${t.rel.join(' · ')}</div>`;el.innerHTML=h};

/* 2 TRIAGE */
def('triage',()=>`<h2>2 · Triage / Red flags</h2><p class="hint">À rechercher AVANT toute analyse. Le saignement post-ménopausique est un red flag majeur.</p><div id="rf-banner"></div>
<div class="card"><h3>Red flags gynécologiques</h3><div class="chkgrid">${chk('rf_pm','Saignement post-ménopausique',1)}${chk('rf_postcoit','Saignement post-coïtal répété',1)}${chk('rf_hemo','Métrorragies abondantes + malaise',1)}${chk('rf_douleur','Douleurs pelviennes importantes',1)}${chk('rf_masse','Masse mammaire dure/fixe',1)}${chk('rf_retract','Rétraction cutanée/mamelonnaire',1)}${chk('rf_ecoul','Écoulement sanglant unipore',1)}${chk('rf_adp','Adénopathie axillaire suspecte',1)}</div></div>
<div class="card"><h3>Red flags vasculaires (sous THM)</h3><div class="chkgrid">${chk('rf_thorax','Douleur thoracique',1)}${chk('rf_dyspnee','Essoufflement brutal',1)}${chk('rf_mollet','Douleur/gonflement mollet',1)}${chk('rf_neuro','Déficit neurologique brutal',1)}</div></div>
<div class="card"><h3>Orientation si red flag</h3><div class="small">Avis gynécologique / sénologique ; urgences ou SAMU 15 si instabilité.</div></div>${DISC}`);
RENDER['triage']=()=>{const el=document.getElementById('rf-banner');if(!el)return;const rf=redFlags();el.innerHTML=rf.length?`<div class="alert"><b>🔴 URGENCE OU AVIS SPÉCIALISÉ IMMÉDIAT — ne pas gérer comme une consultation simple.</b><ul class="tight">${rf.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="ok">Aucun red flag coché.</div>`};

/* 3 PERIMENOPAUSE */
def('peri',()=>`<h2>3 · Périménopause</h2><p class="hint">Femme généralement >40 ans, cycles irréguliers, symptômes climatériques, fertilité diminuée mais grossesse encore possible.</p>${KPIBAR}
<div class="card"><h3>Cycle & symptômes</h3>${field('pm_cycle','Cycles','select',[['','—'],['court','Raccourcis'],['long','Allongés'],['irreg','Irréguliers']])}<div class="chkgrid" style="margin-top:8px">${chk('pm_menorr','Ménorragies')}${chk('pm_metr','Métrorragies')}${chk('pm_bdc','Bouffées de chaleur')}${chk('pm_sueurs','Sueurs nocturnes')}${chk('pm_sommeil','Troubles du sommeil')}${chk('pm_irrit','Irritabilité / anxiété')}${chk('pm_secher','Sécheresse vaginale')}${chk('pm_dyspar','Dyspareunie')}${chk('pm_libido','Baisse de libido')}</div></div>
<div class="card"><h3>Red flags périménopause</h3><div class="chkgrid">${chk('rf_hemo','Métrorragies abondantes',1)}${chk('rf_postcoit','Saignements post-coïtaux',1)}${chk('pm_anemie','Anémie',1)}${chk('rf_douleur','Douleurs pelviennes',1)}${chk('pm_fdrendo','FDR endomètre (obésité, diabète, SOPK, tamoxifène)',1)}${chk('rf_masse','Masse mammaire',1)}</div></div>
<div id="peri-out"></div>${sorties('peri')}${DISC}`);
RENDER['peri']=()=>{const el=document.getElementById('peri-out');if(!el)return;const rf=g('rf_hemo')||g('rf_postcoit')||g('pm_anemie')||g('rf_douleur')||g('pm_fdrendo')||g('rf_masse');let h='';if(rf)h+=`<div class="alert"><b>Red flag périménopause</b> → avis gynécologique / exploration (écho pelvienne, NFS-ferritine, biopsie d'endomètre selon contexte) avant traitement symptomatique.</div>`;h+=`<div class="card"><h3>Conduite</h3><ul class="tight"><li><b>Contraception encore nécessaire</b> (grossesse possible). Éviter œstroprogestatifs si FDR vasculaire ; <b>DIU-LNG</b> intéressant si ménorragies (+ protection endomètre).</li><li>Examens : NFS/ferritine si ménorragies ; TSH si troubles du cycle/asthénie ; écho pelvienne si saignements anormaux.</li><li>Traitement symptomatique des bouffées possible (onglets 7/8).</li><li>Avis gynéco si saignements atypiques, FDR endomètre, échec/intolérance.</li></ul></div>`;el.innerHTML=h};

/* 4 MENOPAUSE */
def('meno',()=>`<h2>4 · Ménopause confirmée</h2>${KPIBAR}
<div class="card"><h3>Critères</h3>${field('mn_ddr','Dernières règles spontanées','date')}<div class="chkgrid" style="margin-top:8px">${chk('mn_contra','Contraception hormonale actuelle/récente (masque les règles)')}${chk('mn_hyst','Hystérectomie')}${chk('mn_ovx','Ovariectomie bilatérale')}${chk('mn_chimio','Chimiothérapie')}${chk('mn_precoce','Ménopause < 40 ans (IOP)',1)}${chk('mn_avant45','Ménopause < 45 ans')}</div></div>
<div id="meno-out"></div>${sorties('meno')}${DISC}`);
RENDER['meno']=()=>{const el=document.getElementById('meno-out');if(!el)return;const a=age();const amen12=g('mn_ddr')&&(new Date()-new Date(g('mn_ddr')))/(864e5)>=365;let statut;if(g('mn_ovx'))statut="Ménopause chirurgicale";else if(g('mn_contra'))statut="Incertaine (contraception hormonale masquante)";else if(amen12&&a>=45)statut="Ménopause confirmée (aménorrhée ≥ 12 mois, âge compatible)";else if(a>=50)statut="Ménopause probable";else statut="À préciser";setv('meno_statut',statut);let h=`<div class="${statut.includes('confirm')?'ok':'warn'}"><b>Statut : ${statut}.</b> Bilan hormonal (FSH/œstradiol) rarement nécessaire si tableau typique. Sous contraception, l'absence de règles ne permet pas de conclure.</div>`;h+=`<div class="card"><h3>Conduite</h3><ul class="tight"><li>Besoin de contraception : ${a&&a>=51?'généralement non au-delà de 50–51 ans après confirmation':'oui tant que la ménopause n\'est pas confirmée'} (à individualiser).</li>${(g('mn_precoce')||g('mn_avant45'))?'<li class="danger">Ménopause précoce / IOP → avis gynéco-endocrino ; THM recommandé jusqu\'à l\'âge physiologique (≈51 ans) sauf CI.</li>':''}${g('mn_contra')?'<li>Aménorrhée sous contraception : stratégie d\'arrêt/relais, éventuel avis spécialisé.</li>':''}</ul></div>`;el.innerHTML=h};

/* 5 SCORE */
def('score',()=>`<h2>5 · Score de symptômes</h2><p class="hint">Cotation 0–3 (absent/léger/modéré/sévère), inspirée d'échelles type Greene.</p>
<div class="card"><h3>Symptômes</h3><div class="grid">${sc('vaso_bdc','Bouffées de chaleur')}${sc('vaso_sueurs','Sueurs nocturnes')}${sc('vaso_sommeil','Troubles du sommeil')}${sc('psy_irrit','Irritabilité')}${sc('psy_anx','Anxiété')}${sc('psy_depr','Humeur dépressive')}${sc('psy_concentr','Concentration')}${sc('gu_secher','Sécheresse vaginale')}${sc('gu_dyspar','Dyspareunie')}${sc('gu_urin','Troubles urinaires')}${sc('ms_arthral','Arthralgies/myalgies')}</div></div>
${field('score_retent','Retentissement global','select',[['','—'],['0','Aucun'],['1','Léger'],['2','Modéré'],['3','Important'],['4','Très important']])}
<div id="score-out"></div>${sorties('thm')}${DISC}`);
RENDER['score']=()=>{const el=document.getElementById('score-out');if(!el)return;const V=(parseInt(g('vaso_bdc'))||0)+(parseInt(g('vaso_sueurs'))||0)+(parseInt(g('vaso_sommeil'))||0);const GU=(parseInt(g('gu_secher'))||0)+(parseInt(g('gu_dyspar'))||0)+(parseInt(g('gu_urin'))||0);const PSY=(parseInt(g('psy_irrit'))||0)+(parseInt(g('psy_anx'))||0)+(parseInt(g('psy_depr'))||0)+(parseInt(g('psy_concentr'))||0);const tot=V+GU+PSY+(parseInt(g('ms_arthral'))||0);const sev=tot>=18?'sévère':tot>=9?'modéré':'léger';setv('score_total',tot);setv('score_sev',sev);let h=`<div class="card"><h3>Résultat</h3><span class="kpi">Total : <b>${tot}/33</b></span><span class="kpi">Vasomoteur : <b>${V}/9</b></span><span class="kpi">Génito-urinaire : <b>${GU}/9</b></span><span class="kpi">Psychique : <b>${PSY}/12</b></span><span class="kpi">Sévérité : <b>${sev}</b></span></div>`;let reco;if(sev==='léger')reco='Mesures hygiéno-diététiques ± traitement local. THM rarement nécessaire.';else reco='Symptômes modérés/sévères : discuter un THM si pas de CI (onglets 6-7).';if(GU>=4&&V<=2)reco='Syndrome génito-urinaire prédominant → traitement local plutôt que THM systémique (onglet 9).';if(PSY>=6&&V<=2)reco='Troubles psychiques dominants → rechercher trouble anxiodépressif, apnées/sommeil, thyroïde, contexte psycho-social.';h+=`<div class="warn">${reco}</div>`;el.innerHTML=h};

/* 6 BOUTON THM OU PAS — CI gérées à l'onglet 1 */
def('bouton',()=>`<h2>6 · « THM ou pas THM ? »</h2><p class="hint">Verdict calculé à partir des antécédents (onglet 1) et du score (onglet 5). Modifiez les antécédents à l'onglet 1.</p>${KPIBAR}
<div id="bouton-out"></div>${sorties('thm')}${DISC}`);
RENDER['bouton']=()=>{const el=document.getElementById('bouton-out');if(!el)return;const t=ciTHM(),[f,ftxt]=feuTHM();const sev=g('score_sev')||'?';const V=(parseInt(g('vaso_bdc'))||0)+(parseInt(g('vaso_sueurs'))||0)+(parseInt(g('vaso_sommeil'))||0);const GU=(parseInt(g('gu_secher'))||0)+(parseInt(g('gu_dyspar'))||0)+(parseInt(g('gu_urin'))||0);
 let verdict,cls;
 if(t.niveau==='contre-indique'){verdict='THM CONTRE-INDIQUÉ';cls='rouge'}
 else if(GU>=4&&V<=2){verdict='TRAITEMENT LOCAL PRÉFÉRABLE';cls='jaune'}
 else if(t.niveau==='prudence'){verdict='THM POSSIBLE AVEC PRUDENCE / AVIS';cls='orange'}
 else if(sev==='léger'){verdict='THM RAREMENT NÉCESSAIRE — mesures + local';cls='jaune'}
 else verdict='THM POSSIBLE';
 const clsf=cls||f;
 let h=`<div class="big feu ${clsf}">${verdict}</div><div class="feu ${f}">${ftxt}</div>`;
 if(t.ci.length)h+=`<div class="alert"><b>Contre-indication(s) (antécédents onglet 1) :</b><ul class="tight">${t.ci.map(x=>`<li>${x}</li>`).join('')}</ul>→ Voir alternatives non hormonales (onglet 8) et traitement local si SGUM (onglet 9).</div>`;
 if(t.rel.length)h+=`<div class="warn"><b>Prudence / avis :</b><ul class="tight">${t.rel.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
 const exam=[];if(!g('mammo_date')&&!g('acr'))exam.push("Statut mammographique à vérifier avant THM");if(!g('t_uterus'))exam.push("Préciser le statut utérin");if(g('gross_poss')!=='non'&&age()<55)exam.push("Exclure une grossesse");
 if(exam.length)h+=`<div class="warn"><b>Examens préalables :</b> ${exam.join(' · ')}.</div>`;
 h+=`<div class="card"><h3>Synthèse</h3><div class="small">Statut : ${g('meno_statut')||'à préciser (onglet 4)'} · Score : ${g('score_total')||'?'} /33 (${sev}) · Utérus : ${g('t_uterus')||'?'}<br>Réévaluation prévue : oui (≥ annuelle). Le THM n'est pas prescrit dans un but de prévention cardiovasculaire.</div></div>`;
 el.innerHTML=h};

/* 7 CHOIX THM */
def('thm',()=>`<h2>7 · Choix du THM</h2><p class="hint">Si le THM est retenu (onglet 6), précisez les paramètres.</p>${KPIBAR}
<div class="card"><h3>Paramètres</h3><div class="grid">${field('t_uterus','Utérus','select',[['','—'],['oui','Présent'],['non','Hystérectomie']])}${field('t_voie','Voie œstrogène','select',[['','—'],['td','Transdermique (gel/patch)'],['orale','Orale'],['local','Local seul']])}${field('t_schema','Schéma','select',[['','—'],['seq','Séquentiel (règles)'],['continu','Continu (sans règles)']])}</div></div>
<div id="thm-out"></div>${sorties('thm')}${DISC}`);
RENDER['thm']=()=>{const el=document.getElementById('thm-out');if(!el)return;const t=ciTHM(),[f,ftxt]=feuTHM();let h=`<div class="feu ${f}">${ftxt}</div>`;
 if(t.niveau==='contre-indique'){h+=`<div class="alert">THM contre-indiqué — pas de schéma proposé. Voir alternatives (onglet 8) / local (onglet 9).</div>`;el.innerHTML=h;return}
 const ut=g('t_uterus');let schema;
 if(ut==='non')schema=`<b>Hystérectomie → œstrogène seul</b> (pas de progestatif), voie transdermique, dose minimale efficace (sauf endométriose résiduelle : avis spécialisé).`;
 else if(ut==='oui')schema=`<b>Utérus présent → œstrogène + progestatif/progestérone</b> pour protéger l'endomètre. Progestérone micronisée ou dydrogestérone (bon profil mammaire/vasculaire) ; <b>DIU-LNG</b> possible pour la protection endométriale. Schéma ${g('t_schema')==='continu'?'continu (femme franchement ménopausée, sans règles)':'séquentiel (péri/début ménopause, règles de privation)'}.`;
 else schema='Préciser le statut utérin pour proposer un schéma.';
 const voie=g('t_voie')==='orale'?`Voie orale : éviter si risque thrombotique élevé ou hypertriglycéridémie (préférer transdermique).`:`Voie transdermique privilégiée (moindre risque thromboembolique), dose minimale efficace.`;
 h+=`<div class="card"><h3>Proposition de schéma (théorique)</h3><div class="small">${schema}<br>${voie}<br><b>Avant prescription :</b> exclure grossesse, vérifier TA, mammographie/examen sénologique, examen gynéco, absence de saignement inexpliqué.<br><b>Surveillance :</b> réévaluation à 3 mois puis ≥ annuelle ; tout saignement inattendu/persistant exploré ; dose minimale efficace ; ne pas reconduire indéfiniment sans réévaluation.<br><b>Information :</b> bénéfices (vasomoteur, qualité de vie, os) vs risques (sein, thrombose surtout voie orale).</div></div>`;
 if(t.rel.length)h+=`<div class="warn"><b>Prudence :</b> ${t.rel.join(' · ')}.</div>`;h+=rxTHM();el.innerHTML=h};

/* 8 ALTERNATIVES */
def('alt',()=>`<h2>8 · Alternatives non hormonales</h2>${KPIBAR}
<div class="card"><h3>Mesures générales</h3><div class="small">Activité physique régulière · perte de poids si surpoids · arrêt tabac · réduction alcool · sommeil · relaxation · éviter les déclencheurs (alcool, chaleur, épices, stress).</div></div>
<div class="card"><h3>Options (DCI ® · posologie indicative)</h3><ul class="tight"><li><b>ISRS/IRSNa</b> : paroxétine <b>Déroxat®</b> 10–20 mg/j, venlafaxine <b>Effexor LP®</b> 37,5–75 mg/j, escitalopram 10 mg/j. <span class="small">⚠ Éviter paroxétine/fluoxétine si tamoxifène (inhibition CYP2D6) → préférer venlafaxine.</span></li><li><b>Gabapentine</b> (bouffées nocturnes) : 300 mg le soir, jusqu'à 300–900 mg/j.</li><li><b>Béta-alanine</b> <b>Abufène®</b> 400 mg, 2–3×/j (efficacité modeste).</li><li><b>Clonidine</b> rarement, selon tolérance.</li><li><b>Fézolinétant</b> <b>Veoza®</b> 45 mg/j (antagoniste NK3) si disponible/indiqué selon AMM ; surveillance hépatique.</li><li>TCC · hypnose · acupuncture (bénéfice variable).</li><li>Sécheresse : lubrifiants/hydratants vaginaux, traitements locaux non œstrogéniques (onglet 9).</li></ul><div class="small">⚠ À titre indicatif — vérifier AMM/Vidal, contre-indications et interactions.</div></div>
<div class="warn">Phytoœstrogènes : efficacité variable, prudence si ATCD de cancer hormono-dépendant. Compléments : vérifier interactions/sécurité. Ne pas banaliser les symptômes sévères → avis spécialisé si THM contre-indiqué.</div>${DISC}`);

/* 9 SGUM */
def('sgum',()=>`<h2>9 · Syndrome génito-urinaire de la ménopause</h2>${KPIBAR}
<div class="card"><h3>Symptômes</h3><div class="chkgrid">${chk('su_secher','Sécheresse vaginale')}${chk('su_dyspar','Dyspareunie')}${chk('su_brul','Brûlures')}${chk('su_prurit','Prurit')}${chk('su_iu','Infections urinaires récidivantes')}${chk('su_urg','Urgenturie')}${chk('rf_postcoit','Saignements après rapports',1)}${chk('su_doulvulv','Douleur vulvaire')}${chk('t_cancersein','ATCD cancer du sein')}${chk('su_antiaroma','Anti-aromatase / tamoxifène')}</div></div>
<div id="sgum-out"></div>${sorties('sgum')}${DISC}`);
RENDER['sgum']=()=>{const el=document.getElementById('sgum-out');if(!el)return;let h='';if(g('rf_postcoit'))h+=`<div class="alert">Saignement post-coïtal / post-ménopausique → examen gynécologique et exploration avant tout traitement.</div>`;if(g('su_prurit')||g('su_doulvulv'))h+=`<div class="warn">Prurit / fissures / lésions blanches / douleur → rechercher une <b>dermatose vulvaire</b> (lichen scléreux) : examen, avis si doute.</div>`;h+=`<div class="card"><h3>Conduite</h3><ul class="tight"><li>1ʳᵉ intention : <b>hydratants/lubrifiants vaginaux</b> non hormonaux.</li><li>Échec / symptômes modérés-sévères : <b>œstrogènes locaux</b> (faible passage systémique) si pas de CI.</li>${(g('t_cancersein')||g('su_antiaroma'))?'<li class="danger">ATCD cancer du sein / anti-aromatase : prudence avec œstrogènes locaux → avis oncologique ; privilégier hydratants.</li>':''}<li>Le SGUM isolé ne justifie pas un THM systémique.</li></ul></div>`;h+=rxSGUM();el.innerHTML=h};

/* 10 SEIN */
def('sein',()=>`<h2>10 · Sein / mammographie / ACR (BI-RADS)</h2>${KPIBAR}
<div class="card"><h3>Données sénologiques</h3><div class="grid">${field('mammo_date','Dernière mammographie','date')}${field('acr','Classification ACR','select',[['','—'],['1','ACR 1 — normal'],['2','ACR 2 — bénin'],['3','ACR 3 — probablement bénin'],['4','ACR 4 — suspect'],['5','ACR 5 — très évocateur'],['6','ACR 6 — cancer prouvé']])}</div><div class="chkgrid" style="margin-top:8px">${chk('rf_masse','Masse clinique dure/fixe',1)}${chk('rf_retract','Rétraction',1)}${chk('rf_ecoul','Écoulement sanglant unipore',1)}${chk('rf_adp','Adénopathie axillaire',1)}</div></div>
<div id="sein-out"></div>${sorties('sein')}${DISC}`);
RENDER['sein']=()=>{const el=document.getElementById('sein-out');if(!el)return;const acr=g('acr');const REF={'1':'Normal.','2':'Bénin.','3':'Probablement bénin → surveillance rapprochée selon le radiologue.','4':'Suspect → biopsie.','5':'Très évocateur de cancer → prise en charge spécialisée.','6':'Cancer prouvé.'};let h='';if(acr)h+=`<div class="${['1','2'].includes(acr)?'ok':'alert'}"><b>ACR ${acr} :</b> ${REF[acr]}</div>`;if(g('rf_masse')||g('rf_retract')||g('rf_ecoul')||g('rf_adp'))h+=`<div class="alert">Anomalie clinique mammaire → ne pas initier de THM, bilan sénologique (mammo/écho ± avis).</div>`;h+=`<div class="card"><h3>Vis-à-vis du THM</h3><div class="small">• THM envisageable seulement si bilan rassurant (ACR 1-2) et pas de CI.<br>• ACR 3 : prudence, respecter la surveillance.<br>• ACR 4/5/6 ou anomalie clinique : <b>pas de THM</b>, avis spécialisé.</div></div>`;el.innerHTML=h};

/* 11 SAIGNEMENTS POST-MENO */
def('saignpm',()=>`<h2>11 · Saignements post-ménopausiques / sous THM</h2><div class="alert">Tout saignement post-ménopausique doit être exploré.</div>${KPIBAR}
<div class="card"><h3>Contexte</h3><div class="grid">${field('spm_dateThm','Début du THM','date')}${field('spm_schema','Schéma THM','select',[['','—'],['seq','Séquentiel'],['continu','Continu'],['aucun','Pas de THM']])}</div><div class="chkgrid" style="margin-top:8px">${chk('spm_attendu','Saignement attendu (privation sous séquentiel)')}${chk('spm_abondant','Abondant',1)}${chk('spm_douleur','Douleur',1)}${chk('spm_obs','Mauvaise observance du progestatif')}${chk('pm_fdrendo','FDR endomètre (obésité, diabète, SOPK, tamoxifène)',1)}</div></div>
<div id="spm-out"></div>${sorties('saignpm')}${DISC}`);
RENDER['saignpm']=()=>{const el=document.getElementById('spm-out');if(!el)return;let h='';if(g('spm_schema')==='aucun')h=`<div class="alert"><b>Saignement post-ménopausique sans THM</b> → avis gynécologique + exploration de l'endomètre (écho pelvienne, épaisseur endométriale, biopsie selon contexte).</div>`;else if(g('spm_schema')==='seq'&&g('spm_attendu')&&!g('spm_abondant'))h=`<div class="ok">Saignement de privation attendu sous schéma séquentiel : peut être normal, mais surveiller. Tout saignement abondant, tardif, ou après une aménorrhée doit être exploré.</div>`;else h=`<div class="warn">Saignement inattendu/abondant/persistant sous THM → écho pelvienne ± avis gynéco. Vérifier l'observance du progestatif et l'adéquation du schéma.</div>`;el.innerHTML=h};

/* 12 OS */
def('os',()=>`<h2>12 · Risque osseux / ostéoporose</h2>${KPIBAR}
<div class="card"><h3>Facteurs de risque</h3><div class="chkgrid">${chk('os_menoprecoce','Ménopause précoce')}${chk('os_imcbas','IMC bas (<19)')}${chk('os_fract','ATCD fracture de fragilité')}${chk('os_famcol','ATCD familial fracture col fémur')}${chk('os_cortico','Corticothérapie prolongée')}${chk('os_tabac','Tabac')}${chk('os_alcool','Alcool')}${chk('os_pr','Polyarthrite rhumatoïde')}${chk('os_malabs','Malabsorption / chir. bariatrique')}${chk('os_vitd','Carence vitamine D')}${chk('os_chutes','Chutes répétées')}${chk('os_seden','Sédentarité')}</div></div>
<div id="os-out"></div>${sorties('os')}${DISC}`);
RENDER['os']=()=>{const el=document.getElementById('os-out');if(!el)return;let n=0;['os_menoprecoce','os_imcbas','os_fract','os_famcol','os_cortico','os_tabac','os_alcool','os_pr','os_malabs','os_vitd','os_chutes','os_seden'].forEach(i=>{if(g(i))n++});setv('os_n',n);el.innerHTML=`<div class="card"><h3>Conduite</h3><ul class="tight"><li>Activité physique en charge, renforcement musculaire, équilibre (prévention des chutes).</li><li>Apports calciques alimentaires suffisants ; vitamine D selon bilan/contexte.</li>${(g('os_fract')||g('os_cortico')||n>=2)?'<li><b>Indication à une ostéodensitométrie</b> (DXA).</li>':'<li>Ostéodensitométrie selon indications.</li>'}<li>Chez une femme récemment ménopausée et symptomatique sans CI, le <b>THM contribue à prévenir la perte osseuse</b>.</li><li>Ostéoporose avérée (fracture / T-score ≤ −2,5) : traitement spécifique, avis rhumato si besoin.</li></ul></div><span class="kpi">FDR cochés : <b>${n}</b></span>`};

/* 13 CV */
def('cv',()=>`<h2>13 · Risque cardio-métabolique</h2>${KPIBAR}
<div class="card"><h3>Paramètres</h3><div class="grid">${field('cv_taille_t','Tour de taille (cm)','number')}</div><div class="chkgrid" style="margin-top:8px">${chk('cv_tabac','Tabac')}${chk('t_diab_compl','Diabète')}${chk('cv_dyslip','Dyslipidémie')}${chk('cv_atcd','ATCD cardiovasculaires')}${chk('cv_seden','Sédentarité')}${chk('cv_sas','Apnées du sommeil suspectées')}${chk('ta_nonctrl','HTA')}</div></div>
<div id="cv-out"></div>${sorties('cv')}${DISC}`);
RENDER['cv']=()=>{const el=document.getElementById('cv-out');if(!el)return;let n=0;['cv_tabac','t_diab_compl','cv_dyslip','cv_atcd','cv_seden','cv_sas','ta_nonctrl'].forEach(i=>{if(g(i))n++});setv('cv_n',n);el.innerHTML=`<div class="card"><h3>Conduite</h3><ul class="tight"><li>Mesures hygiéno-diététiques ; contrôle de la TA.</li><li>Bilan : glycémie/HbA1c, bilan lipidique selon contexte ; SCORE2 si âge compatible.</li><li>Le THM <b>ne doit pas</b> être prescrit dans un but de prévention CV ; si risque CV élevé → privilégier la <b>voie transdermique</b> et la dose minimale.</li><li>Avis cardiologique si doute.</li></ul></div><span class="kpi">FDR CV : <b>${n}</b></span> ${imc()?`<span class="kpi">IMC : <b>${imc()}</b></span>`:''}`};

/* 14 RAPIDE */
def('rapide',()=>`<h2>14 · Mode rapide (5 min)</h2><div class="card"><div class="grid">${field('ddn','Date de naissance','date')}<div class="agebadge">🎂 Âge : <b class="ageNow">—</b></div>${field('mn_ddr','Dernières règles spontanées','date')}${field('r_motif','Motif','select',[['','—'],['meno','Ménopause'],['bdc','Bouffées de chaleur'],['secher','Sécheresse'],['saign','Saignements']])}${field('ta','TA')}${field('t_uterus','Utérus','select',[['','—'],['oui','Présent'],['non','Hystérectomie']])}</div><div class="chkgrid" style="margin-top:8px">${chk('t_cancersein','Cancer sein/endomètre',1)}${chk('t_tvp','ATCD thrombose/AVC/infarctus',1)}${chk('t_saign','Saignement inexpliqué',1)}${chk('r_mammo','Mammographie récente OK')}${chk('r_severe','Symptômes sévères')}</div>${field('r_demande','Demande de la patiente','textarea')}</div><div class="btnrow"><button class="btn" onclick="RENDER['rapide']()">Analyser</button></div><div id="rap-out"></div>${sorties('thm')}${DISC}`);
RENDER['rapide']=()=>{const el=document.getElementById('rap-out');if(!el)return;const[f,txt]=feuTHM();let verdict;if(['secher'].includes(g('r_motif')))verdict='Syndrome génito-urinaire → traitement local en 1ʳᵉ intention (onglet 9).';else if(f==='vert')verdict=g('r_severe')?'THM envisageable en MG après vérification clinique + statut sénologique.':'Symptômes modérés : mesures + discussion THM si gênant.';else if(f==='orange')verdict='Avis spécialisé conseillé / prudence avant THM.';else verdict='Ne pas prescrire de THM / explorer / urgence selon contexte.';let h=`<div class="feu ${f}">${txt}</div><div class="card"><h3>Sortie rapide</h3><div class="small">Motif : <b>${g('r_motif')||'—'}</b> · Utérus : <b>${g('t_uterus')||'—'}</b><br>${verdict}<br>Signes d'alerte : saignement vaginal anormal, modification d'un sein, douleur thoracique, dyspnée, mollet, déficit neuro, céphalée brutale.</div></div>`;el.innerHTML=h};

/* ======== GENERATEURS CONTEXTUELS ======== */
function atcdTxt(){const p=pick(ATCD_PERSO),k=pick(ATCD_CANCER),gy=pick(ATCD_GYN),fa=pick(ATCD_FAM);return `Antécédents : ${k.concat(p).concat(gy).join(', ')||'aucun notable'}${fa.length?' ; familiaux : '+fa.join(', '):''}.${g('atcd_autres')?' Précisions : '+g('atcd_autres')+'.':''}`}
function ficheTHM(){return `FICHE PATIENTE — MÉNOPAUSE / TRAITEMENT HORMONAL (THM)
• Pourquoi un THM ? Pour soulager les bouffées de chaleur, sueurs, troubles du sommeil et la sécheresse, quand les symptômes gênent la vie quotidienne et qu'il n'y a pas de contre-indication.
• Bénéfices attendus : moins de bouffées/sueurs, meilleur sommeil, confort intime ; effet favorable sur l'os.
• Risques possibles : sein, thrombose (surtout par voie orale), saignements, effets indésirables. On utilise la dose minimale efficace, souvent par voie cutanée (gel/patch).
• Réévaluation au moins une fois par an : le traitement n'est pas définitif.
• Ne modifiez/arrêtez pas le traitement sans avis médical.

CONSULTEZ si : saignement vaginal inhabituel, boule ou modification d'un sein, douleur dans la poitrine, essoufflement, douleur d'un mollet, faiblesse/trouble de la parole, mal de tête brutal inhabituel.
${FINAL}`}
function ficheFor(ctx){
 if(ctx==='thm')return ficheTHM()+'\n'+rxTHMtxt();
 if(ctx==='peri')return `FICHE PATIENTE — PÉRIMÉNOPAUSE
• Vos cycles deviennent irréguliers : c'est la transition avant la ménopause.
• Une grossesse reste possible : une contraception est encore nécessaire.
• Bouffées de chaleur, troubles du sommeil, sécheresse peuvent apparaître ; des solutions existent.
• CONSULTEZ si : règles très abondantes, saignements entre les règles ou après les rapports, fatigue inhabituelle.
${FINAL}`;
 if(ctx==='meno')return `FICHE PATIENTE — MÉNOPAUSE
• La ménopause est confirmée après 12 mois sans règles (en l'absence de contraception hormonale).
• Une prise de sang n'est généralement pas nécessaire si le tableau est typique.
• Les symptômes (bouffées, sommeil, sécheresse) peuvent être soulagés ; parlez-en à votre médecin.
• Pensez à la prévention osseuse (activité physique, calcium, vitamine D) et au suivi du sein.
${FINAL}`;
 if(ctx==='sgum')return `FICHE PATIENTE — INCONFORT INTIME (SÉCHERESSE)
• La sécheresse vaginale et l'inconfort lors des rapports sont fréquents après la ménopause et se traitent bien.
• 1ʳᵉ étape : hydratants/lubrifiants vaginaux (sans hormones), en vente libre.
• Si insuffisant : votre médecin peut proposer un traitement local (faible passage dans le sang).
• CONSULTEZ si : saignement après les rapports, lésions ou douleurs vulvaires importantes.
${rxSGUMtxt()}
${FINAL}`;
 if(ctx==='saignpm')return `FICHE PATIENTE — SAIGNEMENT APRÈS LA MÉNOPAUSE
• Tout saignement vaginal après la ménopause doit être montré à un médecin, même s'il est peu abondant.
• Sous traitement hormonal séquentiel, de petits saignements peuvent être attendus, mais tout saignement inhabituel doit être signalé.
• Un examen et souvent une échographie seront proposés.
${FINAL}`;
 if(ctx==='sein')return `FICHE PATIENTE — SURVEILLANCE DU SEIN
• Le dépistage par mammographie est recommandé selon votre âge et vos facteurs de risque.
• Surveillez et signalez : boule, modification de la peau ou du mamelon, écoulement, ganglion sous le bras.
• Un traitement hormonal de la ménopause n'est débuté qu'avec un bilan du sein rassurant.
${FINAL}`;
 if(ctx==='os')return `FICHE PATIENTE — SANTÉ DES OS
• Après la ménopause, l'os se fragilise : activité physique en charge, renforcement musculaire et équilibre protègent.
• Apports suffisants en calcium (alimentation) et vitamine D selon avis médical.
• Une ostéodensitométrie peut être proposée selon vos facteurs de risque.
${FINAL}`;
 if(ctx==='cv')return `FICHE PATIENTE — CŒUR & MÉTABOLISME
• Après la ménopause, surveillez tension, poids, tabac, cholestérol et sucre.
• Activité physique régulière, alimentation équilibrée, arrêt du tabac.
• Le traitement hormonal n'est pas un traitement du cœur ; il se discute au cas par cas.
${FINAL}`;
 return ficheTHM()}
function traceFor(ctx){const t=ciTHM();const base=`${pat()}, ${age()||'?'} ans${imc()?', IMC '+imc():''}. ${atcdTxt()} `;
 switch(ctx){
  case 'thm':return `Consultation ménopause/THM. ${base}Statut : ${g('meno_statut')||'à préciser'}. Symptômes climatériques évalués (score ${g('score_total')||'?'} /33, ${g('score_sev')||'?'}). CI au THM : ${t.ci.length?t.ci.join(', '):'aucune CI majeure'}${t.rel.length?'; prudence : '+t.rel.join(', '):''}. Statut utérin ${g('t_uterus')||'à préciser'}, statut sénologique ${g('mammo_date')||g('acr')?'vérifié'+(g('acr')?' (ACR '+g('acr')+')':''):'à vérifier'}. Information : bénéfices, risques (sein, thrombose), alternatives non hormonales, traitement local si SGUM, réévaluation régulière. Décision partagée. ${rxTHMtxt()} ${FINAL}`;
  case 'peri':return `Consultation périménopause. ${base}Cycles ${g('pm_cycle')||'?'} ; symptômes climatériques évalués. Contraception encore nécessaire ; éviter œstroprogestatifs si FDR vasculaire ; DIU-LNG si ménorragies. Examens discutés (NFS/ferritine, TSH, écho pelvienne si saignements). ${(g('rf_hemo')||g('rf_postcoit')||g('pm_anemie')||g('rf_douleur')||g('pm_fdrendo'))?'Red flag présent → avis/exploration.':'Pas de red flag.'} ${FINAL}`;
  case 'meno':return `Consultation ménopause. ${base}Statut : ${g('meno_statut')||'à préciser'} (DDR spontanées ${g('mn_ddr')||'?'}). ${(g('mn_precoce')||g('mn_avant45'))?'Ménopause précoce/IOP → avis spécialisé, THM jusqu\'à l\'âge physiologique sauf CI. ':''}Information donnée, suivi sénologique et osseux abordés. ${FINAL}`;
  case 'sgum':return `Consultation syndrome génito-urinaire de la ménopause. ${base}Symptômes : ${['su_secher','su_dyspar','su_brul','su_iu','su_urg'].filter(i=>g(i)).join(', ')||'précisés'}. CAT : hydratants/lubrifiants en 1ʳᵉ intention, œstrogènes locaux si échec et pas de CI${(g('t_cancersein')||g('su_antiaroma'))?' (prudence ATCD cancer du sein/anti-aromatase → avis oncologique)':''}. ${g('rf_postcoit')?'Saignement post-coïtal → examen/exploration.':''} ${rxSGUMtxt()} ${FINAL}`;
  case 'saignpm':return `Consultation saignement post-ménopausique / sous THM. ${base}Schéma ${g('spm_schema')||'?'}. ${g('spm_schema')==='aucun'?'Sans THM → avis gynéco + exploration de l\'endomètre.':g('spm_attendu')&&!g('spm_abondant')?'Saignement de privation attendu, surveillance.':'Saignement inattendu/abondant → écho pelvienne ± avis gynéco.'} ${FINAL}`;
  case 'sein':return `Évaluation sénologique. ${base}Mammographie ${g('mammo_date')||'?'}, ACR ${g('acr')||'non renseigné'}. Anomalie clinique : ${(g('rf_masse')||g('rf_retract')||g('rf_ecoul')||g('rf_adp'))?'oui → bilan/avis, pas de THM':'non'}. THM possible seulement si bilan rassurant. ${FINAL}`;
  case 'os':return `Évaluation du risque osseux. ${base}${g('os_n')||0} FDR identifiés. Conseils : activité physique, calcium, vitamine D ; ostéodensitométrie selon indications ; THM contribue à la prévention osseuse si récemment ménopausée et symptomatique sans CI. ${FINAL}`;
  case 'cv':return `Évaluation cardio-métabolique. ${base}${g('cv_n')||0} FDR cardiovasculaires. Mesures hygiéno-diététiques, contrôle TA, bilan glyco-lipidique selon contexte. THM non prescrit en prévention CV ; voie transdermique si risque. ${FINAL}`;
  default:return base+FINAL}}
function courrierFor(ctx){const M={thm:['Gynécologue','avis sur indication/contre-indication d\'un THM'],peri:['Gynécologue','périménopause symptomatique / saignements'],meno:['Gynécologue / Endocrinologue','ménopause (précoce ?) — avis'],sgum:['Gynécologue','syndrome génito-urinaire résistant / saignement'],saignpm:['Gynécologue','saignement post-ménopausique à explorer'],sein:['Radiologue / Sénologue','bilan sénologique avant THM'],os:['Rhumatologue','évaluation osseuse / ostéoporose'],cv:['Cardiologue','évaluation du risque cardiovasculaire']};const[dest,motif]=M[ctx]||['Confrère','avis gynécologique'];const rf=redFlags();const t=ciTHM();const rxL=ctx==='thm'?rxTHMtxt():ctx==='sgum'?rxSGUMtxt():'';
 return `Cher confrère, chère consœur (${dest}),

Je vous adresse ${pat()}, ${age()||'?'} ans${imc()?', IMC '+imc():''}${g('ta')?', TA '+g('ta'):''}.

Motif : ${motif}.${rf.length?'\nRed flags : '+rf.join(', ')+'.':''}

Statut : ${g('meno_statut')||'péri/ménopause'} ; score symptômes ${g('score_total')||'?'} /33 (${g('score_sev')||'?'}).
${atcdTxt()}
Traitements : ${g('ttt')||'-'}. Allergies : ${g('allergies')||'-'}. Tabac : ${g('tabac')==='oui'?(parseInt(g('cig'))||'?')+' cig/j':'non'}.
CI/prudence THM : ${t.ci.concat(t.rel).join(', ')||'aucune notable'}.
Statut sénologique : ${g('acr')?'ACR '+g('acr'):'à préciser'}${g('mammo_date')?' (mammo '+g('mammo_date')+')':''}.${rxL?'\n'+rxL:''}

(Précisez ici la question posée et l'examen clinique.)

Je vous remercie de votre avis.
Confraternellement, Dr (signature)

— ${FINAL}`}

/* ======== SUGGESTIONS DE PRESCRIPTION ======== */
function rxNote(){return `<div class="small" style="margin-top:6px">⚠ Exemples à titre indicatif (noms commerciaux France ® + DCI). Vérifier AMM/Vidal, contre-indications et interactions ; dose minimale efficace ; adapter à la patiente.</div>`}
function rxTHM(){const ut=g('t_uterus'),voie=g('t_voie'),sch=g('t_schema');
 let est = voie==='orale'
  ? `<b>Œstrogène oral</b> : 17β-estradiol — <b>Provames®</b> 1–2 mg/j ou <b>Estrofem®</b> 1–2 mg/j.`
  : `<b>Œstrogène transdermique (à privilégier)</b> : gel <b>Estreva®</b> (0,5–1,5 mg/j) ou <b>Oestrodose®</b> (0,75 mg/dose, 1–2 doses/j) ; ou patch <b>Dermestril®, Vivelledot®, Oesclim®, Femsept®</b> (estradiol 25–50 µg/24 h, 1–2×/semaine).`;
 let prog;
 if(ut==='oui') prog=`<li><b>Progestatif — utérus présent (protection de l'endomètre)</b> : progestérone micronisée <b>Utrogestan®/Estima®</b> 100 mg — ${sch==='continu'?'<b>100 mg/j en continu</b>':'<b>200 mg/j, 12–14 jours/mois</b> (séquentiel)'} ; ou dydrogestérone <b>Duphaston®</b> 10 mg ; ou <b>DIU-LNG Mirena®</b> (protection endométriale durable).</li><li><i>Spécialités combinées</i> : <b>Climaston®</b>, <b>Duova®</b> (estradiol + dydrogestérone) ; patch <b>Femseptcombi®/Femseptevo®</b>.</li>`;
 else if(ut==='non') prog=`<li><b>Hystérectomie → œstrogène seul</b> (pas de progestatif nécessaire).</li>`;
 else prog=`<li>Préciser le statut utérin pour le volet progestatif.</li>`;
 return `<div class="card"><h3>💊 Suggestion de prescription — THM</h3><ul class="tight"><li>${est}<br><i>Dose minimale efficace, titrée selon la réponse clinique.</i></li>${prog}</ul>${rxNote()}</div>`}
function rxSGUM(){return `<div class="card"><h3>💊 Traitement local — syndrome génito-urinaire</h3><ul class="tight">
 <li><b>Hydratants/lubrifiants non hormonaux</b> (1ʳᵉ intention) : Replens®, Monasens®, Hyalo Gyn®, Mucogyne®… en vente libre.</li>
 <li><b>Œstrogène local — estriol</b> : <b>Trophicrème®, Gydrelle®, Physiogine®, Blissel® (gel)</b> — attaque ≈1×/j pendant 2–3 semaines puis entretien 2×/semaine.</li>
 <li><b>Promestriène</b> : <b>Colpotrophine®</b> (ovule/crème) — très faible passage systémique.</li>
 <li><i>Combiné</i> : <b>Trophigil®</b> (estriol + progestérone + lactobacilles).</li>
 </ul><div class="small">Prudence / avis oncologique si ATCD de cancer du sein ou anti-aromatase.</div>${rxNote()}</div>`}
function rxTHMtxt(){const ut=g('t_uterus'),voie=g('t_voie'),sch=g('t_schema');const est=voie==='orale'?'estradiol oral (Provames® 1–2 mg/j)':'estradiol transdermique (gel Estreva®/Oestrodose® ou patch Dermestril®/Vivelledot®/Femsept® 25–50 µg/24 h)';const prog=ut==='non'?'œstrogène seul (hystérectomie)':ut==='oui'?('associé à progestérone micronisée Utrogestan® '+(sch==='continu'?'100 mg/j en continu':'200 mg/j 12–14 j/mois')+' ou Duphaston® 10 mg ou DIU-LNG Mirena®'):'associé à un progestatif (préciser le statut utérin)';return `Traitement proposé (à titre indicatif) : ${est} ${prog}. Dose minimale efficace, voie transdermique privilégiée, réévaluation annuelle.`}
function rxSGUMtxt(){return `Traitement proposé (à titre indicatif) : hydratants/lubrifiants non hormonaux en 1re intention ; si insuffisant, œstrogène local (estriol Trophicrème®/Gydrelle®/Blissel® ou promestriène Colpotrophine®). Prudence si ATCD cancer du sein/anti-aromatase.`}
