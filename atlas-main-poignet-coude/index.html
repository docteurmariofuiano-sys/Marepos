<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas clinique interactif — Main · Poignet · Coude</title>
<style>
:root{
  --bg:#eef6fa;--panel:#ffffff;--ink:#11243a;--muted:#52697c;--navy:#12375a;--blue:#2369a7;
  --cyan:#1e9fb6;--green:#26805c;--orange:#b86616;--red:#ba2d2d;--line:#d8e6ef;--soft:#f6fbfd;
  --shadow:0 16px 42px rgba(23,54,78,.12);--radius:10px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:linear-gradient(180deg,#e7f3f8,#f7fbfd 42%,#eef6fa);color:var(--ink);
  font-family:"Segoe UI","Trebuchet MS",system-ui,sans-serif;font-size:16px;line-height:1.5}
body.dark{--bg:#0d1722;--panel:#142536;--ink:#edf6fb;--muted:#adc0cf;--navy:#d8ecfa;--blue:#7db8f0;
  --cyan:#61d4e5;--green:#6fd1a8;--orange:#f0b56d;--red:#ff8b8b;--line:#284156;--soft:#102033;
  --shadow:0 20px 52px rgba(0,0,0,.35);background:#0d1722}
button,input,textarea,select{font:inherit}
button{cursor:pointer;border:0}
a{color:var(--blue)}

/* ---------- Header ---------- */
.app-header{position:sticky;top:0;z-index:30;background:rgba(244,250,253,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
body.dark .app-header{background:rgba(13,23,34,.94)}
.header-inner{max-width:1480px;margin:0 auto;padding:12px 18px 8px}
.title-row{display:flex;gap:16px;align-items:center;justify-content:space-between}
.brand{display:flex;gap:12px;align-items:center;min-width:0}
.mark{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:grid;place-items:center;color:#fff;font-weight:800;box-shadow:var(--shadow);flex:0 0 auto}
h1{font-size:1.3rem;margin:0;color:var(--navy);line-height:1.18}
.subtitle{margin:2px 0 0;color:var(--muted);font-size:.9rem}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.icon-btn,.tab-btn,.shortcut,.chipbtn,.print-btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;padding:9px 11px;box-shadow:0 3px 12px rgba(20,45,65,.06)}
.icon-btn:hover,.tab-btn:hover,.shortcut:hover,.chipbtn:hover{border-color:#a9ccdc;transform:translateY(-1px)}
.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0 2px;scrollbar-width:thin}
.tab-btn{white-space:nowrap;font-size:.9rem}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.search-row{display:grid;grid-template-columns:minmax(220px,1fr) auto;gap:10px;margin-top:10px}
.search-box{position:relative}
.search-box input{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px 14px 12px 42px;background:var(--panel);color:var(--ink)}
.search-box:before{content:"⌕";position:absolute;left:15px;top:7px;font-size:1.5rem;color:var(--blue)}
#searchCount{align-self:center;color:var(--muted);font-size:.9rem;white-space:nowrap}

/* ---------- Layout ---------- */
main{max-width:1480px;margin:0 auto;padding:22px 18px 80px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.panel-title{font-size:1.9rem;line-height:1.12;margin:4px 0 16px;color:var(--navy)}
.notice{border-left:5px solid var(--blue);background:var(--panel);padding:13px 16px;border-radius:8px;box-shadow:var(--shadow);margin:14px 0}
.notice.urgent{border-color:var(--red);background:linear-gradient(90deg,rgba(186,45,45,.10),var(--panel))}
.notice.ok{border-color:var(--green)}
.section-head{margin:22px 0 12px}
.section-head h2{margin:0;color:var(--navy);font-size:1.4rem}
.section-head p{margin:4px 0 0;color:var(--muted)}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card h3{margin:0 0 8px;color:var(--navy);font-size:1.05rem}
.card p{margin:0 0 6px;color:var(--muted)}
.lead{font-size:1.05rem;color:var(--muted);max-width:74ch}
.eyebrow{color:var(--cyan);font-weight:800;text-transform:uppercase;font-size:.8rem;letter-spacing:.04em}

/* ---------- Hero / dashboard ---------- */
.hero h2{font-size:2rem;line-height:1.12;margin:8px 0 12px;color:var(--navy)}
.shortcut-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:18px 0}
.shortcut{display:flex;align-items:center;justify-content:space-between;text-align:left;gap:10px;min-height:60px}
.shortcut strong{display:block;font-size:.98rem}
.shortcut small{color:var(--muted)}
.shortcut .glyph{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;background:var(--soft);color:var(--blue);font-weight:800;flex:0 0 auto}
.stat-band{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:18px 0}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow)}
.stat b{display:block;font-size:1.7rem;color:var(--navy)}
.stat span{color:var(--muted);font-size:.9rem}

/* ---------- Badges ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:.76rem;font-weight:800;white-space:nowrap}
.b-blue{background:#e2f1ff;color:#11558d}
.b-green{background:#def8ed;color:#155f44}
.b-orange{background:#fff0dc;color:#8c4a0e}
.b-red{background:#ffe1e1;color:#8c1515}
.b-grey{background:#eef2f6;color:#3a536a}
body.dark .badge{background:rgba(255,255,255,.08);color:var(--ink)}
.u-aucun{background:#def8ed;color:#155f44}
.u-modere{background:#fff0dc;color:#8c4a0e}
.u-urgent{background:#ffe1e1;color:#8c1515}
body.dark .u-aucun,body.dark .u-modere,body.dark .u-urgent{background:rgba(255,255,255,.08);color:var(--ink)}

/* ---------- Filters ---------- */
.filterbar{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:16px}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-weight:800;color:var(--navy);font-size:.85rem;margin-right:4px;min-width:74px}
.chipbtn{font-size:.84rem;padding:7px 12px;border-radius:999px}
.chipbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.chipbtn.quick{border-color:var(--cyan);color:var(--blue);font-weight:700}
.chipbtn.quick.active{background:var(--cyan);color:#fff;border-color:var(--cyan)}

/* ---------- Test cards ---------- */
.test-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .15s,border-color .15s}
.tcard:hover{transform:translateY(-3px);border-color:#a9ccdc}
.tcard .shot{aspect-ratio:16/10}
.tcard-body{padding:12px 14px 14px}
.tcard-body h3{margin:0 0 6px;color:var(--navy);font-size:1.02rem}
.tcard-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tcard-body p{margin:0;color:var(--muted);font-size:.9rem}

/* ---------- Image placeholder system ---------- */
.shot{position:relative;background:var(--soft);border-bottom:1px solid var(--line);overflow:hidden}
.shot img{display:block;width:100%;height:100%;object-fit:cover}
.shot .shot-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:14px;color:var(--muted);background:
   repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(35,105,167,.05) 12px,rgba(35,105,167,.05) 24px),var(--soft)}
.shot .shot-ph .cam{font-size:1.7rem}
.shot .shot-ph code{font-size:.78rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--blue);word-break:break-all}
.shot .shot-ph small{font-size:.76rem;max-width:30ch;line-height:1.35}
.shot.loaded .shot-ph{display:none}
.shot.loaded img{display:block}
.shot:not(.loaded) img{visibility:hidden}

/* ---------- Modal fiche ---------- */
.modal-back{position:fixed;inset:0;z-index:60;background:rgba(10,24,38,.55);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:28px 16px;overflow:auto}
.modal-back.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);max-width:900px;width:100%;overflow:hidden}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
.modal-head h2{margin:0;color:var(--navy);font-size:1.35rem}
.modal-head .sub{margin:4px 0 0;color:var(--muted);font-size:.9rem}
.modal-close{font-size:1.4rem;line-height:1;width:38px;height:38px;border-radius:8px;border:1px solid var(--line);background:var(--soft);color:var(--ink);flex:0 0 auto}
.modal-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.1fr);gap:0}
.modal-img{position:relative}
.modal-img .shot{height:100%;min-height:280px;border-bottom:0;border-right:1px solid var(--line)}
.modal-body{padding:18px 20px;max-height:70vh;overflow:auto}
.fiche-row{margin:0 0 11px}
.fiche-row dt{font-weight:800;color:var(--navy);font-size:.82rem;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.fiche-row dd{margin:0;color:var(--ink)}
.fiche-row.warn dd{color:var(--red)}
.fiche-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}

/* ---------- Decision engine ---------- */
.engine{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(340px,.9fr);gap:18px;align-items:start}
.engine-controls{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:16px}
.fgroup{margin-bottom:14px}
.fgroup h4{margin:0 0 8px;color:var(--navy);font-size:.92rem;display:flex;align-items:center;gap:8px}
.fgroup h4 .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan)}
.fchips{display:flex;flex-wrap:wrap;gap:7px}
.fchip{border:1px solid var(--line);background:var(--soft);color:var(--ink);border-radius:999px;padding:7px 12px;font-size:.85rem}
.fchip:hover{border-color:#a9ccdc}
.fchip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.fchip.flag.on{background:var(--red);border-color:var(--red)}
.engine-results{position:sticky;top:170px;display:flex;flex-direction:column;gap:14px}
.res-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:15px}
.res-card h3{margin:0 0 10px;color:var(--navy);font-size:1.05rem;display:flex;align-items:center;gap:8px}
.res-card.flags{border-color:var(--red)}
.res-card.flags h3{color:var(--red)}
.dx{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:9px;background:var(--soft)}
.dx.strong{border-color:var(--green);background:rgba(38,128,92,.08)}
.dx-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.dx-top b{color:var(--navy)}
.dx .meter{height:6px;border-radius:4px;background:#dfe9f0;overflow:hidden;margin:7px 0}
.dx .meter i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--green))}
.dx ul{margin:6px 0 0;padding-left:18px}
.dx li{color:var(--muted);font-size:.88rem;margin:2px 0}
.dx .linkrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.minilink{font-size:.78rem;border:1px solid var(--line);border-radius:999px;padding:3px 9px;background:var(--panel);color:var(--blue)}
.flag-item{display:flex;gap:8px;align-items:flex-start;color:var(--red);font-weight:600;margin:6px 0;font-size:.9rem}
.empty-res{color:var(--muted);font-style:italic}
.engine-actions{display:flex;gap:8px;margin-top:10px}

/* ---------- Lists / tables ---------- */
ul.clean{margin:6px 0 0;padding-left:20px}
ul.clean li{margin:3px 0;color:var(--ink)}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px;background:var(--panel);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;min-width:680px}
th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{background:var(--soft);color:var(--navy)}
.seq{counter-reset:step;list-style:none;margin:0;padding:0}
.seq li{position:relative;padding:10px 10px 10px 44px;border:1px solid var(--line);border-radius:10px;background:var(--panel);margin-bottom:8px;box-shadow:var(--shadow)}
.seq li:before{counter-increment:step;content:counter(step);position:absolute;left:10px;top:10px;width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.82rem}

/* ---------- Patient form ---------- */
.field-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-weight:700;color:var(--navy);font-size:.88rem}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:var(--soft);color:var(--ink)}
.field textarea{min-height:80px;resize:vertical}
.wide{grid-column:1/-1}
.patient-section{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
.patient-section h3{margin:0 0 10px;color:var(--navy)}
.print-actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
.print-btn{background:var(--blue);color:#fff;border-color:var(--blue)}

.hidden-by-search{display:none!important}
.hidden-by-filter{display:none!important}
.empty-note{display:none;margin:18px 0;color:var(--muted);background:var(--panel);border:1px dashed var(--line);border-radius:10px;padding:18px;text-align:center}

@media (max-width:1100px){
  .shortcut-grid,.stat-band,.grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}
  .test-grid,.grid-3,.field-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .engine{grid-template-columns:1fr}
  .engine-results{position:static}
  .modal-grid{grid-template-columns:1fr}
  .modal-img .shot{border-right:0;border-bottom:1px solid var(--line);min-height:220px}
}
@media (max-width:720px){
  body{font-size:15px}
  .title-row{flex-direction:column;align-items:flex-start}
  .search-row{grid-template-columns:1fr}
  .shortcut-grid,.stat-band,.grid-2,.grid-3,.grid-4,.test-grid,.field-grid{grid-template-columns:1fr}
  .panel-title{font-size:1.5rem}
}
@media print{
  .app-header,.no-print,.filterbar{display:none!important}
  main{max-width:none;padding:0}
  .tab-panel{display:none!important}
  .tab-panel.active{display:block!important}
  .card,.table-wrap{box-shadow:none;border-color:#bbb}
}
</style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="title-row">
      <div class="brand">
        <div class="mark">MPC</div>
        <div>
          <h1>Main · Poignet · Coude</h1>
          <p class="subtitle">Atlas clinique interactif — examen, tests, orientation, conduite à tenir</p>
        </div>
      </div>
      <div class="header-actions no-print">
        <button class="icon-btn" id="themeBtn" type="button" title="Mode sombre">◐</button>
        <button class="icon-btn" id="printBtn" type="button" title="Imprimer">⎙</button>
        <button class="icon-btn" id="resetBtn" type="button" title="Réinitialiser">↺</button>
      </div>
    </div>
    <nav class="tabs no-print" id="tabs"></nav>
    <div class="search-row no-print">
      <div class="search-box"><input id="searchInput" type="search" placeholder="Rechercher un test, une pathologie, une zone douloureuse, une imagerie…"></div>
      <div id="searchCount">Recherche inactive</div>
    </div>
  </div>
</header>
<main id="app"></main>
<div class="modal-back" id="modalBack"><div class="modal" id="modal"></div></div>
<script>
/* =====================================================================
   ATLAS CLINIQUE MAIN · POIGNET · COUDE
   Application locale, hors-ligne, fichier unique.
   Images attendues dans le dossier ./images/ (voir LISTE_IMAGES.md).
   ===================================================================== */
const STORE="atlasmpc:";
const app=document.getElementById("app");
const tabsEl=document.getElementById("tabs");
let activeTab=localStorage.getItem(STORE+"tab")||"accueil";

/* ---------- utils ---------- */
function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function urgenceBadge(u){const m={"aucun":["u-aucun","Non urgent"],"modéré":["u-modere","Semi-urgent"],"urgent":["u-urgent","Urgent"]};const x=m[u]||m["aucun"];return '<span class="badge '+x[0]+'">'+x[1]+'</span>';}
function typeLabel(t){return ({tendineux:"Tendineux",neuro:"Neurologique",ligamentaire:"Ligamentaire",osseux:"Osseux / fracture",vasculaire:"Vasculaire",inflammatoire:"Inflammatoire",inspection:"Inspection",mobilite:"Mobilité"})[t]||t;}
function regionLabel(r){return ({main:"Main",poignet:"Poignet",coude:"Coude"})[r]||r;}

/* ---------- image figure with placeholder ----------
   Source de l'image :
   - si EMBEDDED_IMAGES[file] existe (build autonome base64) → on l'utilise ;
   - sinon on charge depuis le dossier ./images/.
   Dans les deux cas, un cadre « Image à fournir » s'affiche tant que rien n'est chargé. */
function imgSrc(file){
  return (window.EMBEDDED_IMAGES && window.EMBEDDED_IMAGES[file]) ? window.EMBEDDED_IMAGES[file] : ('images/'+file);
}
function shot(file,alt,cls){
  return '<figure class="shot '+(cls||"")+'">'+
    '<img alt="'+esc(alt)+'" loading="lazy" src="'+imgSrc(file)+'" '+
    'onload="this.parentNode.classList.add(\'loaded\')" onerror="this.parentNode.classList.remove(\'loaded\')">'+
    '<div class="shot-ph"><span class="cam">📷</span><strong>Image à fournir</strong>'+
    '<code>images/'+esc(file)+'</code><small>'+esc(alt)+'</small></div></figure>';
}

/* =====================================================================
   1. ATLAS DES TESTS — chaque fiche est liée à une image dédiée
   ===================================================================== */
const TESTS=[
/* ---------------- MAIN ---------------- */
{id:"inspection_main",name:"Inspection de la main",region:"main",type:"inspection",urgence:"aucun",
 image:"inspection_main.webp",alt:"Inspection comparative des deux mains paume et dos : trophicité, déformations, coloration",
 objectif:"Repérer amyotrophie, déformation, attitude vicieuse, troubles trophiques, coloration et lésions cutanées.",
 patient:"Assis, mains posées paume puis dos sur la table, comparaison bilatérale.",
 medecin:"Face au patient, observe symétrie, reliefs musculaires (éminences thénar/hypothénar), ongles, plis.",
 manoeuvre:"Inspection statique paume/dos, puis en mouvement (poing, extension, écartement des doigts).",
 positif:"Amyotrophie thénar (médian), griffe ulnaire, doigts en col de cygne/boutonnière, nodules, rougeur, déformation.",
 diagnostic:"Oriente vers atteinte nerveuse, rhumatismale, tendineuse ou traumatique selon l'aspect.",
 pieges:"Ne pas négliger la face palmaire ni les espaces interdigitaux ; toujours comparer au côté sain."},

{id:"mobilite_doigts",name:"Mobilité active et passive des doigts",region:"main",type:"mobilite",urgence:"aucun",
 image:"mobilite_doigts.webp",alt:"Flexion-extension active des doigts, fermeture du poing complet et ouverture",
 objectif:"Évaluer amplitudes MCP/IPP/IPD, déficit d'extension ou de flexion, comparaison active/passive.",
 patient:"Avant-bras en pronation, main libre ; fait le poing puis ouvre complètement.",
 medecin:"Mesure le flessum, recherche un déficit isolé, mobilise passivement si déficit actif.",
 manoeuvre:"Flexion-extension active globale puis articulation par articulation ; puis passive.",
 positif:"Déficit actif avec mobilité passive conservée = atteinte tendineuse/nerveuse ; déficit passif = articulaire/rétraction.",
 diagnostic:"Rupture tendineuse, raideur articulaire, doigt à ressaut, Dupuytren, atteinte nerveuse.",
 pieges:"Un effet ténodèse (flexion passive des doigts à l'extension du poignet) trompe l'examen d'une section tendineuse."},

{id:"test_fds_main",name:"Testing du fléchisseur superficiel (FDS)",region:"main",type:"tendineux",urgence:"modéré",
 image:"test_fds_main.webp",alt:"Test FDS : examinateur bloque les autres doigts en extension, le doigt testé fléchit à l'IPP",
 objectif:"Tester l'intégrité du fléchisseur commun superficiel, fléchisseur de l'IPP.",
 patient:"Main paume vers le haut posée sur la table.",
 medecin:"Maintient en extension complète tous les doigts sauf celui testé (neutralise le FDP commun).",
 manoeuvre:"Demande de fléchir le seul doigt libéré ; la flexion ne peut se faire qu'à l'IPP.",
 positif:"Flexion active de l'IPP possible = FDS intact ; absence de flexion = section/rupture du FDS.",
 diagnostic:"Plaie ou rupture du tendon fléchisseur superficiel.",
 pieges:"L'auriculaire a souvent un FDS hypoplasique (faux positif) ; toujours tester après plaie de la face palmaire."},

{id:"test_fdp_main",name:"Testing du fléchisseur profond (FDP)",region:"main",type:"tendineux",urgence:"modéré",

/* ----- Examen rapide (moteur) ----- */
let selected=new Set(JSON.parse(localStorage.getItem(STORE+"sel")||"[]"));
function renderRapide(){
 const ctrls=FINDINGS.map(g=>
   '<div class="fgroup"><h4><span class="dot"></span>'+esc(g.group)+'</h4><div class="fchips">'+
   g.items.map(it=>'<button type="button" class="fchip'+(it[2]?' flag':'')+(selected.has(it[0])?' on':'')+'" data-find="'+it[0]+'">'+esc(it[1])+'</button>').join("")+
   '</div></div>').join("");
 return panel("rapide","Examen rapide interactif",
  '<div class="notice"><strong>Mode d\'emploi :</strong> cliquez les signes présents. Les diagnostics probables, les tests à réaliser, '+
  'l\'imagerie, la conduite à tenir et les red flags se mettent à jour en temps réel. Cliquez un test proposé pour ouvrir sa fiche.</div>'+
  '<div class="engine"><div class="engine-controls searchable">'+ctrls+
   '<div class="engine-actions"><button class="chipbtn" id="clearFindings" type="button">Tout effacer</button></div></div>'+
   '<div class="engine-results" id="engineResults"></div></div>');
}
function renderEngineResults(){
 const box=document.getElementById("engineResults");if(!box)return;
 const sel=selected;
 // diagnostics
 const scored=RULES.map(r=>{
   const matched=r.conditions.filter(c=>sel.has(c));
   return {r,matched,ratio:matched.length/r.conditions.length};
 }).filter(x=>x.matched.length>0)
   .sort((a,b)=>b.matched.length-a.matched.length||b.ratio-a.ratio);
 // red flags actifs
 const flagSel=[...sel].filter(id=>FLAGIDS.has(id)).map(id=>FINDLABEL[id]);
 const flagRules=[];scored.forEach(x=>{if(x.matched.length>=2&&x.ratio>=0.5){(x.r.flags||[]).forEach(f=>flagRules.push(f));}});
 const allFlags=[...new Set([...flagSel,...flagRules])];
 // tests + imagerie agrégés (des diagnostics forts)
 let dxHtml,testsHtml,imgHtml,mgmtHtml;
 if(scored.length===0){
   dxHtml='<p class="empty-res">Sélectionnez des signes pour afficher les diagnostics compatibles.</p>';
   testsHtml=imgHtml=mgmtHtml='';
 } else {
   const strongCut=Math.max(2,scored[0].matched.length);
   dxHtml=scored.slice(0,6).map(x=>{
     const strong=x.matched.length>=2&&x.ratio>=0.5;
     const pct=Math.round(x.ratio*100);
     return '<div class="dx'+(strong?' strong':'')+'"><div class="dx-top"><b>'+esc(x.r.dx)+'</b>'+
       '<span class="badge '+(strong?'b-green':'b-grey')+'">'+x.matched.length+' signe(s)</span></div>'+
       '<div class="meter"><i style="width:'+pct+'%"></i></div>'+
       '<ul><li><strong>Tests :</strong> '+esc((x.r.tests||[]).join(" · "))+'</li>'+
       '<li><strong>Imagerie :</strong> '+esc((x.r.imaging||[]).join(" · "))+'</li>'+
       '<li><strong>Conduite :</strong> '+esc(x.r.mgmt)+'</li></ul>'+
       ((x.r.fiches&&x.r.fiches.length)?'<div class="linkrow">'+x.r.fiches.map(f=>TESTBYID[f]?'<button class="minilink" type="button" data-fiche="'+f+'">'+esc(TESTBYID[f].name)+'</button>':'').join("")+'</div>':'')+
       '</div>';
   }).join("");
 }
 const flagsCard='<div class="res-card flags"><h3>⚠ Red flags actifs</h3>'+
   (allFlags.length?allFlags.map(f=>'<div class="flag-item">▸ '+esc(f)+'</div>').join(""):'<p class="empty-res">Aucun red flag détecté pour cette sélection.</p>')+'</div>';
 box.innerHTML=
   '<div class="res-card"><h3>◈ Diagnostics probables</h3>'+dxHtml+'</div>'+flagsCard+
   '<div class="res-card"><h3>Sélection en cours ('+sel.size+')</h3>'+
     (sel.size?'<div class="fchips">'+[...sel].map(id=>'<span class="fchip on">'+esc(FINDLABEL[id]||id)+'</span>').join("")+'</div>':'<p class="empty-res">Aucun signe sélectionné.</p>')+'</div>';
 box.querySelectorAll("[data-fiche]").forEach(b=>b.addEventListener("click",()=>openFiche(b.dataset.fiche)));
}

let filterRegion="all",filterType="all",filterQuick="all";
function renderAtlas(){

 const types=[["all","Tous types"],["tendineux","Tendineux"],["neuro","Neurologique"],["ligamentaire","Ligamentaire"],["osseux","Osseux"],["vasculaire","Vasculaire"],["inflammatoire","Inflammatoire"]];
 const quicks=[["all","Tous"],["mg","Tests fréquents en MG"],["trauma","Traumatisme"],["neuro","Neurologique"],["tendineux","Tendineux"],["ligamentaire","Ligamentaire"]];
 const bar='<div class="filterbar no-print">'+
   '<div class="filter-row"><span class="filter-label">Région</span>'+regions.map(r=>'<button class="chipbtn" data-fr="'+r[0]+'" type="button">'+esc(r[1])+'</button>').join("")+'</div>'+

   '<div class="filter-row"><span class="filter-label">Filtres</span>'+quicks.map(q=>'<button class="chipbtn quick" data-fq="'+q[0]+'" type="button">'+esc(q[1])+'</button>').join("")+'</div>'+
 '</div>';
 const grid='<div class="test-grid" id="atlasGrid">'+TESTS.map(t=>tcard(t)).join("")+'</div>'+
   '<div class="empty-note" id="atlasEmpty">Aucun test ne correspond à ces filtres.</div>';
 return panel("atlas","Atlas des tests cliniques",
   '<div class="notice"><strong>'+TESTS.length+' fiches.</strong> Filtrez par région, par type ou par usage, ou cliquez une carte pour ouvrir la fiche détaillée (objectif, position, manœuvre, positivité, diagnostic, pièges, urgence).</div>'+bar+grid);
}
const QUICKSETS={
 mg:new Set(["test_phalen","test_tinel_median_poignet","test_durkan","test_finkelstein","grind_test_trapezo_metacarpien","test_cozen","test_doigt_ressaut","palpation_tabatiere","test_froment","examen_dupuytren","bursite_olecranienne","test_mill"]),
 trauma:null,neuro:null,tendineux:null,ligamentaire:null
};
function matchQuick(t){
 if(filterQuick==="all")return true;
 if(filterQuick==="mg")return QUICKSETS.mg.has(t.id);
 if(filterQuick==="trauma")return t.urgence!=="aucun"||["osseux","ligamentaire"].includes(t.type);
 if(filterQuick==="neuro")return t.type==="neuro";
 if(filterQuick==="tendineux")return t.type==="tendineux";
 if(filterQuick==="ligamentaire")return t.type==="ligamentaire";
 return true;
}
function tcard(t){
 return '<article class="tcard searchable" data-test="'+t.id+'" data-region="'+t.region+'" data-type="'+t.type+'">'+
   shot(t.image,t.alt)+
   '<div class="tcard-body"><div class="tcard-meta"><span class="badge b-grey">'+regionLabel(t.region)+'</span>'+
   '<span class="badge b-blue">'+typeLabel(t.type)+'</span>'+urgenceBadge(t.urgence)+'</div>'+
   '<h3>'+esc(t.name)+'</h3><p>'+esc(t.objectif)+'</p></div></article>';
}
function applyAtlasFilters(){
 const grid=document.getElementById("atlasGrid");if(!grid)return;let visible=0;
 grid.querySelectorAll(".tcard").forEach(c=>{
   const t=TESTBYID[c.dataset.test];
   const ok=(filterRegion==="all"||t.region===filterRegion)&&(filterType==="all"||t.type===filterType)&&matchQuick(t);
   c.classList.toggle("hidden-by-filter",!ok);if(ok)visible++;
 });
 const empty=document.getElementById("atlasEmpty");if(empty)empty.style.display=visible?"none":"block";
}

}

/* =====================================================================
   7. INTERACTIONS
   ===================================================================== */
function activate(tab){
 if(!TABS.some(t=>t[0]===tab))tab="accueil";
 activeTab=tab;
 document.querySelectorAll(".tab-panel").forEach(p=>p.classList.toggle("active",p.dataset.tabPanel===tab));
 document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
 localStorage.setItem(STORE+"tab",tab);
 if(tab==="rapide")renderEngineResults();
 if(tab==="atlas")applyAtlasFilters();
 window.scrollTo({top:0,behavior:"smooth"});
}
function bindStore(){
 document.querySelectorAll("[data-store]").forEach(el=>{
  const s=localStorage.getItem(el.dataset.store);
  if(s!==null){if(el.type==="checkbox")el.checked=s==="1";else el.value=s;}
  el.addEventListener("input",()=>{localStorage.setItem(el.dataset.store,el.type==="checkbox"?(el.checked?"1":"0"):el.value);});
 });
}
function bindFindings(){
 document.querySelectorAll("[data-find]").forEach(b=>b.addEventListener("click",()=>{
   const id=b.dataset.find;
   if(selected.has(id)){selected.delete(id);b.classList.remove("on");}
   else{selected.add(id);b.classList.add("on");}
   localStorage.setItem(STORE+"sel",JSON.stringify([...selected]));
   renderEngineResults();
 }));
 const clr=document.getElementById("clearFindings");
 if(clr)clr.addEventListener("click",()=>{selected.clear();localStorage.setItem(STORE+"sel","[]");
   document.querySelectorAll("[data-find]").forEach(b=>b.classList.remove("on"));renderEngineResults();});
}
function bindAtlas(){
 document.querySelectorAll(".tcard").forEach(c=>c.addEventListener("click",()=>openFiche(c.dataset.test)));
 document.querySelectorAll("[data-fr]").forEach(b=>b.addEventListener("click",()=>{filterRegion=b.dataset.fr;syncFilterBtns();applyAtlasFilters();}));
 document.querySelectorAll("[data-ft]").forEach(b=>b.addEventListener("click",()=>{filterType=b.dataset.ft;syncFilterBtns();applyAtlasFilters();}));
 document.querySelectorAll("[data-fq]").forEach(b=>b.addEventListener("click",()=>{filterQuick=b.dataset.fq;syncFilterBtns();applyAtlasFilters();}));
 syncFilterBtns();
 document.querySelectorAll("[data-fiche]").forEach(b=>b.addEventListener("click",()=>openFiche(b.dataset.fiche)));
}
function syncFilterBtns(){
 document.querySelectorAll("[data-fr]").forEach(b=>b.classList.toggle("active",b.dataset.fr===filterRegion));
 document.querySelectorAll("[data-ft]").forEach(b=>b.classList.toggle("active",b.dataset.ft===filterType));
 document.querySelectorAll("[data-fq]").forEach(b=>b.classList.toggle("active",b.dataset.fq===filterQuick));
}
function bindSearch(){
 const input=document.getElementById("searchInput"),count=document.getElementById("searchCount");
 function run(){
   const q=norm(input.value.trim());let vis=0,tot=0;
   document.querySelectorAll(".searchable").forEach(el=>{tot++;const ok=!q||norm(el.textContent).includes(q);
     el.classList.toggle("hidden-by-search",!ok);if(ok)vis++;});
   count.textContent=q?vis+" résultat(s) sur "+tot:"Recherche inactive";
 }
 input.addEventListener("input",run);run();
}
function bind(){
 document.querySelectorAll(".tab-btn").forEach(b=>b.addEventListener("click",()=>activate(b.dataset.tab)));
 document.querySelectorAll("[data-go]").forEach(b=>b.addEventListener("click",()=>activate(b.dataset.go)));
 document.getElementById("themeBtn").addEventListener("click",()=>{document.body.classList.toggle("dark");
   localStorage.setItem(STORE+"theme",document.body.classList.contains("dark")?"dark":"light");});
 document.getElementById("printBtn").addEventListener("click",()=>window.print());
 document.getElementById("resetBtn").addEventListener("click",()=>{
   if(confirm("Réinitialiser la sélection de l'examen rapide et la fiche patient ?")){
     Object.keys(localStorage).filter(k=>k.startsWith(STORE)).forEach(k=>localStorage.removeItem(k));location.reload();}});
