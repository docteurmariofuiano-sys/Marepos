    html+=panel("Traitement de crise",d.acute.slice(0,3).map(o=>'<article class="rec"><h3>'+esc(o.title)+'</h3><p>'+esc(o.detail)+'</p><small>'+esc((o.cautions||[]).join(" "))+'</small></article>').join(''));
    html+=panel("Fond et orientation",d.prev.slice(0,3).map(o=>'<article class="rec"><h3>'+esc(o.title)+'</h3><p>'+esc(o.detail)+'</p><small>'+esc((o.cautions||[]).join(" "))+'</small></article>').join('')+(d.neuro.length?'<p class="callout">Avis neurologique indique: '+esc(d.neuro.join("; "))+'</p>':''));
    html+=textBox("Copier-coller ordonnance",d.rx.join("\n"))+textBox("Conseils patient copiables",d.advice.join("\n"));
  }
  if(mode==="complete")html+=completeHtml(d);
  if(mode==="acute")html+=panel("Choix du traitement de crise",d.acute.map(optionHtml).join(''));
  if(mode==="preventive")html+=panel("Choix du traitement de fond",d.prev.map(optionHtml).join(''))+panel("Medicaments a eviter",list(d.avoid));
  if(mode==="followup")html+=followHtml(d);
  if(mode==="meds")html+=medsHtml();
  if(mode==="sources")html+=sourcesHtml(d);
  html+=panel("Courrier neurologue",d.neuro.length?textBox("Courrier automatique",d.letter):'<p class="muted">Pas d indication automatique d avis neurologique dans les donnees saisies.</p>');
  document.getElementById("right").innerHTML=html;
}
function optionHtml(o){return '<article class="rec"><h3>'+esc(o.title)+'</h3><p>'+esc(o.detail)+'</p><small>'+esc((o.cautions||[]).join(" "))+'</small></article>'}
function completeHtml(d){
  const migraine=["attacksAtLeastFive","duration4to72","unilateral","pulsatile","moderateSevere","worsenedByActivity","nauseaVomiting","photoAndPhono","normalNeuroExamBetweenAttacks"];
  const aura=["auraAttacksAtLeastTwo","auraVisual","auraSensory","auraSpeech","auraProgressiveFiveMin","auraSuccessiveSymptoms","auraEachFiveToSixtyMin","auraPositiveSymptoms","auraHeadacheWithinSixtyMin","firstAura","auraDeficitPersistent"];
  const labels={attacksAtLeastFive:">=5 crises",duration4to72:"Duree 4-72 h",unilateral:"Unilaterale",pulsatile:"Pulsatile",moderateSevere:"Moderee/severe",worsenedByActivity:"Aggravee activite",nauseaVomiting:"Nausees/vomissements",photoAndPhono:"Photo + phonophobie",normalNeuroExamBetweenAttacks:"Examen neuro normal",auraAttacksAtLeastTwo:">=2 auras",auraVisual:"Visuelle",auraSensory:"Sensitive",auraSpeech:"Langage",auraProgressiveFiveMin:"Progression >=5 min",auraSuccessiveSymptoms:"Successifs",auraEachFiveToSixtyMin:"5-60 min",auraPositiveSymptoms:"Symptome positif",auraHeadacheWithinSixtyMin:"Cephalee <60 min",firstAura:"Premier episode",auraDeficitPersistent:"Deficit persistant"};
  let html=panel("Criteres migraine sans aura",'<div class="checks">'+migraine.map(k=>check(k,labels[k])).join('')+'</div>');
  html+=panel("Aura typique",'<div class="checks">'+aura.map(k=>check(k,labels[k],k==="firstAura"||k==="auraDeficitPersistent")).join('')+'</div>');
  html+=panel("Traitements et comorbidites",'<div class="fields three">'+["nsaidDaysPerMonth","paracetamolDaysPerMonth","aspirinDaysPerMonth","triptanDaysPerMonth","opioidDaysPerMonth","caffeineComboDaysPerMonth","acuteTreatmentDaysPerWeek","failedPreventives","statusMigrainosusHours"].map(k=>field(k,k,"number",0,60)).join('')+'</div><div class="checks">'+["chronicOverThreeMonths","acuteTreatmentIneffective","recurrencesFrequent","vomitingInAttack","htaControlled","htaUncontrolled","cardiovascularDisease","majorCvRiskUnevaluated","asthmaCopdSevere","bradycardiaBlockHeartFailure","raynaudSevere","renalFailure","hepaticFailure","pepticUlcerBleeding","anticoagulantAntiplatelet","sleepDisorder","anxiety","depressionSevere","obesity","underweightAnorexia","glaucoma","prostateRetention","epilepsy","renalStones","cognitiveDisorder","neuropathicPainFibromyalgia","qtRisk","patientRequestsPreventive"].map(k=>check(k,k,k.includes("Uncontrolled")||k.includes("Disease"))).join('')+'</div>');
  html+=panel("Raisonnement declenche",d.traces.map(t=>'<article class="trace '+t.prudence+'"><b>'+esc(t.label)+'</b><small>'+esc(t.source)+" - "+esc(t.data.join(" | "))+'</small></article>').join(''));
  return html;
}
function followHtml(d){
  const stats=agenda.reduce((a,e)=>{a.migraine+=e.migraine?1:0;a.headache+=e.headache?1:0;a.med+=e.medication?1:0;a.rec+=e.recurrence24h?1:0;return a},{migraine:0,headache:0,med:0,rec:0});
  const agendaText=["Agenda migraine", "Jours migraine: "+stats.migraine, "Jours cephalee: "+stats.headache, "Jours medicament: "+stats.med, "", ...agenda.map(e=>e.date+" - severite "+e.severity+"/3 - "+(e.medication||"traitement non renseigne"))].join("\n");
  return panel("Agenda",'<div class="fields three"><label class="field"><span>Date</span><input id="ag-date" type="date" value="'+new Date().toISOString().slice(0,10)+'"></label><label class="field"><span>Severite</span><select id="ag-sev"><option>0</option><option>1</option><option selected>2</option><option>3</option></select></label><label class="field"><span>Medicament</span><input id="ag-med"></label></div><div class="checks"><label class="check"><input id="ag-mig" type="checkbox" checked><span>Migraine</span></label><label class="check"><input id="ag-head" type="checkbox" checked><span>Cephalee</span></label><label class="check"><input id="ag-2h" type="checkbox"><span>Libre douleur a 2 h</span></label><label class="check"><input id="ag-rec" type="checkbox"><span>Recurrence 24 h</span></label></div><label class="field"><span>Effets indesirables</span><textarea id="ag-ei"></textarea></label><div class="actions"><button class="btn" id="addAgenda">Ajouter</button><button class="btn copy" data-copy="'+esc(agendaText)+'">Copier agenda</button><button class="btn print" data-title="Agenda migraine" data-print="'+esc(agendaText)+'">PDF agenda</button></div>')+
  panel("Synthese suivi",'<div class="chips"><span>'+stats.migraine+' j migraine</span><span>'+stats.headache+' j cephalee</span><span>'+stats.med+' j medicament</span><span>'+stats.rec+' recurrences</span></div>'+textBox("Plan de suivi",d.follow.join("\n")))+
  panel("Dernieres entrees",agenda.length?agenda.map((e,i)=>'<article class="card"><b>'+esc(e.date)+'</b><span>severite '+e.severity+'/3</span><p>'+esc(e.medication||"traitement non renseigne")+'</p><button class="btn delAg" data-i="'+i+'">Retirer</button></article>').join(''):'<p class="muted">Aucune entree.</p>');
}
function medsHtml(){
  const q=(document.getElementById("medSearch")?.value||"").toLowerCase();
  const list=MEDIT=MEDICATIONS.filter(m=>!q||[m.dci,m.className,m.role,...m.brandNames,...m.aliases].join(" ").toLowerCase().includes(q));
  return panel("Base medicaments initiale",'<label class="search">Recherche<input id="medSearch" value="'+esc(q)+'" placeholder="DCI, marque, classe..."></label><div class="cards">'+list.map(m=>'<article class="card"><h3>'+esc(m.dci)+'</h3><span>'+esc(m.brandNames.join(", "))+'</span><div class="tags"><span>'+esc(m.role)+'</span><span>'+esc(m.className)+'</span><span>'+esc(m.reimbursement)+'</span></div><p>'+esc(m.adultDose)+'</p><details><summary>Contre-indications et prudences</summary>'+listItems([...m.contraindications,...m.precautions])+'</details><small>Source: '+esc(m.source)+' - verifie '+esc(m.lastVerified)+'. '+esc(m.notes)+'</small></article>').join('')+'</div>');
}
function sourcesHtml(d){return panel("Sources et mises a jour",'<div class="cards">'+GUIDELINES.map(g=>'<article class="card"><h3>'+esc(g.title)+'</h3><a href="'+esc(g.url)+'" target="_blank">'+esc(g.url)+'</a><div class="tags">'+g.usedFor.map(t=>'<span>'+esc(t)+'</span>').join('')+'</div><small>'+esc(g.note)+' Derniere verification: '+esc(g.lastVerified)+'.</small></article>').join('')+'</div>')+panel("Pourquoi cette recommandation",d.traces.map(t=>'<article class="trace '+t.prudence+'"><b>'+esc(t.label)+'</b><small>'+esc(t.source)+" - "+esc(t.data.join(" | "))+'</small></article>').join(''))}
function listItems(a){return '<ul>'+a.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>'}
function render(){save();renderNav();renderLeft();renderRight()}
document.addEventListener("input",e=>{const k=e.target.dataset.k;if(k){profile[k]=e.target.type==="checkbox"?e.target.checked:e.target.type==="number"?Number(e.target.value||0):e.target.value;render()}});
document.addEventListener("change",e=>{const k=e.target.dataset.k;if(k){profile[k]=e.target.type==="checkbox"?e.target.checked:e.target.type==="number"?Number(e.target.value||0):e.target.value;render()}});
document.addEventListener("click",async e=>{
  const t=e.target.closest("button"); if(!t)return;
  if(t.dataset.mode){mode=t.dataset.mode;render();return}
  if(t.classList.contains("copy")){await navigator.clipboard.writeText(t.dataset.copy||"");t.textContent="Copie";setTimeout(render,800);return}
  if(t.classList.contains("print")){printBlock(t.dataset.title||"MigraineMG",t.dataset.print||"");return}
  if(t.classList.contains("ex")){profile={...EXAMPLES[t.dataset.ex]};render();return}
  if(t.id==="themeBtn"){dark=!dark;document.documentElement.dataset.theme=dark?"dark":"light";localStorage.setItem("mmg-dark",String(dark));return}
  if(t.id==="resetBtn"){profile={...DEFAULT};agenda=[];render();return}
  if(t.id==="addAgenda"){agenda.unshift({date:document.getElementById("ag-date").value,severity:Number(document.getElementById("ag-sev").value),medication:document.getElementById("ag-med").value,migraine:document.getElementById("ag-mig").checked,headache:document.getElementById("ag-head").checked,painFreeAt2h:document.getElementById("ag-2h").checked,recurrence24h:document.getElementById("ag-rec").checked,adverseEffects:document.getElementById("ag-ei").value});render();return}
  if(t.classList.contains("delAg")){agenda.splice(Number(t.dataset.i),1);render();return}
});
document.addEventListener("keyup",e=>{if(e.target.id==="medSearch")renderRight()});
function printBlock(title,text){const w=window.open("","_blank","width=900,height=700"); if(!w)return; w.document.write('<!doctype html><meta charset="utf-8"><title>'+esc(title)+'</title><style>body{font-family:Arial,sans-serif;margin:28px;color:#111827;line-height:1.45}pre{white-space:pre-wrap;font-family:Arial,sans-serif}</style><h1>'+esc(title)+'</h1><pre>'+esc(text)+'</pre><p>Validation medicale et RCP requis avant prescription definitive.</p>'); w.document.close(); w.focus(); w.print()}
window.__MigraineMG__={evaluate,DEFAULT};
render();
