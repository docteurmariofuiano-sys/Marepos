<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GrossesseCalendrier MG</title>
  <style>
    :root {
      --bg: #f6f8f6;
      --panel: #ffffff;
      --soft: #edf4f1;
      --ink: #1e2c2c;
      --muted: #647170;
      --line: #d8e2de;
      --teal: #14786f;
      --green: #2b8a57;
      --amber: #b56a10;
      --red: #b91c1c;
      --blue: #2e6f9e;
      --violet: #7559a6;
      --patient: #c06562;
      --shadow: 0 18px 44px rgba(29, 48, 55, .11);
    }
    .dark {
      --bg: #111817;
      --panel: #182321;
      --soft: #20312e;
      --ink: #eef6f3;
      --muted: #a8b8b3;
      --line: #31433f;
      --teal: #58c7b7;
      --green: #7ccf9b;
      --amber: #f3b35c;
      --red: #f07676;
      --blue: #80b9e4;
      --violet: #bca5e7;
      --patient: #f19a95;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: Aptos, "Segoe UI", Arial, sans-serif; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .shell { width: min(1480px, 100%); margin: auto; padding: 18px; }
    header { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; margin-bottom: 16px; }
    .eyebrow { margin: 0 0 4px; color: var(--teal); font-size: .78rem; font-weight: 850; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(1.7rem, 4vw, 2.75rem); line-height: 1.02; }
    h2 { margin: 0 0 10px; font-size: 1.08rem; }
    h3 { margin: 0 0 8px; font-size: .96rem; }
    p { margin-top: 0; }
    .layout { display: grid; grid-template-columns: minmax(310px, 380px) 1fr; gap: 14px; align-items: start; }
    .stack { display: grid; gap: 14px; }
    .panel, .hero, .empty { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .panel { padding: 16px; }
    .top-actions, .seg, .tabs, .choices, .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .seg { padding: 4px; background: var(--soft); border: 1px solid var(--line); border-radius: 8px; }
    .seg button, .tabs button, .choice, .icon, .ghost, .primary, .secondary { min-height: 38px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); color: var(--ink); font-weight: 800; }
    .seg button { border: 0; padding: 0 12px; background: transparent; }
    .seg button.active, .tabs button.active, .choice.active { background: var(--teal); color: #fff; }
    .icon { width: 42px; }
    .ghost, .secondary, .tabs button { padding: 0 12px; background: var(--soft); }
    .primary { padding: 0 14px; color: #fff; background: var(--teal); border-color: var(--teal); }
    .primary.patient { background: var(--patient); border-color: var(--patient); }
    .choices { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .choice { width: 100%; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: .85rem; font-weight: 800; }
    input, select, textarea { width: 100%; min-height: 40px; padding: 8px 10px; color: var(--ink); background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
    textarea { resize: vertical; }
    .grid2, .metrics, .dash, .cards, .calendar, .detail-grid, .exports { display: grid; gap: 12px; }
    .grid2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .muted { color: var(--muted); }
    .privacy, .warning-footer, .note { padding: 10px; border-radius: 8px; font-weight: 760; }
    .privacy { color: var(--teal); background: color-mix(in srgb, var(--teal) 12%, var(--panel)); }
    .warning-footer { margin-top: 18px; color: var(--amber); background: color-mix(in srgb, var(--amber) 12%, var(--panel)); border: 1px solid color-mix(in srgb, var(--amber) 25%, var(--line)); }
    .hero { display: grid; grid-template-columns: minmax(260px, 1.2fr) minmax(320px, 1fr); gap: 18px; padding: 18px; }
    .hero h2 { margin: 8px 0; font-size: clamp(2rem, 5vw, 4rem); line-height: .95; }
    .pill { display: inline-flex; gap: 8px; align-items: center; width: fit-content; padding: 7px 10px; color: var(--teal); background: color-mix(in srgb, var(--teal) 12%, var(--panel)); border-radius: 999px; font-weight: 850; }
    .progress { height: 12px; margin-top: 14px; overflow: hidden; background: var(--soft); border-radius: 999px; }
    .progress div { height: 100%; background: linear-gradient(90deg, var(--teal), var(--green)); }
    .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .metric, .mini { min-height: 86px; padding: 12px; background: var(--soft); border: 1px solid var(--line); border-radius: 8px; }
    .metric span { display: block; color: var(--muted); font-size: .78rem; font-weight: 850; }
    .metric strong { display: block; margin-top: 5px; line-height: 1.1; }
    .tabs { position: sticky; top: 0; z-index: 5; padding: 8px; background: color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter: blur(10px); border: 1px solid var(--line); border-radius: 8px; }
    .dash { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .timeline { display: grid; grid-template-columns: minmax(260px, 360px) 1fr; gap: 14px; }
    .timeline-list { display: grid; gap: 8px; }
    .step { display: grid; grid-template-columns: 12px 1fr auto; gap: 10px; align-items: center; min-height: 62px; padding: 10px; text-align: left; color: var(--ink); background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
    .step.selected { border-color: var(--teal); box-shadow: inset 3px 0 0 var(--teal); }
    .step small { display: block; margin-top: 3px; color: var(--muted); }
    .dot { width: 10px; height: 10px; border-radius: 99px; background: var(--green); }
    .echo .dot, .tag.echo { background: var(--violet); }
    .admin .dot, .tag.admin { background: var(--blue); }
    .urgent .dot, .late .dot, .tag.urgent { background: var(--red); }
    .soon .dot, .tag.soon { background: var(--amber); }
    .patient .dot, .tag.patient { background: var(--muted); }
    ul { margin: 8px 0 0; padding-left: 18px; }
    pre { white-space: pre-wrap; max-height: 290px; overflow: auto; margin: 0 0 12px; padding: 12px; background: var(--soft); border: 1px solid var(--line); border-radius: 8px; line-height: 1.45; }
    .alert { color: var(--red); background: color-mix(in srgb, var(--red) 9%, var(--panel)); border-color: color-mix(in srgb, var(--red) 25%, var(--line)); }
    .cards, .exports { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .calendar-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 10px; }
    .pregnancy-months { display: grid; grid-template-columns: repeat(9, minmax(118px, 1fr)); gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
    .month-card { min-width: 118px; min-height: 154px; padding: 10px; background: var(--soft); border: 1px solid var(--line); border-radius: 8px; }
    .month-card.current { border-color: var(--teal); box-shadow: inset 0 3px 0 var(--teal); }
    .month-card span, .month-card small { display: block; color: var(--muted); font-size: .75rem; font-weight: 850; }
    .month-card strong { display: block; margin: 6px 0; font-size: .82rem; line-height: 1.25; }
    .month-card ul { margin-top: 8px; padding-left: 15px; font-size: .74rem; }
    .calendar { grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
    .day { min-height: 96px; padding: 8px; background: var(--soft); border: 1px solid var(--line); border-radius: 8px; }
    .day b { display: block; }
    .day.today { background: color-mix(in srgb, var(--teal) 13%, var(--panel)); border-color: var(--teal); box-shadow: inset 0 3px 0 var(--teal); }
    .day em { display: inline-block; margin-top: 4px; padding: 3px 6px; color: var(--teal); background: color-mix(in srgb, var(--teal) 12%, var(--panel)); border-radius: 999px; font-size: .68rem; font-style: normal; font-weight: 850; }
    .tag { display: block; margin-top: 5px; padding: 4px 6px; color: #fff; border-radius: 6px; font-size: .72rem; font-weight: 850; background: var(--green); }
    .check { display: flex; gap: 8px; align-items: center; min-height: 33px; color: var(--ink); }
    .check input { width: 16px; min-height: 16px; accent-color: var(--teal); }
    .empty { min-height: 420px; display: grid; place-items: center; text-align: center; padding: 32px; }
    @media (max-width: 1060px) { .layout, .hero, .timeline { grid-template-columns: 1fr; } }
    @media (max-width: 720px) { .shell { padding: 10px; } header, .dash, .metrics, .grid2, .detail-grid { grid-template-columns: 1fr; } .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); } .day { min-height: 74px; padding: 5px; } }
    @media print { aside, .tabs, .top-actions, .exports button { display: none !important; } .layout, .hero, .dash { display: block; } .panel, .hero { box-shadow: none; break-inside: avoid; margin-bottom: 12px; } }
  </style>
</head>

    function today() { const n = new Date(); return iso(new Date(Date.UTC(n.getFullYear(), n.getMonth(), n.getDate()))); }
    function add(v, days) { return iso(new Date(parse(v).getTime() + days * DAY)); }
    function diff(a, b) { return Math.round((parse(b).getTime() - parse(a).getTime()) / DAY); }
    function fmt(v) { return v ? new Intl.DateTimeFormat("fr-FR", { day: "2-digit", month: "short", year: "numeric", timeZone: "UTC" }).format(parse(v)) : "date non renseignée"; }
    function term(days, suffix) { return days < 0 ? "datation à vérifier" : `${Math.floor(days / 7)} ${suffix} + ${days % 7} j`; }
    function calcBase(s) {
      if (s.method === "lmp" && s.lmp) {
        if (!lmpYearOk(s.lmp)) return null;

      if (s.method === "conception" && s.conception) return makeBase(s.conception, "date de conception déclarée");
      if (s.method === "start" && s.start) return makeBase(s.start, "date de début de grossesse déclarée");
      if (s.method === "echo" && s.echoDate && s.echoWeeks !== "") { const lmp = add(s.echoDate, -((Number(s.echoWeeks) || 0) * 7 + (Number(s.echoDays) || 0))); return { ddg: add(lmp, 14), lmp, dpa: add(add(lmp, 14), 273), methodLabel: "datation échographique", notes: [`Terme mesuré : ${Number(s.echoWeeks) || 0} SA + ${Number(s.echoDays) || 0} j.`] }; }
      if (s.method === "pma" && s.transfer) return makeBase(add(s.transfer, -(Number(s.embryoAge) || 5)), `PMA/FIV transfert J${Number(s.embryoAge) || 5}`);

    }
    function lmpYearOk(value) { const year = Number(String(value).slice(0, 4)); return year >= 1960 && year <= 2200; }
    function makeBase(ddg, label) { return { ddg, lmp: add(ddg, -14), dpa: add(ddg, 273), methodLabel: label, notes: [] }; }
    function calculate(s = state, now = today()) {

    function timeline(calc) {

        return { id: m[0], title: m[1], short: m[2], start, end, tone: m[5], desc: m[6], clinical: m[7], exams: m[8], patient: m[9], status };

    function alerts(s = state) {

    }
    function risk(s = state, calc = calculate()) {
      const factors = []; let score = 0;
      const addFactor = (cond, pts, label) => { if (cond) { score += pts; factors.push(label); } };
      addFactor(Number(s.age) < 18, 2, "âge maternel < 18 ans");
      addFactor(Number(s.age) > 40, 2, "âge maternel > 40 ans");
      addFactor(Number(s.bmi) >= 30, 1, "IMC pré-grossesse élevé");
      addFactor(s.prevPrematurity, 2, "antécédent de prématurité");
      addFactor(s.prevPreeclampsia, 2, "antécédent de prééclampsie");
      addFactor(s.prevDiabetes, 1, "antécédent de diabète gestationnel");
      addFactor(s.prevCesarean, 1, "antécédent de césarienne");
      addFactor(s.multiple === "twins", 2, "grossesse gémellaire");
      addFactor(s.multiple === "triplets", 3, "grossesse triple ou plus");
      addFactor(Boolean((s.conditions || "").trim()), 2, "pathologie maternelle renseignée");
      addFactor(alerts(s).length > 0, 3, "symptôme d'alerte déclaré");
      addFactor(calc && calc.saDays > 287, 2, "terme dépassé");

    function maternity(dpa, s = state) {

    function next(items, kind) { return items.find(i => (!kind || i.tone === kind) && ["current", "soon", "future"].includes(i.status) && i.id !== "post"); }
    function medicalSummary(calc, items, r) {
      const nx = next(items), pending = items.filter(i => ["current", "soon", "late"].includes(i.status)).flatMap(i => i.exams).slice(0, 5);
      const mult = state.multiple === "twins" ? "gémellaire" : state.multiple === "triplets" ? "triple ou plus" : "simple";
      return [`Grossesse suivie à ${term(calc.saDays, "SA")}.`, `DDG retenue : ${fmt(calc.ddg)}.`, `DPA : ${fmt(calc.dpa)}.`, `Méthode de datation : ${calc.methodLabel}.`, `Grossesse : ${mult}.`, `Prochaine étape : ${nx ? `${nx.short} (${fmt(nx.start)} - ${fmt(nx.end)})` : "à confirmer"}.`, `Points de vigilance : ${r.factors.length ? r.factors.join(", ") : "aucun facteur majeur renseigné"}.`, `Examens en attente : ${pending.length ? pending.join(" ; ") : "à adapter au contexte clinique"}.`].join("\n");
    }
    function patientSummary(calc, items) {
      const nx = next(items), echo = next(items, "echo");
      return [`Vous êtes actuellement à ${term(calc.saDays, "SA")}.`, `Votre date présumée d'accouchement est le ${fmt(calc.dpa)}.`, `Votre prochain rendez-vous important est : ${nx ? `${nx.short}, entre le ${fmt(nx.start)} et le ${fmt(nx.end)}` : "à confirmer avec votre professionnel de santé"}.`, `Votre prochaine échographie est prévue entre ${echo ? `${fmt(echo.start)} et ${fmt(echo.end)}` : "des dates à confirmer"}.`, "Consultez rapidement en cas de saignements, pertes de liquide, douleurs importantes, fièvre, maux de tête inhabituels, troubles visuels, diminution des mouvements du bébé ou essoufflement important."].join("\n");
    }
    function render() {

      document.getElementById("app").innerHTML = `

        </div>`;
    }
    function formHtml() {

        </section>

          ${field("children", "Enfants à charge", "number", 'min="0"')}

          <label>Toxoplasmose<select data-field="toxo"><option value="unknown" ${sel("toxo", "unknown")}>Inconnue</option><option value="yes" ${sel("toxo", "yes")}>Immunisée</option><option value="no" ${sel("toxo", "no")}>Non immunisée</option></select></label>
          </div>
          <div class="grid2" style="margin-top:10px">${check("prevPrematurity", "Prématurité")}${check("prevPreeclampsia", "Prééclampsie")}${check("prevDiabetes", "Diabète gestationnel")}${check("prevCesarean", "Césarienne")}</div>

        </section>

    }
    function datingFields(field) {

    }
    function resultHtml(calc, items, r, al) {
      const nx = next(items), echo = next(items, "echo"), late = items.filter(i => i.status === "late");
      return `
        <section class="hero"><div><span class="pill">${calc.sgDays < 0 ? "Grossesse très précoce ou datation à vérifier" : term(calc.saDays, "SA")}</span><h2>${term(calc.sgDays, "SG")}</h2><p class="muted">DPA estimée le <b>${fmt(calc.dpa)}</b> · DDG retenue le <b>${fmt(calc.ddg)}</b></p><div class="progress"><div style="width:${calc.progress}%"></div></div><p class="muted">${calc.progress}% d'avancement théorique</p></div>

    function timelineHtml(items) {

    function alertHtml(al) { return `<section class="panel ${al.length ? "alert" : ""}"><h2>Alertes médicales</h2>${al.length ? al.map(a => `<article><b>${a.label}</b><p>${a.msg}</p></article>`).join("") : `<p class="muted">Aucun signe d'alerte coché. Réévaluation clinique à chaque contact.</p>`}</section>`; }
    function summaryPanel(title, text, kind) { return `<section class="panel"><div class="row" style="justify-content:space-between"><h2>${title}</h2><button class="ghost" data-copy="${kind}">Copier</button></div><pre>${esc(text)}</pre></section>`; }
    function metric(label, value) { return `<article class="metric"><span>${label}</span><strong>${value}</strong></article>`; }
    function check(key, label) { return `<label class="check"><input data-check="${key}" type="checkbox" ${state[key] ? "checked" : ""}><span>${label}</span></label>`; }
    function li(text) { return `<li>${esc(text)}</li>`; }
    function sel(key, value) { return String(state[key] ?? "") === value ? "selected" : ""; }
    function esc(v) { return String(v ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function tabLabel(t) { return ({ dashboard: "Tableau de bord", timeline: "Timeline", calendar: "Calendrier", biology: "Biologie", ultrasounds: "Échographies", admin: "Administratif", alerts: "Alertes", advice: "Conseils", exports: "Export" })[t]; }
    function statusLabel(s) { return ({ current: "période actuelle", soon: "à prévoir bientôt", future: "à venir", late: "à vérifier si non réalisé", past: "passé" })[s] || "information"; }
    function save() { localStorage.setItem(STORE, JSON.stringify(state)); }
    function load() { try { return { ...defaultState, ...(JSON.parse(localStorage.getItem(STORE) || "null") || {}) }; } catch { return { ...defaultState }; } }
    function download(name, content, type) { const blob = new Blob([content], { type }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url); }
    function printExport(kind) { state.tab = "exports"; save(); render(); setTimeout(() => window.print(), 80); }
    document.getElementById("app").addEventListener("input", e => {
      const t = e.target;
      if (t.dataset.field) state[t.dataset.field] = t.type === "checkbox" ? t.checked : t.value;
      if (["lmp", "dpa", "conception", "start", "echoDate", "echoWeeks", "echoDays", "transfer"].includes(t.dataset.field)) state.calendarSa = null;
      if (t.dataset.warning) state.warnings[t.dataset.warning] = t.checked;
      if (t.dataset.check) state[t.dataset.check] = t.checked;
      save(); render();
    });
    document.getElementById("app").addEventListener("click", async e => {
      const b = e.target.closest("button"); if (!b) return;
      if (b.dataset.method) { state.method = b.dataset.method; state.calendarSa = null; }
      if (b.dataset.mode) state.mode = b.dataset.mode;
      if (b.dataset.tab) state.tab = b.dataset.tab;
      if (b.dataset.dark) state.dark = !state.dark;
      if (b.dataset.selected) state.selected = b.dataset.selected;
      if (b.dataset.reset) { localStorage.removeItem(STORE); state = { ...defaultState }; }
      const calc = calculate(), items = calc ? timeline(calc) : [], r = risk(state, calc);
      if (calc && b.dataset.calnav) state.calendarSa = Math.max(0, Math.min(44 * 7, (state.calendarSa ?? calc.saDays) + Number(b.dataset.calnav)));
      if (calc && b.dataset.calset === "current") state.calendarSa = Math.max(0, Math.min(44 * 7, calc.saDays));
      if (calc && b.dataset.calset === "44") state.calendarSa = 44 * 7;
      if (b.dataset.copy && calc) await navigator.clipboard.writeText(b.dataset.copy === "patient" ? patientSummary(calc, items) : medicalSummary(calc, items, r));
      if (b.dataset.print) window.print();
      if (b.dataset.pdf) printExport(b.dataset.pdf);
      save(); render();
    });
    window.__GC_TEST__ = { add, diff, calculate, calcBase, timeline, risk, maternity, lmpYearOk, pregnancyMonthsHtml, calendarHtml, defaultState };
    render();
  </script>
