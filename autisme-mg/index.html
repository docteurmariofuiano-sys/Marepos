<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autisme MG - Repérage & Orientation TSA</title>
  <style>
    :root{--bg:#f4f7f6;--panel:#fff;--soft:#e8f4ef;--ink:#142326;--muted:#607177;--line:#d6e0dd;--teal:#0f766e;--navy:#14314a;--green:#4c8a6d;--amber:#b7791f;--red:#b34242;--shadow:0 12px 30px rgba(18,42,45,.10);font-family:"Segoe UI",Tahoma,sans-serif}
    body.dark{--bg:#101817;--panel:#182321;--soft:#203530;--ink:#eef7f3;--muted:#a7b8b2;--line:#30443f;--teal:#72d6c8;--navy:#8db5d9;--green:#9ed3b4;--amber:#f0c36a;--red:#f09b92;--shadow:0 12px 30px rgba(0,0,0,.28)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:275px minmax(0,1fr)}aside{background:#112b40;color:#fff;padding:18px;display:flex;flex-direction:column;gap:16px;position:sticky;top:0;height:100vh}body.dark aside{background:#0b1211}
    .brand{display:flex;gap:12px;align-items:center;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.15)}.mark{width:48px;height:48px;border-radius:8px;background:#d8efe4;color:#12352f;display:grid;place-items:center;font-weight:800}.brand b,.brand span{display:block}.brand span{font-size:.88rem;color:rgba(255,255,255,.72)}
    nav{display:grid;gap:6px;overflow:auto}nav button,.btn{border:1px solid transparent;border-radius:8px;min-height:42px;display:flex;align-items:center;gap:8px;padding:10px 12px}nav button{background:transparent;color:rgba(255,255,255,.84);text-align:left}nav button.active,nav button:hover{background:rgba(255,255,255,.13);color:#fff}
    .workspace{padding:22px;display:grid;gap:16px;min-width:0}.top{display:flex;align-items:center;justify-content:space-between;gap:14px}.top h1{margin:.15rem 0 0;font-size:clamp(1.45rem,2.2vw,2rem)}.eyebrow{margin:0;color:var(--teal);font-weight:800}
    .scorebar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.scorebar>div,.panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.scorebar>div{padding:14px;display:grid;gap:4px;min-height:94px}.scorebar span,.scorebar small{color:var(--muted)}.scorebar strong{font-size:1.08rem}
    .screen{display:none}.screen.active{display:block}.grid{display:grid;gap:14px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.wide{grid-column:1/-1}.panel{padding:16px}.head{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.panel h2,.panel h3{margin:0}.panel h2{font-size:1.1rem}.panel p,.muted{color:var(--muted);line-height:1.45}
    .btn{background:var(--panel);border-color:var(--line);color:var(--ink);font-weight:750;justify-content:center}.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}.btn.soft{background:var(--soft);color:var(--teal)}.btn.danger{background:rgba(179,66,66,.12);color:var(--red);border-color:rgba(179,66,66,.35)}.btnrow{display:flex;flex-wrap:wrap;gap:8px}
    .badge{display:inline-flex;width:max-content;max-width:100%;border-radius:999px;padding:4px 9px;font-size:.78rem;font-weight:800;background:rgba(15,118,110,.12);color:var(--teal)}.low{background:rgba(77,139,112,.14);color:var(--green)}.mid{background:rgba(183,121,31,.13);color:var(--amber)}.high{background:rgba(179,66,66,.13);color:var(--red)}
    .form{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.field{display:grid;gap:7px}.field span{font-weight:750}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;background:var(--panel);color:var(--ink)}textarea{min-height:96px;resize:vertical}
    .checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:8px}.check{display:flex;align-items:flex-start;gap:9px;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--panel)}.check input{width:18px;height:18px;accent-color:var(--teal)}.check.red{border-color:rgba(183,121,31,.5)}.check.urgent{border-color:rgba(179,66,66,.6)}
    .choices{display:flex;flex-wrap:wrap;gap:7px}.choices button{border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--muted);padding:8px 10px;font-weight:750}.choices button.on{background:rgba(15,118,110,.12);border-color:var(--teal);color:var(--teal)}
    .alert{display:flex;gap:10px;padding:12px;border-radius:8px;border:1px solid rgba(183,121,31,.35);background:rgba(183,121,31,.10);line-height:1.4}.alert.safe{border-color:rgba(15,118,110,.28);background:rgba(15,118,110,.10)}
    .big{padding:18px;border-radius:8px;background:var(--soft);border:1px solid var(--line);display:grid;gap:8px}.big strong{font-size:2.1rem;line-height:1}.list{display:grid;gap:8px}.list p{margin:0}.mchat{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}.item{border:1px solid var(--line);border-radius:8px;padding:12px;background:var(--panel);display:grid;gap:9px}.item.risk{border-color:rgba(179,66,66,.55)}.item small{color:var(--muted)}
    .tags{display:flex;flex-wrap:wrap;gap:8px}.tags span{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--muted);font-weight:700}.report{min-height:360px;font-family:Consolas,monospace;line-height:1.4}.source a{display:inline-flex;margin:4px 8px 4px 0;color:var(--teal);font-weight:800}.printdoc{display:none}
    @media(max-width:1050px){.app{grid-template-columns:1fr}aside{position:static;height:auto}nav{grid-template-columns:repeat(auto-fit,minmax(145px,1fr))}.scorebar,.two{grid-template-columns:1fr}.top{align-items:stretch;flex-direction:column}.btn{width:100%}}
    @media print{aside,.workspace{display:none}.app{display:block}.printdoc{display:block;padding:26px;color:#111;background:#fff;font-family:Georgia,serif}.printdoc pre{white-space:pre-wrap;font:inherit;line-height:1.45}}
  </style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><div class="mark">AMG</div><div><b>Autisme MG</b><span>Repérage & Orientation TSA</span></div></div>
    <nav id="nav"></nav>
    <div class="btnrow" style="margin-top:auto"><button class="btn soft" id="themeBtn">Mode sombre</button><button class="btn" id="saveBtn">Sauvegarder</button></div>
  </aside>
  <main class="workspace">
    <header class="top"><div><p class="eyebrow">Consultation TSA/TND</p><h1 id="title">Accueil</h1></div><div class="btnrow"><button class="btn soft" data-goto="reports">Exporter</button><button class="btn primary" id="newBtn">Nouvelle évaluation</button></div></header>
    <section class="scorebar" id="scorebar"></section>
    <section id="home" class="screen active"></section>
    <section id="profile" class="screen"></section>
    <section id="warnings" class="screen"></section>
    <section id="mchat" class="screen"></section>
    <section id="review" class="screen"></section>
    <section id="synthesis" class="screen"></section>
    <section id="orientation" class="screen"></section>
    <section id="reports" class="screen"></section>
    <section id="sources" class="screen"></section>
    <div class="alert safe">Outil de dépistage et d'aide à l'orientation, non diagnostique. Le médecin reste responsable de la décision clinique.</div>
  </main>
  <article class="printdoc"><h1 id="printTitle"></h1><pre id="printBody"></pre></article>
</div>
<script>
(() => {
  "use strict";
  const STORE="autisme-mg-standalone-v2";
  const PCO_URL="https://handicap.gouv.fr/les-plateformes-de-coordination-et-dorientation-pco";
  const tabs=[["home","Accueil"],["profile","Profil enfant"],["warnings","Signes d'alerte"],["mchat","M-CHAT officiel"],["review","Items à reprendre"],["synthesis","Synthèse clinique"],["orientation","Orientation"],["reports","Compte rendu"],["sources","Sources / limites"]];
  const reasons=["inquiétude parentale","retard de langage","absence de pointage","isolement","comportements répétitifs","régression","troubles alimentaires","troubles du sommeil","crise comportementale","autre"];
  const q=["","Votre enfant aime-t-il être balancé sur vos genoux ?","Votre enfant s'intéresse-t-il à d'autres enfants ?","Votre enfant aime-t-il monter sur des meubles ou des escaliers ?","Votre enfant aime-t-il jouer aux jeux de cache-cache ou 'coucou me voilà' ?","Votre enfant joue-t-il à des jeux de faire semblant, par exemple parler au téléphone ou jouer avec des peluches ou des poupées ?","Votre enfant utilise-t-il son index pour pointer en demandant quelque chose ?","Votre enfant utilise-t-il son index en pointant pour vous montrer des choses qui l'intéressent ?","Votre enfant joue-t-il correctement avec de petits jouets sans les porter à la bouche, les tripoter ou les faire tomber ?","Votre enfant amène-t-il des objets pour vous les montrer ?","Votre enfant regarde-t-il dans vos yeux plus d'une seconde ou deux ?","Arrive-t-il que votre enfant semble excessivement sensible à des bruits, jusqu'à se boucher les oreilles ?","Votre enfant vous sourit-il en réponse à votre sourire ?","Votre enfant vous imite-t-il, par exemple si vous faites une grimace ?","Votre enfant répond-il à son nom quand vous l'appelez ?","Si vous pointez vers un jouet de l'autre côté de la pièce, votre enfant suivra-t-il des yeux ?","Votre enfant marche-t-il sans aide ?","Votre enfant regarde-t-il des objets que vous regardez ?","Votre enfant fait-il des gestes inhabituels avec ses mains près du visage ?","Votre enfant essaie-t-il d'attirer votre attention vers son activité ?","Vous êtes-vous demandé si votre enfant était sourd ?","Votre enfant comprend-il ce que les gens disent ?","Arrive-t-il que votre enfant regarde dans le vide ou qu'il se promène sans but ?","Votre enfant regarde-t-il votre visage pour vérifier votre réaction quand il est face à une situation inhabituelle ?"];
  const critical=new Set([2,7,9,13,14,15]);
  const yesRisk=new Set([11,18,20,22]);
  const signs=[["poor-eye","Absence ou pauvreté du contact visuel",0,"social"],["no-smile","Absence de sourire social",0,"social"],["no-pointing","Absence de pointage proto-déclaratif après 12 mois",12,"social","red"],["poor-joint","Manque d'attention conjointe",12,"social"],["no-words","Absence de mots après 18 mois",18,"langage","red"],["language-delay","Retard de langage",18,"langage"],["no-two-word","Absence d'association spontanée de deux mots non écholaliques après 24 mois",24,"langage","red"],["regression","Perte de langage ou régression sociale à tout âge",0,"neurologique","urgent"],["repetitive","Comportements répétitifs",24,"comportement"],["parental","Inquiétude parentale persistante",0,"parental","red"],["hearing-vision-neuro","Suspicion de surdité, déficit visuel ou trouble neurologique associé",0,"neurologique","red"]];
  const exam=["Contact visuel","Réponse au prénom","Attention conjointe","Pointage","Imitation","Jeu symbolique","Interaction avec le parent","Comportement sensoriel","Motricité globale/fine","Examen ORL rapide","Recherche de troubles visuels","Examen neurologique simple","Courbe staturo-pondérale et périmètre crânien"];
  const diffs=["Trouble auditif","Trouble visuel","Retard global du développement","Trouble développemental du langage","Déficience intellectuelle","Trouble neurologique/épilepsie si régression","Trouble anxieux ou psychoaffectif","Contexte plurilingue ou stimulation à interpréter prudemment","Prématurité"];
  const srcs=[["Plateformes de coordination et d'orientation PCO",PCO_URL],["M-CHAT français fourni localement","M-CHAT_French.pdf"],["M-CHAT screen","https://www.mchatscreen.com"],["Asperansa M-CHAT","https://www.asperansa.org/m-chat/m-chat.html"]];
  const $=id=>document.getElementById(id), esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const blank=()=>({theme:"light",active:"home",report:"note",patient:{initials:"",birth:"",sex:"",school:"",languages:"",hearing:"inconnu",vision:"inconnu",reasons:[],other:"",parentConcern:"absente",familyImpact:"",schoolImpact:"",assessments:""},physician:{name:"",rpps:"",address:"",phone:"",email:""},warnings:{},mchat:Object.fromEntries(Array.from({length:23},(_,i)=>[i+1,{answer:"unknown",mis:false}])),review:{}});
  let state=load();
  function load(){try{return merge(blank(),JSON.parse(localStorage.getItem(STORE)||"{}"))}catch{return blank()}}
  function merge(a,b){for(const k in b){if(b[k]&&typeof b[k]==="object"&&!Array.isArray(b[k]))a[k]=merge(a[k]||{},b[k]);else a[k]=b[k]}return a}
  function save(){localStorage.setItem(STORE,JSON.stringify(state))}
  function ageMonths(){if(!state.patient.birth)return null;const b=new Date(state.patient.birth+"T00:00:00"),n=new Date();if(isNaN(b)||b>n)return null;let m=(n.getFullYear()-b.getFullYear())*12+n.getMonth()-b.getMonth();if(n.getDate()<b.getDate())m--;return Math.max(0,m)}
  function ageText(){const m=ageMonths();if(m===null)return"âge non renseigné";const y=Math.floor(m/12),mo=m%12;return y?`${y} an${y>1?"s":""}${mo?` et ${mo} mois`:""}`:`${mo} mois`}
  function isRisk(id,a){if(a==="unknown")return false;return yesRisk.has(id)?a==="yes":a==="no"}
  function score(){const risk=[],crit=[];let answered=0;for(let i=1;i<=23;i++){const r=state.mchat[i]||{};if(r.answer!=="unknown")answered++;if(isRisk(i,r.answer)){risk.push(i);if(critical.has(i))crit.push(i)}}const pos=risk.length>=3||crit.length>=2;let level="faible",label="Dépistage M-CHAT négatif";if(!pos&&(risk.length>=2||crit.length===1)){level="modere";label="M-CHAT limite - relecture clinique"}if(pos){level=(risk.length>=8||crit.length>=3)?"eleve":"modere";label="Dépistage M-CHAT positif / à risque"}return{risk,crit,total:risk.length,criticalCount:crit.length,answered,pos,level,label,advice:pos?"Le résultat ne pose pas le diagnostic. Il indique la nécessité d'une évaluation clinique développementale et/ou spécialisée.":"Un score négatif n'exclut pas un trouble du neurodéveloppement si la clinique est préoccupante."}}
  function review(){const sc=score(),rel=sc.risk.map(i=>({item:i,...(state.review[i]||{status:"not"})}));const done=rel.length>0&&rel.every(x=>x.status&&x.status!=="not");const confirmed=rel.filter(x=>x.status==="risk"),crit=confirmed.filter(x=>critical.has(Number(x.item)));return{done,count:confirmed.length,criticalCount:crit.length,pos:done&&(confirmed.length>=3||crit.length>=2),label:done?(confirmed.length>=3||crit.length>=2?"Relecture positive selon critères M-CHAT":"Relecture négative, surveillance selon clinique"):"Items échoués à reprendre"}}
  function warn(){const selected=signs.filter(s=>state.warnings[s[0]]),urgent=selected.some(s=>s[4]==="urgent")||state.patient.reasons.includes("régression"),parent=state.patient.parentConcern==="importante"||state.patient.reasons.includes("inquiétude parentale"),red=selected.filter(s=>s[4]);let level="faible";if(urgent)level="urgent";else if(red.length>=2||(parent&&selected.length))level="eleve";else if(red.length||selected.length>=2||parent)level="modere";return{selected,red,urgent,parent,level,summary:selected.length?`${selected.length} signe(s) coché(s), dont ${red.length} red flag(s).`:"Aucun signe d'alerte coché."}}
  function orient(){const sc=score(),rv=review(),w=warn(),age=ageMonths()||0,positive=sc.pos||rv.pos,concern=["eleve","urgent"].includes(w.level)||state.patient.parentConcern==="importante";const actions=new Set(),refs=new Set(),bilans=new Set(["Bilan auditif ou ORL","Bilan visuel","Évaluation langage, communication préverbale et attention conjointe"]);const alerts=[];if(state.patient.reasons.includes("retard de langage")||w.selected.some(s=>s[3]==="langage"))refs.add("Orthophoniste : langage, communication, pragmatique");if(w.urgent){actions.add("Urgence spécialisée ou avis rapide");refs.add("Neuropédiatrie ou pédopsychiatrie en priorité");alerts.push("Régression ou situation sévère : ne pas différer l'avis spécialisé.")}if(positive||concern){actions.add(`Adressage PCO (${PCO_URL}) / CAMSP / CMP / CMPP selon âge et territoire`);actions.add("Mettre en place les bilans de première ligne sans attendre le diagnostic")}if(age<=72){refs.add(`PCO 0-6 ans (${PCO_URL}) si suspicion TND/TSA`);refs.add("CAMSP");refs.add("CMP/CMPP")}else if(age<=144){refs.add(`PCO 7-12 ans si disponible (${PCO_URL})`);refs.add("CMP/CMPP");refs.add("Pédopsychiatre ou neuropédiatre")}else if(age<216){refs.add("CMP adolescent / pédopsychiatre");refs.add("CRA si situation complexe")}else{refs.add("Psychiatre ou CMP adulte");refs.add("CRA si situation complexe")}if(sc.level==="faible"&&!concern&&!w.urgent){actions.add("Surveillance simple");if((ageMonths()||99)<24)actions.add("Nouveau point vers 24 mois")}else if(!w.urgent&&!positive){actions.add("Recontrôle rapproché ou avis spécialisé si inquiétude persistante")}if(state.patient.parentConcern==="importante"&&sc.level==="faible")actions.add("Ne pas rassurer uniquement sur le score : suivi rapproché");const urgency=w.urgent?"urgent":positive||w.level==="eleve"?"eleve":sc.level==="modere"||w.level==="modere"?"modere":"faible";return{urgency,headline:urgency==="urgent"?"Urgence spécialisée":urgency==="eleve"?"Orientation spécialisée recommandée":urgency==="modere"?"Relecture ou recontrôle rapproché":"Surveillance développementale",actions:[...actions],refs:[...refs],bilans:[...bilans],alerts}}
  function panel(t,sub,body,wide=false){return`<div class="panel ${wide?"wide":""}"><div class="head"><div><h2>${t}</h2>${sub?`<p>${sub}</p>`:""}</div></div>${body}</div>`}
  function setActive(id){state.active=id;save();render()}
  function renderNav(){$("nav").innerHTML=tabs.map(t=>`<button class="${state.active===t[0]?"active":""}" data-tab="${t[0]}">${t[1]}</button>`).join("");$("title").textContent=tabs.find(t=>t[0]===state.active)?.[1]||"Accueil"}
  function renderScore(){const sc=score(),w=warn(),o=orient();$("scorebar").innerHTML=`<div><span>Enfant</span><strong>${esc(state.patient.initials||"Anonyme")}</strong><small>${ageText()}</small></div><div><span>M-CHAT</span><strong>${sc.total}/23</strong><small>${sc.label} - critiques: ${sc.criticalCount}</small></div><div><span>Clinique</span><strong>${w.level}</strong><small>préoccupation</small></div><div><span>Conduite</span><strong>${o.headline}</strong><small>à confirmer</small></div>`}
  function home(){const sc=score(),o=orient(),w=warn();$("home").innerHTML=`<div class="grid two">${panel("Décision rapide","Repérage TSA/TND en consultation courte.",`<div class="big"><span class="badge ${w.level==="faible"?"low":w.level==="modere"?"mid":"high"}">Clinique ${w.level}</span><strong style="font-size:1.45rem">${o.headline}</strong><p>Un résultat positif ne pose pas le diagnostic de TSA. Il indique la nécessité d'une évaluation clinique développementale et/ou spécialisée.</p><div class="btnrow"><button class="btn primary" data-goto="profile">Commencer</button><button class="btn soft" data-goto="reports">Rapport</button></div></div>`)}${panel("État actuel","",`<div class="list"><p><b>M-CHAT :</b> ${sc.total}/23, ${sc.label}</p><p><b>Items critiques :</b> ${sc.criticalCount}</p><p><b>PCO :</b> lien intégré dans le parcours et les courriers (<a href="${PCO_URL}" target="_blank">${PCO_URL}</a>)</p></div>`)}${panel("Sécurité","",`<div class="alert">Un score négatif n'exclut pas un trouble du neurodéveloppement si la clinique est préoccupante.</div>`,true)}</div>`}
  function profile(){const p=state.patient;$("profile").innerHTML=`<div class="grid two">${panel("Profil enfant","Données anonymisées par défaut.",`<div class="form"><label class="field"><span>Prénom ou initiales</span><input data-p="initials" value="${esc(p.initials)}"></label><label class="field"><span>Date de naissance</span><input type="date" data-p="birth" value="${esc(p.birth)}"></label><label class="field"><span>Âge</span><input readonly value="${ageText()}"></label><label class="field"><span>Sexe</span><input data-p="sex" value="${esc(p.sex)}"></label><label class="field"><span>Langue(s)</span><input data-p="languages" value="${esc(p.languages)}"></label><label class="field"><span>Crèche / scolarisation</span><input data-p="school" value="${esc(p.school)}"></label><label class="field"><span>Audition vérifiée</span><select data-p="hearing">${yn(p.hearing)}</select></label><label class="field"><span>Vision vérifiée</span><select data-p="vision">${yn(p.vision)}</select></label></div>`)}${panel("Motif","L'inquiétude parentale est un signe d'alerte majeur.",`<div class="checks">${reasons.map(r=>`<label class="check"><input type="checkbox" data-reason="${esc(r)}" ${p.reasons.includes(r)?"checked":""}>${r}</label>`).join("")}</div><div class="form" style="margin-top:12px"><label class="field"><span>Autre motif</span><input data-p="other" value="${esc(p.other)}"></label><label class="field"><span>Inquiétude parentale</span><select data-p="parentConcern"><option ${p.parentConcern==="absente"?"selected":""}>absente</option><option ${p.parentConcern==="moderee"?"selected":""}>moderee</option><option ${p.parentConcern==="importante"?"selected":""}>importante</option></select></label><label class="field"><span>Retentissement familial</span><textarea data-p="familyImpact">${esc(p.familyImpact)}</textarea></label><label class="field"><span>Retentissement crèche / scolaire</span><textarea data-p="schoolImpact">${esc(p.schoolImpact)}</textarea></label><label class="field"><span>Bilans déjà réalisés</span><textarea data-p="assessments">${esc(p.assessments)}</textarea></label></div>`,true)}</div>`}
  function yn(v){return["oui","non","inconnu"].map(x=>`<option ${v===x?"selected":""}>${x}</option>`).join("")}
  function warnings(){const w=warn();$("warnings").innerHTML=`<div class="grid two">${panel("Signes d'alerte","Chaque signe coché nourrit l'orientation.",`<div class="checks">${signs.map(s=>`<label class="check ${s[4]==="urgent"?"urgent":s[4]?"red":""}"><input type="checkbox" data-sign="${s[0]}" ${state.warnings[s[0]]?"checked":""}>${s[1]} ${s[4]==="urgent"?'<span class="badge high">urgent</span>':s[4]?'<span class="badge mid">red flag</span>':""}</label>`).join("")}</div>`)}${panel("Niveau de préoccupation","La clinique prime toujours sur le score.",`<div class="big"><span>Niveau</span><strong>${w.level}</strong><p>${w.summary}</p></div><div class="list">${w.selected.length?w.selected.map(s=>`<p>${esc(s[1])}</p>`).join(""):"<p>Aucun signe coché.</p>"}</div>`)}</div>`}
  function mchat(){const sc=score();const items=Array.from({length:23},(_,i)=>i+1).map(i=>{const r=state.mchat[i]||{answer:"unknown",mis:false};const risk=yesRisk.has(i)?"Oui":"Non";return`<div class="item ${sc.risk.includes(i)?"risk":""}"><b>${i}. ${esc(q[i])} ${critical.has(i)?'<span class="badge high">item critique</span>':""}</b><small>Réponse à risque: ${risk}</small><div class="choices" data-mchat="${i}">${["yes:Oui","no:Non","unknown:À saisir"].map(x=>{const [v,l]=x.split(":");return`<button type="button" class="${r.answer===v?"on":""}" data-v="${v}">${l}</button>`}).join("")}</div><label class="check"><input type="checkbox" data-mis="${i}" ${r.mis?"checked":""}>Question non comprise / réponse à clarifier</label></div>`}).join("");$("mchat").innerHTML=`<div class="grid two">${panel("M-CHAT français - 23 items","Questions issues du PDF M-CHAT français fourni et de la source Asperansa indiquée.",`<div class="alert safe">Source Asperansa: <a href="https://www.asperansa.org/m-chat/m-chat.html" target="_blank">https://www.asperansa.org/m-chat/m-chat.html</a></div><div class="mchat">${items}</div>`)}${panel("Cotation en temps réel","Critères historiques: positif si au moins 3 items échoués ou au moins 2 items critiques échoués.",`<div class="big"><span>Items échoués</span><strong>${sc.total}/23</strong><span class="badge ${sc.level==="faible"?"low":sc.level==="modere"?"mid":"high"}">${sc.label}</span><p>Items critiques échoués: ${sc.criticalCount}. ${sc.advice}</p></div><div class="list"><p><b>Items échoués :</b> ${sc.risk.join(", ")||"aucun"}</p><p><b>Items critiques :</b> ${sc.crit.join(", ")||"aucun"}</p><p><b>Réponses saisies :</b> ${sc.answered}/23</p></div>`)}</div>`}
  function reviewScreen(){const sc=score(),rv=review();if(!sc.risk.length){$("review").innerHTML=panel("Items à reprendre","",`<div class="alert safe">Aucun item échoué au M-CHAT pour l'instant.</div>`);return}const rows=sc.risk.map(i=>{const f=state.review[i]||{status:"not",note:"",example:""};return`<div class="item"><b>${i}. ${esc(q[i])} ${critical.has(i)?'<span class="badge high">critique</span>':""}</b><select data-rstatus="${i}"><option value="not" ${f.status==="not"?"selected":""}>À reprendre</option><option value="risk" ${f.status==="risk"?"selected":""}>Confirmé à risque</option><option value="ok" ${f.status==="ok"?"selected":""}>Finalement non à risque</option></select><label class="field"><span>Exemple clinique</span><input data-rex="${i}" value="${esc(f.example||"")}"></label><label class="field"><span>Note</span><textarea data-rnote="${i}">${esc(f.note||"")}</textarea></label></div>`}).join("");$("review").innerHTML=`<div class="grid two">${panel("Items échoués à reprendre","Relecture clinique des réponses à risque.",`<div class="grid">${rows}</div>`)}${panel("Résultat après relecture","",`<div class="big"><span>Confirmés à risque</span><strong>${rv.count}</strong><span class="badge ${rv.pos?"high":rv.done?"low":"mid"}">${rv.label}</span><p>Items critiques confirmés: ${rv.criticalCount}.</p></div>`)}</div>`}
  function synthesis(){const sc=score(),rv=review(),w=warn(),o=orient();$("synthesis").innerHTML=`<div class="grid two">${panel("Synthèse automatique","",`<div class="list"><p>Enfant âgé de ${ageText()}. Motif : ${state.patient.reasons.join(", ")||state.patient.other||"non renseigné"}.</p><p>${w.summary}</p><p>M-CHAT : ${sc.total}/23, items critiques ${sc.criticalCount}, ${sc.label}.</p><p>${rv.done?rv.label:"Relecture non finalisée ou non requise."}</p><p>${o.headline}. ${o.actions.join(" ; ")||"Conduite à préciser selon clinique."}</p></div>`)}${panel("Hypothèses différentielles","",`<ul>${diffs.map(x=>`<li>${x}</li>`).join("")}</ul>`)}${panel("À examiner pendant la consultation","",`<div class="tags">${exam.map(x=>`<span>${x}</span>`).join("")}</div>`,true)}</div>`}
  function orientation(){const o=orient();$("orientation").innerHTML=`<div class="grid two">${panel(o.headline,"Parcours à adapter au territoire.",`<div class="big"><span>Conduite à tenir</span><strong>${o.urgency}</strong><p>${o.actions.join(" ; ")||"Surveillance développementale."}</p></div>`)}${panel("Actions","",`<ul>${o.actions.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`)}${panel("Orientations possibles","",`<ul>${o.refs.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`)}${panel("Bilans de première ligne","",`<ul>${o.bilans.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`)}${panel("Alertes","",o.alerts.length?`<ul>${o.alerts.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:"<p>Pas d'alerte urgente structurée.</p>",true)}</div>`}
  function docs(){const sc=score(),rv=review(),w=warn(),o=orient(),p=state.patient,phy=state.physician,signList=w.selected.map(x=>x[1]).join(", ")||"aucun coché";return{note:`Consultation de repérage TSA/TND. Enfant âgé de ${ageText()}. Motif : ${p.reasons.join(", ")||p.other||"non renseigné"}. Signes d'alerte : ${signList}. M-CHAT : score ${sc.total}/23, items critiques ${sc.criticalCount}, ${sc.label}. Items échoués : ${sc.risk.join(", ")||"aucun"}. Relecture : ${rv.done?rv.count+" item(s) confirmés à risque":"non réalisée/non requise selon contexte"}. Conclusion : ${sc.pos||rv.pos?"dépistage positif / à risque":"dépistage négatif ou à surveiller selon clinique"}. CAT : ${o.actions.join(" ; ")}.`,pco:`${phy.name||"Dr"}${phy.rpps?" - RPPS "+phy.rpps:""}\n${phy.address||""}\n${phy.phone||""} ${phy.email||""}\n\nObjet : demande d'évaluation développementale et d'accompagnement précoce - PCO (${PCO_URL}) / CAMSP / CMP / CMPP\n\nJe vous adresse ${p.initials||"cet enfant"} âgé(e) de ${ageText()} dans le cadre d'un repérage TSA/TND.\nMotif : ${p.reasons.join(", ")||p.other||"non renseigné"}.\nSignes d'alerte : ${signList}.\nM-CHAT : ${sc.total}/23, items critiques ${sc.criticalCount}, ${sc.label}. Items échoués : ${sc.risk.join(", ")||"aucun"}.\nRelecture : ${rv.done?rv.label:"non finalisée ou non requise"}.\nRetentissement familial : ${p.familyImpact||"à préciser"}.\nRetentissement crèche/scolaire : ${p.schoolImpact||"à préciser"}.\nBilans déjà réalisés : ${p.assessments||"à préciser"}.\n\nDemande : évaluation développementale, avis sur les prises en charge précoces et orientation adaptée au territoire, notamment PCO (${PCO_URL}) si éligible.\nCe dépistage ne constitue pas un diagnostic de TSA.`,ortho:`Merci de recevoir ${p.initials||"cet enfant"} âgé(e) de ${ageText()} pour bilan orthophonique.\n\nMotifs : retard de langage et/ou suspicion de trouble développemental du langage, communication préverbale, attention conjointe et pragmatique.\n\nM-CHAT : ${sc.total}/23, ${sc.label}.`,orl:`Merci d'évaluer l'audition de ${p.initials||"cet enfant"} âgé(e) de ${ageText()}.\n\nMotifs possibles : retard de langage, réponse fluctuante au prénom, doute auditif ou antécédents ORL.\n\nVérification demandée dans le cadre d'un repérage TSA/TND, sans préjuger du diagnostic.`,parent:`Votre enfant ${p.initials||""} a bénéficié d'un repérage du développement.\n\nLe questionnaire ne permet pas de poser un diagnostic. Il aide à savoir si des évaluations complémentaires sont nécessaires.\n\nSuite proposée : ${o.actions.join(" ; ")||"surveillance et point avec le médecin"}.\n\nInformations PCO : ${PCO_URL}`}}
  function reports(){const d=docs(),type=state.report||"note",labels={note:"Note courte dossier",pco:"Courrier PCO ("+PCO_URL+") / CAMSP / CMP / CMPP",ortho:"Courrier orthophoniste",orl:"Courrier ORL/audiogramme",parent:"Fiche parent"};$("reports").innerHTML=`<div class="grid two">${panel("Compte rendu / courrier","Rapport généré selon les réponses M-CHAT, les items critiques, la clinique et la relecture.",`<label class="field"><span>Type</span><select id="reportType">${Object.keys(labels).map(k=>`<option value="${k}" ${type===k?"selected":""}>${labels[k]}</option>`).join("")}</select></label><label class="field"><span>${labels[type]}</span><textarea class="report" id="reportText" readonly>${esc(d[type])}</textarea></label><div class="btnrow"><button class="btn primary" id="copyReport">Copier</button><button class="btn soft" id="printReport">Export PDF</button></div>`)}${panel("Copier-coller bilan","",`<div class="grid">${["Bilan auditif/ORL avec audiométrie adaptée à l'âge.","Bilan visuel adapté à l'âge.","Bilan orthophonique : langage, communication préverbale, attention conjointe et pragmatique.",`Orientation PCO (${PCO_URL}) si suspicion TND/TSA et âge/territoire compatibles.`].map(x=>`<div class="card" style="padding:12px"><p>${esc(x)}</p><button class="btn" data-copy="${esc(x)}">Copier</button></div>`).join("")}</div>`)}</div>`}
  function sources(){const phy=state.physician;$("sources").innerHTML=`<div class="grid two">${panel("Cadre médico-légal","",`<p>Un résultat positif ne pose pas le diagnostic de TSA. Un score négatif n'exclut pas un trouble du neurodéveloppement si la clinique est préoccupante.</p><p><button class="btn danger" id="resetAll">Réinitialiser les données locales</button></p>`)}${panel("Coordonnées médecin","",`<div class="form"><label class="field"><span>Nom</span><input data-doc="name" value="${esc(phy.name)}"></label><label class="field"><span>RPPS</span><input data-doc="rpps" value="${esc(phy.rpps)}"></label><label class="field"><span>Adresse</span><input data-doc="address" value="${esc(phy.address)}"></label><label class="field"><span>Téléphone</span><input data-doc="phone" value="${esc(phy.phone)}"></label><label class="field"><span>Email</span><input data-doc="email" value="${esc(phy.email)}"></label></div>`)}${panel("Sources","",`<div class="source">${srcs.map(s=>`<a href="${s[1]}" target="_blank">${s[0]}</a>`).join("")}</div><p>Données conservées localement dans le navigateur. Aucune donnée patient n'est envoyée à un serveur.</p>`,true)}</div>`}
  function render(){document.body.classList.toggle("dark",state.theme==="dark");renderNav();renderScore();document.querySelectorAll(".screen").forEach(s=>s.classList.toggle("active",s.id===state.active));home();profile();warnings();mchat();reviewScreen();synthesis();orientation();reports();sources();bind()}
  function bind(){document.querySelectorAll("[data-tab],[data-goto]").forEach(b=>b.onclick=()=>setActive(b.dataset.tab||b.dataset.goto));document.querySelectorAll("[data-p]").forEach(e=>e.onchange=()=>{state.patient[e.dataset.p]=e.value;save();render()});document.querySelectorAll("[data-doc]").forEach(e=>e.onchange=()=>{state.physician[e.dataset.doc]=e.value;save();render()});document.querySelectorAll("[data-reason]").forEach(e=>e.onchange=()=>{const r=e.dataset.reason;state.patient.reasons=e.checked?[...new Set([...state.patient.reasons,r])]:state.patient.reasons.filter(x=>x!==r);save();render()});document.querySelectorAll("[data-sign]").forEach(e=>e.onchange=()=>{state.warnings[e.dataset.sign]=e.checked;save();render()});document.querySelectorAll("[data-mchat]").forEach(box=>box.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{state.mchat[box.dataset.mchat]={...(state.mchat[box.dataset.mchat]||{}),answer:btn.dataset.v};save();render()}));document.querySelectorAll("[data-mis]").forEach(e=>e.onchange=()=>{state.mchat[e.dataset.mis]={...(state.mchat[e.dataset.mis]||{}),mis:e.checked};save();render()});document.querySelectorAll("[data-rstatus]").forEach(e=>e.onchange=()=>{state.review[e.dataset.rstatus]={...(state.review[e.dataset.rstatus]||{}),status:e.value};save();render()});document.querySelectorAll("[data-rex]").forEach(e=>e.onchange=()=>{state.review[e.dataset.rex]={...(state.review[e.dataset.rex]||{}),example:e.value};save();render()});document.querySelectorAll("[data-rnote]").forEach(e=>e.onchange=()=>{state.review[e.dataset.rnote]={...(state.review[e.dataset.rnote]||{}),note:e.value};save();render()});document.querySelectorAll("[data-copy]").forEach(b=>b.onclick=()=>copyText(b.dataset.copy));$("themeBtn").onclick=()=>{state.theme=state.theme==="dark"?"light":"dark";save();render()};$("themeBtn").textContent=state.theme==="dark"?"Mode clair":"Mode sombre";$("saveBtn").onclick=()=>{save();alert("Évaluation sauvegardée localement.")};$("newBtn").onclick=()=>{if(confirm("Commencer une nouvelle évaluation ?")){state=blank();state.active="profile";save();render()}};const rt=$("reportType");if(rt)rt.onchange=()=>{state.report=rt.value;save();render()};const cr=$("copyReport");if(cr)cr.onclick=()=>copyText($("reportText").value);const pr=$("printReport");if(pr)pr.onclick=()=>{const d=docs(),type=state.report||"note";$("printTitle").textContent={note:"Note courte dossier",pco:"Courrier PCO / CAMSP / CMP / CMPP",ortho:"Courrier orthophoniste",orl:"Courrier ORL",parent:"Fiche parent"}[type];$("printBody").textContent=d[type];window.print()};const reset=$("resetAll");if(reset)reset.onclick=()=>{if(confirm("Effacer les données locales ?")){localStorage.removeItem(STORE);state=blank();render()}}}
  function copyText(text){if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).then(()=>alert("Copié."))}else{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();alert("Copié.")}}
  render();
})();
</script>
</body>
</html>
